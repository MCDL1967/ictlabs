<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ZAXXON</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Audiowide',sans-serif;}
canvas{display:block;}
#ui{color:#fff;text-align:center;margin-bottom:6px;font-size:11px;letter-spacing:2px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;}
#ui .sc{color:#ff0;} #ui .hi{color:#f80;} #ui .lv{color:#0cf;} #ui .lf{color:#f44;} #ui .fu{color:#0f0;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;z-index:10;}
#overlay h1{font-size:clamp(28px,5vw,56px);color:#ff0;text-shadow:0 0 24px #ff0;margin-bottom:8px;letter-spacing:6px;}
.sub{font-size:clamp(8px,1.2vw,12px);color:rgba(255,255,255,0.5);margin-bottom:24px;letter-spacing:2px;line-height:2.2;}
.start-btn{background:transparent;border:2px solid #ff0;color:#ff0;font-family:'Audiowide',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:2px;padding:13px 48px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:#ff0;color:#000;}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Audiowide',sans-serif;font-size:clamp(14px,2.5vw,22px);color:#ff0;letter-spacing:3px;pointer-events:none;display:none;z-index:9;animation:blink .7s step-end infinite;text-align:center;line-height:1.8;}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">WAVE: <b id="lvEl">1</b></span>
  <span class="lf">SHIPS: <b id="lfEl">3</b></span>
  <span class="fu">FUEL: <b id="fuEl">100</b>%</span>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="overlay">
  <h1>ZAXXON</h1>
  <p class="sub">Space fortress assault<br>↑↓ Move vertically &nbsp;·&nbsp; ←→ Move horizontally &nbsp;·&nbsp; Space Fire<br>Destroy all enemies · Collect fuel · Defeat the boss</p>
  <button class="start-btn" id="startBtn">START GAME</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ZAXXON — Pseudo-3D forward scroller
//  Classic behind-the-ship perspective like the C64 version
//  Ground scrolls below, sky above, enemies approach from ahead
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const hiEl=document.getElementById('hiEl'),scEl=document.getElementById('scEl');
const lvEl=document.getElementById('lvEl'),lfEl=document.getElementById('lfEl'),fuEl=document.getElementById('fuEl');
const msgEl=document.getElementById('msg');

const W=640,H=480;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize();window.addEventListener('resize',resize);

// ── Audio ─────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='square'){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+0.01);}catch(e){}}
function sfxShoot(){tone(880,0.06,0.15);}
function sfxBoom(f=200){try{const b=AC.createBuffer(1,AC.sampleRate*.2,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();s.buffer=b;fl.type='bandpass';fl.frequency.value=f;s.connect(fl);fl.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.2);s.start();s.stop(AC.currentTime+.21);}catch(e){}}
function sfxDie(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>tone(f,.15,.3,'sawtooth'),i*80));}
function sfxFuel(){[660,880].forEach((f,i)=>setTimeout(()=>tone(f,.08,.2),i*70));}
function sfxWave(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.1,.25),i*80));}
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();});

// ── Constants ─────────────────────────────────────────
const GROUND_Y=H*0.65;   // where ground meets horizon
const HORIZON_Y=H*0.42;  // horizon line
const PLAYER_X=W*0.2;    // player fixed horizontal position
const MAX_FUEL=100;
const ENEMY_SPAWN_DIST=W+100; // spawn off right edge

// ── State ─────────────────────────────────────────────
let player,bullets,enemies,particles,fuel,score,hiScore=0,lives,wave;
let gstate='idle',frameCount=0,fireCooldown=0,worldX=0;
const keys={};

function startGame(){
  overlay.style.display='none';hideMsg();
  score=0;lives=3;wave=1;fuel=MAX_FUEL;
  initWave();gstate='playing';
}

function initWave(){
  worldX=0;
  player={
    x:PLAYER_X,
    y:H*0.5,        // screen Y (vertical position)
    vy:0,
    w:40,h:20,
    dead:false,deadTimer:0,invincible:120
  };
  bullets=[];particles=[];
  enemies=spawnWave(wave);
}

function spawnWave(w){
  const list=[];
  const count=8+w*3;
  for(let i=0;i<count;i++){
    const types=['fighter','turret','missile'];
    const type=types[Math.floor(Math.random()*types.length)];
    list.push({
      x:ENEMY_SPAWN_DIST+i*120+Math.random()*80,
      y:HORIZON_Y+40+Math.random()*(GROUND_Y-HORIZON_Y-60),
      w:type==='turret'?30:24,
      h:type==='turret'?24:16,
      type,alive:true,
      spd:1.5+(Math.random()-0.5)*0.5+(w-1)*0.2,
      shootTimer:80+Math.floor(Math.random()*80),
      vx:type==='missile'?(Math.random()-0.5)*1.5:0,
      vy:type==='fighter'?Math.sin(i)*0.8:0,
      hp:type==='turret'?2:1
    });
  }
  // Boss
  list.push({
    x:ENEMY_SPAWN_DIST+count*120+200,
    y:H*0.5,
    w:70,h:50,type:'boss',alive:true,
    spd:0.8+(w-1)*0.1,
    shootTimer:50,vx:0,vy:0,
    hp:6+w*2,maxHp:6+w*2
  });
  // Fuel tanks (ground level)
  for(let i=0;i<5;i++){
    list.push({
      x:ENEMY_SPAWN_DIST+i*200+Math.random()*100,
      y:GROUND_Y-18,
      w:24,h:18,type:'fuel',alive:true,
      spd:1.5+(w-1)*0.15,shootTimer:9999,vx:0,vy:0,hp:1
    });
  }
  return list;
}

// ── Input ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(e.code===k)e.preventDefault();});
  if(gstate==='idle'&&e.code==='Space'){startGame();return;}
  if(gstate==='dead_wait'&&e.code==='Space'){respawn();return;}
  if(gstate==='playing'&&e.code==='Space'&&fireCooldown<=0)shoot();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('startBtn').onclick=startGame;

function shoot(){
  bullets.push({x:player.x+player.w,y:player.y,vx:12,vy:0,enemy:false,alive:true});
  fireCooldown=10;sfxShoot();
}

// ── Update ────────────────────────────────────────────
function update(){
  frameCount++;
  if(fireCooldown>0)fireCooldown--;

  if(player.dead){player.deadTimer--;if(player.deadTimer<=0)killPlayer2();return;}
  if(player.invincible>0)player.invincible--;

  // Player movement
  const spd=3;
  if(keys['ArrowUp']||keys['KeyW'])    player.y=Math.max(HORIZON_Y+10,player.y-spd);
  if(keys['ArrowDown']||keys['KeyS'])  player.y=Math.min(GROUND_Y-player.h-4,player.y+spd);
  if(keys['ArrowLeft']||keys['KeyA'])  player.x=Math.max(20,player.x-spd*0.6);
  if(keys['ArrowRight']||keys['KeyD']) player.x=Math.min(W*0.45,player.x+spd*0.6);
  if(keys['Space']&&fireCooldown<=0)   shoot();

  // Fuel drain
  fuel=Math.max(0,fuel-0.015*(1+wave*0.04));
  if(fuel<=0&&!player.dead){player.dead=true;player.deadTimer=60;sfxDie();}

  // World scroll offset (for ground parallax)
  worldX+=2+wave*0.1;

  // Move player bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(!b.enemy){
      b.x+=b.vx;b.y+=b.vy;
      if(b.x>W+20){bullets.splice(i,1);continue;}
      // Hit enemies
      enemies.forEach(e=>{
        if(!e.alive||!b.alive)return;
        if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
          b.alive=false;
          if(e.type==='fuel'){
            e.alive=false;fuel=Math.min(MAX_FUEL,fuel+25);sfxFuel();score+=50;
          } else {
            e.hp--;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='boss'?12:6);
            sfxBoom(e.type==='boss'?400:220);
            if(e.hp<=0){
              e.alive=false;
              score+=e.type==='boss'?2000:e.type==='turret'?150:100;
              if(e.type==='boss')setTimeout(waveComplete,1500);
            }
          }
          updateUI();
        }
      });
      if(!b.alive)bullets.splice(i,1);
    } else {
      b.x+=b.vx;b.y+=b.vy;
      b.age=(b.age||0)+1;
      if(b.age>120||b.x<-20){bullets.splice(i,1);continue;}
      // Hit player
      if(!player.dead&&player.invincible<=0){
        if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){
          player.dead=true;player.deadTimer=60;sfxDie();bullets.splice(i,1);
        }
      }
    }
  }

  // Move enemies toward player
  enemies.forEach(e=>{
    if(!e.alive)return;
    e.x-=e.spd;
    if(e.type==='fighter')e.y+=Math.sin(frameCount*0.05+e.x*0.01)*0.8;
    if(e.type==='missile'){e.x+=e.vx;e.y+=e.vy;}
    // Clamp to play area
    e.y=Math.max(HORIZON_Y+4,Math.min(GROUND_Y-e.h-2,e.y));
    // Shoot
    e.shootTimer--;
    if(e.shootTimer<=0&&e.x<W-50&&e.type!=='fuel'){
      e.shootTimer=60+Math.floor(Math.random()*60);
      const angle=Math.atan2(player.y-e.y,player.x-e.x);
      const spd2=4+wave*0.3;
      bullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(angle)*spd2,vy:Math.sin(angle)*spd2,enemy:true,alive:true});
    }
    // Collide with player
    if(!player.dead&&player.invincible<=0){
      if(e.x<player.x+player.w&&e.x+e.w>player.x&&e.y<player.y+player.h&&e.y+e.h>player.y){
        player.dead=true;player.deadTimer=60;sfxDie();
        e.alive=false;spawnParticles(e.x+e.w/2,e.y+e.h/2,8);
      }
    }
    // Off screen left — respawn at right (infinite world until boss killed)
    if(e.x<-e.w-20&&e.type!=='boss'){
      e.x=W+100+Math.random()*200;
      e.y=HORIZON_Y+40+Math.random()*(GROUND_Y-HORIZON_Y-80);
    }
  });

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  updateUI();
}

function spawnParticles(x,y,n){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:20+Math.random()*20,maxLife:40,hue:20+Math.random()*30});
  }
}

function killPlayer2(){lives--;updateUI();if(lives<=0){gameOver();return;}gstate='dead_wait';showMsg('SHIP DESTROYED\nSPACE TO CONTINUE');}
function respawn(){hideMsg();player.x=PLAYER_X;player.y=H*0.5;player.dead=false;player.deadTimer=0;player.invincible=180;fuel=Math.min(MAX_FUEL,fuel+20);gstate='playing';}
function waveComplete(){wave++;sfxWave();showMsg(`WAVE ${wave-1} CLEAR!`);setTimeout(()=>{initWave();hideMsg();},2500);}

function gameOver(){
  gstate='gameover';if(score>hiScore)hiScore=score;updateUI();
  overlay.innerHTML=`<h1 style="font-size:clamp(22px,4vw,44px);color:#f44;text-shadow:0 0 20px #f44;margin-bottom:16px;">GAME OVER</h1><p style="font-size:12px;color:#aaa;margin-bottom:24px;letter-spacing:2px;">SCORE: ${score} · HI: ${hiScore}</p><button class="start-btn" id="rb" style="border-color:#f44;color:#f44;">PLAY AGAIN</button>`;
  overlay.style.display='flex';
  document.getElementById('rb').onclick=()=>{lives=3;wave=1;score=0;fuel=MAX_FUEL;initWave();updateUI();overlay.style.display='none';gstate='playing';};
}

// ── Draw ──────────────────────────────────────────────
function draw(){
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,HORIZON_Y);
  skyGrad.addColorStop(0,'#000010');skyGrad.addColorStop(1,'#001040');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,HORIZON_Y);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<80;i++)ctx.fillRect((i*173+worldX*0.1)%W,(i*97)%HORIZON_Y,1,1);

  // Ground gradient
  const gndGrad=ctx.createLinearGradient(0,HORIZON_Y,0,H);
  gndGrad.addColorStop(0,'#051508');gndGrad.addColorStop(1,'#0a2010');
  ctx.fillStyle=gndGrad;ctx.fillRect(0,HORIZON_Y,W,H-HORIZON_Y);

  // Horizon glow
  ctx.fillStyle='rgba(0,80,20,0.4)';ctx.fillRect(0,HORIZON_Y-2,W,4);

  // Ground grid lines (perspective)
  ctx.strokeStyle='rgba(0,150,40,0.2)';ctx.lineWidth=1;
  // Horizontal lines
  for(let i=0;i<12;i++){
    const t=i/12;
    const y=HORIZON_Y+(GROUND_Y-HORIZON_Y)*Math.pow(t,0.6);
    const alpha=t*0.5;
    ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Vertical perspective lines
  for(let i=-4;i<=8;i++){
    const bx=(i/4)*W;
    const vx=((bx-W/2)*0.1+W/2+worldX*0.5)%W;
    ctx.globalAlpha=0.15;
    ctx.beginPath();ctx.moveTo(W/2,HORIZON_Y);ctx.lineTo(vx,GROUND_Y);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.lineWidth=1;

  // Ground surface line
  ctx.fillStyle='rgba(0,200,50,0.15)';ctx.fillRect(0,GROUND_Y-1,W,2);

  // Draw enemies
  enemies.forEach(e=>{
    if(!e.alive||e.x>W+50||e.x<-e.w-10)return;

    if(e.type==='fuel'){
      // Fuel tank on ground
      ctx.fillStyle='#005500';ctx.fillRect(e.x,e.y,e.w,e.h);
      ctx.fillStyle='#00aa00';ctx.fillRect(e.x+2,e.y+2,e.w-4,e.h-4);
      ctx.fillStyle='#0f0';ctx.font='8px Audiowide';ctx.textAlign='center';ctx.fillText('FUEL',e.x+e.w/2,e.y-2);
      return;
    }

    ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);

    if(e.type==='fighter'){
      // Enemy fighter — red dart shape
      ctx.fillStyle='#cc0000';
      ctx.beginPath();ctx.moveTo(-e.w/2,0);ctx.lineTo(e.w/2,-e.h/3);ctx.lineTo(e.w/2,e.h/3);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ff2222';ctx.fillRect(-e.w/2,-e.h/4,e.w*0.6,e.h/2);
      // Engine glow
      ctx.fillStyle='rgba(255,100,0,0.7)';ctx.beginPath();ctx.arc(e.w/2,0,5,0,Math.PI*2);ctx.fill();
    }

    if(e.type==='turret'){
      // Ground turret
      ctx.fillStyle='#555';ctx.fillRect(-e.w/2,-e.h/3,e.w,e.h);
      ctx.fillStyle='#888';ctx.fillRect(-e.w/4,-e.h/2,e.w/2,e.h/3);
      // Barrel points at player
      const ang=Math.atan2(player.y-(e.y+e.h/2),player.x-(e.x+e.w/2));
      ctx.strokeStyle='#aaa';ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ang)*20,Math.sin(ang)*20);ctx.stroke();
      // Muzzle flash
      if(Math.floor(frameCount/4)%2===0){ctx.fillStyle='rgba(255,200,0,0.5)';ctx.beginPath();ctx.arc(Math.cos(ang)*22,Math.sin(ang)*22,5,0,Math.PI*2);ctx.fill();}
    }

    if(e.type==='missile'){
      ctx.fillStyle='#f80';ctx.fillRect(-12,-5,24,10);
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(6,-6);ctx.lineTo(6,6);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(255,100,0,0.6)';ctx.beginPath();ctx.arc(-12,0,6,0,Math.PI*2);ctx.fill();
    }

    if(e.type==='boss'){
      ctx.shadowBlur=20;ctx.shadowColor='#f00';
      // Main body
      ctx.fillStyle='#880000';ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
      ctx.fillStyle='#cc0000';ctx.fillRect(-e.w/2+4,-e.h/2+4,e.w-8,e.h-8);
      // Head/cockpit
      ctx.fillStyle='#aa0000';ctx.fillRect(-14,-e.h/2-16,28,18);
      // Eyes
      ctx.fillStyle='#ff0';ctx.fillRect(-10,-e.h/2-12,6,6);ctx.fillRect(4,-e.h/2-12,6,6);
      // Arms
      ctx.fillStyle='#660000';ctx.fillRect(-e.w/2-20,-8,22,16);ctx.fillRect(e.w/2-2,-8,22,16);
      // HP bar above
      ctx.fillStyle='#440000';ctx.fillRect(-e.w/2,-e.h/2-28,e.w,6);
      ctx.fillStyle='#f00';ctx.fillRect(-e.w/2,-e.h/2-28,(e.hp/e.maxHp)*e.w,6);
      ctx.shadowBlur=0;
    }

    ctx.restore();
  });

  // Player bullets
  bullets.forEach(b=>{
    if(b.enemy){
      ctx.fillStyle='#f44';ctx.shadowBlur=6;ctx.shadowColor='#f44';
      ctx.fillRect(b.x-3,b.y-3,6,6);ctx.shadowBlur=0;
    } else {
      ctx.fillStyle='#ff0';ctx.shadowBlur=8;ctx.shadowColor='#ff0';
      ctx.fillRect(b.x,b.y-2,16,4);ctx.shadowBlur=0;
    }
  });

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=`hsl(${p.hue},100%,${50+a*30}%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,3*(1-a)+1,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Player ship
  if(!player.dead||(player.dead&&Math.floor(frameCount/6)%2===0)){
    const flash=player.invincible>0&&Math.floor(frameCount/6)%2===0;
    if(!flash){
      ctx.save();ctx.translate(player.x+player.w/2,player.y+player.h/2);
      ctx.shadowBlur=14;ctx.shadowColor='#4af';
      // Fuselage
      ctx.fillStyle='#4af';
      ctx.beginPath();ctx.moveTo(-player.w/2,0);ctx.lineTo(player.w/2,-6);ctx.lineTo(player.w/2,6);ctx.closePath();ctx.fill();
      // Wings
      ctx.fillStyle='#2880cc';
      ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(-player.w/2,-14);ctx.lineTo(-player.w/4,-4);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(0,4);ctx.lineTo(-player.w/2,14);ctx.lineTo(-player.w/4,4);ctx.closePath();ctx.fill();
      // Cockpit
      ctx.fillStyle='#88ddff';ctx.beginPath();ctx.ellipse(6,0,8,5,0,0,Math.PI*2);ctx.fill();
      // Engine glow
      ctx.fillStyle=`rgba(100,200,255,${0.4+Math.sin(frameCount*0.4)*0.2})`;
      ctx.beginPath();ctx.arc(-player.w/2,0,6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
  }

  // HUD meters
  // Fuel
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(8,8,120,12);
  ctx.fillStyle=fuel<25?'#f44':'#0f0';ctx.fillRect(8,8,(fuel/MAX_FUEL)*120,12);
  ctx.strokeStyle='#0f0';ctx.lineWidth=1;ctx.strokeRect(8,8,120,12);
  ctx.fillStyle='#0f0';ctx.font='8px Audiowide';ctx.textAlign='left';ctx.fillText('FUEL',134,19);

  // Wave progress (how many enemies left)
  const alive=enemies.filter(e=>e.alive&&e.type!=='fuel').length;
  const total=enemies.filter(e=>e.type!=='fuel').length;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(8,24,120,12);
  ctx.fillStyle='#0cf';ctx.fillRect(8,24,((total-alive)/Math.max(1,total))*120,12);
  ctx.strokeStyle='#0cf';ctx.lineWidth=1;ctx.strokeRect(8,24,120,12);
  ctx.fillStyle='#0cf';ctx.fillText('WAVE',134,35);

  ctx.textAlign='left';
}

function showMsg(t){msgEl.innerHTML=t.replace(/\n/g,'<br>');msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}
function updateUI(){hiEl.textContent=hiScore;scEl.textContent=score;lvEl.textContent=wave;lfEl.textContent=lives;fuEl.textContent=Math.round(fuel);}

function loop(){requestAnimationFrame(loop);frameCount++;if(gstate==='playing')update();draw();}

updateUI();loop();
const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode)startGame();
</script>
