<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ZAXXON</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Audiowide',sans-serif;}
#gameCanvas{display:block;}
#ui{color:#fff;text-align:center;margin-bottom:6px;font-size:11px;letter-spacing:2px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;position:relative;z-index:2;}
#ui .sc{color:#ff0;} #ui .hi{color:#f80;} #ui .lv{color:#0cf;} #ui .lf{color:#f44;} #ui .fu{color:#0f0;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;z-index:10;}
#overlay h1{font-size:clamp(28px,5vw,56px);color:#ff0;text-shadow:0 0 24px #ff0;margin-bottom:8px;letter-spacing:6px;}
.sub{font-size:clamp(8px,1.2vw,12px);color:rgba(255,255,255,0.5);margin-bottom:20px;letter-spacing:2px;line-height:2.2;}
.diff-btns{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
.start-btn{background:transparent;border:2px solid #ff0;color:#ff0;font-family:'Audiowide',sans-serif;font-size:clamp(9px,1.3vw,12px);letter-spacing:2px;padding:10px 28px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:#ff0;color:#000;}
.start-btn.g{border-color:#0f0;color:#0f0;} .start-btn.g:hover{background:#0f0;color:#000;}
.start-btn.r{border-color:#f44;color:#f44;} .start-btn.r:hover{background:#f44;color:#000;}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Audiowide',sans-serif;font-size:clamp(14px,2.5vw,22px);color:#ff0;letter-spacing:3px;pointer-events:none;display:none;z-index:9;animation:blink .7s step-end infinite;text-align:center;line-height:1.8;}
@keyframes blink{50%{opacity:0}}
#hud{position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:5;padding:8px 16px;display:flex;gap:20px;align-items:flex-end;}
.meter{display:flex;flex-direction:column;align-items:center;gap:3px;}
.meter-bar{width:12px;height:80px;background:rgba(0,0,0,0.5);border:1px solid;position:relative;}
.meter-fill{position:absolute;bottom:0;left:0;right:0;transition:height 0.1s;}
.meter-label{font-size:8px;letter-spacing:2px;color:#fff;opacity:0.7;}
#altBar{border-color:#0ff;} #altFill{background:#0ff;}
#fuelBar{border-color:#0f0;} #fuelFill{background:#0f0;}

</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">WAVE: <b id="lvEl">1</b></span>
  <span class="lf">SHIPS: <b id="lfEl">3</b></span>
  <span class="fu">FUEL: <b id="fuEl">100</b>%</span>
</div>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div class="meter">
    <div class="meter-bar" id="altBar"><div class="meter-fill" id="altFill" style="height:50%"></div></div>
    <div class="meter-label">ALT</div>
  </div>
  <div class="meter">
    <div class="meter-bar" id="fuelBar"><div class="meter-fill" id="fuelFill" style="height:100%"></div></div>
    <div class="meter-label">FUEL</div>
  </div>
</div>
<div id="msg"></div>
<div id="overlay">
  <h1>ZAXXON</h1>
  <p class="sub">3D Space Fortress Assault<br>↑↓ Altitude &nbsp;·&nbsp; ←→ Strafe &nbsp;·&nbsp; Space Fire<br>Fly low to collect fuel · Destroy all enemies · Defeat the boss</p>
  <div class="diff-btns">
    <button class="start-btn g" onclick="startGame('beginner')">BEGINNER</button>
    <button class="start-btn"   onclick="startGame('intermediate')">INTERMEDIATE</button>
    <button class="start-btn r" onclick="startGame('advanced')">ADVANCED</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  ZAXXON 3D — Three.js · ICTLabs Arcade
//  Chase-cam behind player ship, forward-scrolling fortress
// ═══════════════════════════════════════════════════════════

// ── DOM ──────────────────────────────────────────────────
const overlay=document.getElementById('overlay');
const msgEl=document.getElementById('msg');
const hiEl=document.getElementById('hiEl'),scEl=document.getElementById('scEl');
const lvEl=document.getElementById('lvEl'),lfEl=document.getElementById('lfEl'),fuEl=document.getElementById('fuEl');
const altFill=document.getElementById('altFill'),fuelFill=document.getElementById('fuelFill');

// ── Three.js setup ────────────────────────────────────────
const W=640,H=440;
const canvas=document.getElementById('gameCanvas');
canvas.width=W;canvas.height=H;

function resize(){
  const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);
  canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';
}
resize();window.addEventListener('resize',resize);

const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000510,0.015); // less fog = more visibility
scene.background=new THREE.Color(0x000510);

const camera=new THREE.PerspectiveCamera(65,W/H,0.1,200);
camera.position.set(0,35,-20);
camera.lookAt(0,0,25);

// ── Lighting ──────────────────────────────────────────────
const ambLight=new THREE.AmbientLight(0x334455,1.8);
scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0x8899ff,2.0);
dirLight.position.set(0,20,10);
dirLight.castShadow=true;
scene.add(dirLight);
const rimLight=new THREE.DirectionalLight(0xff4400,0.4);
rimLight.position.set(0,-10,-20);
scene.add(rimLight);

// ── Audio ─────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='square'){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+0.01);}catch(e){}}
function sfxShoot(){tone(880,0.06,0.15);}
function sfxBoom(){try{const b=AC.createBuffer(1,AC.sampleRate*.2,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();s.buffer=b;fl.type='bandpass';fl.frequency.value=300;s.connect(fl);fl.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.5,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);s.start();s.stop(AC.currentTime+.31);}catch(e){}}
function sfxDie(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>tone(f,.15,.3,'sawtooth'),i*80));}
function sfxFuel(){[660,880].forEach((f,i)=>setTimeout(()=>tone(f,.08,.2),i*70));}
function sfxWave(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.1,.25),i*80));}
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();});

// ── Materials ─────────────────────────────────────────────
const MAT={
  ground:  new THREE.MeshLambertMaterial({color:0x0a1f0a,wireframe:false}),
  grid:    new THREE.MeshLambertMaterial({color:0x00ff44,wireframe:true,transparent:true,opacity:0.25}),
  wall:    new THREE.MeshPhongMaterial({color:0x334433,emissive:0x001100,shininess:30}),
  wallTop: new THREE.MeshPhongMaterial({color:0x556655,emissive:0x002200,shininess:60}),
  player:  new THREE.MeshPhongMaterial({color:0x4499ff,emissive:0x112244,shininess:80}),
  cockpit: new THREE.MeshPhongMaterial({color:0x88ddff,emissive:0x224466,shininess:120,transparent:true,opacity:0.85}),
  enemy:   new THREE.MeshPhongMaterial({color:0xff2200,emissive:0xaa1100,shininess:80}),
  missile: new THREE.MeshPhongMaterial({color:0xff8800,emissive:0xaa4400,shininess:60}),
  boss:    new THREE.MeshPhongMaterial({color:0xff0044,emissive:0xaa0022,shininess:80}),
  fuel:    new THREE.MeshPhongMaterial({color:0x00aa00,emissive:0x003300,shininess:40}),
  bullet:  new THREE.MeshBasicMaterial({color:0xffff00}),
  ebullet: new THREE.MeshBasicMaterial({color:0xff4444}),
};

// ── Helpers ───────────────────────────────────────────────
function box(w,h,d,mat){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);}
function sphere(r,mat){return new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);}
function cyl(rt,rb,h,mat){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,8),mat);}

// ── Ground plane (scrolls with world) ─────────────────────
const groundGeo=new THREE.PlaneGeometry(40,300,20,100);
const ground=new THREE.Mesh(groundGeo,MAT.ground);
ground.rotation.x=-Math.PI/2;
ground.position.set(0,0,100);
ground.receiveShadow=true;
scene.add(ground);

// Grid overlay
const gridGeo=new THREE.PlaneGeometry(40,300,20,50);
const grid=new THREE.Mesh(gridGeo,MAT.grid);
grid.rotation.x=-Math.PI/2;
grid.position.set(0,0.05,100);
scene.add(grid);

// Starfield
const starGeo=new THREE.BufferGeometry();
const starVerts=[];
for(let i=0;i<800;i++){starVerts.push((Math.random()-0.5)*200,(Math.random()*40+5),(Math.random()-0.5)*400);}
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.15}));
scene.add(stars);

// ── Player ship ───────────────────────────────────────────
function makePlayerShip(){
  const g=new THREE.Group();
  // Fuselage
  const fuse=box(1.2,0.4,3.5,MAT.player); fuse.castShadow=true; g.add(fuse);
  // Wings
  const wl=box(2.5,0.12,1.2,MAT.player); wl.position.set(-1.8,0,-0.3); wl.castShadow=true; g.add(wl);
  const wr=box(2.5,0.12,1.2,MAT.player); wr.position.set(1.8,0,-0.3); wr.castShadow=true; g.add(wr);
  // Wing tips
  const wtl=box(0.3,0.5,0.8,MAT.player); wtl.position.set(-3.1,0.2,-0.2); g.add(wtl);
  const wtr=box(0.3,0.5,0.8,MAT.player); wtr.position.set(3.1,0.2,-0.2); g.add(wtr);
  // Cockpit
  const cock=new THREE.Mesh(new THREE.SphereGeometry(0.45,8,6),MAT.cockpit);
  cock.scale.set(0.9,0.7,1.4); cock.position.set(0,0.4,0.8); g.add(cock);
  // Engine pods
  [-0.6,0.6].forEach(x=>{
    const pod=box(0.35,0.25,1.2,MAT.player); pod.position.set(x,-0.2,-0.5); g.add(pod);
    // Engine glow light
    const light=new THREE.PointLight(0x4499ff,1.5,3);
    light.position.set(x,-0.2,-1.2); g.add(light);
  });
  // Nose
  const nose=cyl(0.05,0.3,0.8,MAT.player); nose.rotation.x=Math.PI/2;
  nose.position.set(0,0,2); g.add(nose);
  return g;
}

const playerShip=makePlayerShip();
playerShip.position.set(0,4,0);
scene.add(playerShip);

// Exhaust particles group
const exhaustGroup=new THREE.Group();
scene.add(exhaustGroup);

// ── Enemy factories ───────────────────────────────────────
function makeFighter(){
  const g=new THREE.Group();
  const body=box(2.5,0.7,3,MAT.enemy); body.castShadow=true; g.add(body);
  const wl=box(3,0.15,1.2,MAT.enemy); wl.position.set(-2.5,0,0); g.add(wl);
  const wr=box(3,0.15,1.2,MAT.enemy); wr.position.set(2.5,0,0); g.add(wr);
  const nose=cyl(0.08,0.4,1.2,MAT.enemy); nose.rotation.x=Math.PI/2; nose.position.set(0,0,1.8); g.add(nose);
  const light=new THREE.PointLight(0xff4400,3,8); light.position.set(0,0.5,0); g.add(light);
  return g;
}

function makeTurret(){
  const g=new THREE.Group();
  const base=box(2,0.8,2,MAT.wall); base.position.y=0.4; g.add(base);
  const turret=cyl(0.5,0.6,0.9,MAT.enemy); turret.position.y=1.2; g.add(turret);
  const barrel=box(0.2,0.2,1.8,MAT.enemy); barrel.position.set(0,1.2,1.2); g.add(barrel);
  const light=new THREE.PointLight(0xff6600,3,8); light.position.set(0,1,0); g.add(light);
  return g;
}

function makeFuelTank(){
  const g=new THREE.Group();
  const tank=cyl(0.7,0.7,1.4,MAT.fuel); tank.rotation.z=Math.PI/2; tank.position.y=0.7; g.add(tank);
  const cap1=sphere(0.7,MAT.fuel); cap1.position.set(-0.7,0.7,0); g.add(cap1);
  const cap2=sphere(0.7,MAT.fuel); cap2.position.set(0.7,0.7,0); g.add(cap2);
  const light=new THREE.PointLight(0x00ff00,1,4); light.position.set(0,1,0); g.add(light);
  return g;
}

function makeBoss(){
  const g=new THREE.Group();
  // Main body
  const body=box(4,1.5,3,MAT.boss); body.castShadow=true; g.add(body);
  // Arms
  const al=box(1.5,0.4,1,MAT.boss); al.position.set(-3,0,0); g.add(al);
  const ar=box(1.5,0.4,1,MAT.boss); ar.position.set(3,0,0); g.add(ar);
  // Head
  const head=box(1.5,1.2,1.5,MAT.boss); head.position.set(0,1.3,0); g.add(head);
  // Eyes
  const eyeMat=new THREE.MeshBasicMaterial({color:0xff0000});
  const el=sphere(0.25,eyeMat); el.position.set(-0.4,1.5,0.8); g.add(el);
  const er=sphere(0.25,eyeMat); er.position.set(0.4,1.5,0.8); g.add(er);
  // Engine lights
  const bl=new THREE.PointLight(0xff0000,2,6); bl.position.set(0,0,-2); g.add(bl);
  return g;
}

function makeWall(height){
  const g=new THREE.Group();
  const wall=box(2,height,0.5,MAT.wall); wall.position.y=height/2; wall.castShadow=true; g.add(wall);
  const top=box(2.1,0.2,0.6,MAT.wallTop); top.position.y=height+0.1; g.add(top);
  // Beacon light
  const beacon=new THREE.PointLight(0xff2200,1.5,3);
  beacon.position.set(0,height+0.5,0); g.add(beacon);
  return g;
}

// ── Explosion particles ───────────────────────────────────
const explosions=[];
function spawnExplosion(pos,color=0xff6600){
  const group=new THREE.Group();
  group.position.copy(pos);
  const mat=new THREE.MeshBasicMaterial({color});
  for(let i=0;i<20;i++){
    const p=sphere(0.08+Math.random()*0.12,mat);
    const vel=new THREE.Vector3((Math.random()-0.5)*8,(Math.random()-0.5)*8,(Math.random()-0.5)*8);
    group._particles=group._particles||[];
    group._particles.push({mesh:p,vel,life:1});
    group.add(p);
  }
  // Point light flash
  const flash=new THREE.PointLight(color,4,8);
  group.add(flash);
  group._flash=flash;
  group._life=1;
  scene.add(group);
  explosions.push(group);
  sfxBoom();
}

function updateExplosions(){
  for(let i=explosions.length-1;i>=0;i--){
    const g=explosions[i];
    g._life-=0.04;
    if(g._life<=0){ scene.remove(g); explosions.splice(i,1); continue; }
    g._flash.intensity=g._life*4;
    (g._particles||[]).forEach(p=>{
      p.mesh.position.add(p.vel.clone().multiplyScalar(0.016));
      p.vel.multiplyScalar(0.92);
      p.mesh.scale.setScalar(g._life);
    });
  }
}

// ── Game state ────────────────────────────────────────────
let gstate='idle',wave=1,score=0,hiScore=0,lives=3,fuel=100;
let difficulty='intermediate';
let frameCount=0,fireCooldown=0;
let playerX=0,playerAlt=4; // world X strafe, altitude Y
const MIN_ALT=0.8,MAX_ALT=9;
const keys={};
let enemies=[],bullets=[],worldZ=0;

function getDiff(){
  if(difficulty==='beginner')  return{spd:0.048,eSpd:0.032,shootRate:0.4};
  if(difficulty==='advanced')  return{spd:0.096,eSpd:0.080,shootRate:1.6};
  return{spd:0.072,eSpd:0.056,shootRate:0.8}; // all -20%
}

// ── Input ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(e.code===k)e.preventDefault();});
  if(gstate==='idle'&&e.code==='Space'){startGame(difficulty);return;}
  if(gstate==='dead_wait'&&e.code==='Space'){respawn();return;}
  if(gstate==='playing'&&e.code==='Space'&&fireCooldown<=0)shoot();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

function startGame(diff){
  difficulty=diff||difficulty;
  overlay.style.display='none';
  hideMsg();
  score=0;lives=3;wave=1;fuel=100;
  initWave();
  gstate='playing';
}

function initWave(){
  // Clear old enemies and bullets
  enemies.forEach(e=>scene.remove(e.mesh));
  bullets.forEach(b=>scene.remove(b.mesh));
  enemies=[];bullets=[];
  worldZ=0;
  playerX=0;playerAlt=4;
  playerShip.position.set(0,4,0);
  spawnWaveObjects(wave);
  updateUI();
}

// ── Spawn wave ────────────────────────────────────────────
function spawnWaveObjects(w){
  const d=getDiff();
  const count=6+w*3;

  for(let i=0;i<count;i++){
    const type=Math.random()<0.3?'turret':Math.random()<0.5?'fighter':'missile';
    const mesh=type==='turret'?makeTurret():makeFighter();
    const zPos=30+i*8+Math.random()*5;
    const xPos=(Math.random()-0.5)*14;
    const yPos=type==='turret'?0.5:2+Math.random()*5;
    mesh.position.set(xPos,yPos,zPos);
    scene.add(mesh);
    enemies.push({mesh,type,hp:type==='turret'?2:1,alive:true,
      shootTimer:60+Math.random()*80,vx:(Math.random()-0.5)*0.02,
      zPos}); // store original z
  }

  // Fuel tanks
  for(let i=0;i<5;i++){
    const mesh=makeFuelTank();
    mesh.position.set((Math.random()-0.5)*12,0,20+i*12+Math.random()*6);
    scene.add(mesh);
    enemies.push({mesh,type:'fuel',hp:1,alive:true,shootTimer:9999,vx:0,zPos:mesh.position.z});
  }

  // Boss at end
  const boss=makeBoss();
  boss.position.set(0,4,30+count*8+20);
  scene.add(boss);
  enemies.push({mesh:boss,type:'boss',hp:8+w*2,maxHp:8+w*2,alive:true,shootTimer:50,vx:0.04,zPos:boss.position.z});
}

// ── Shoot ─────────────────────────────────────────────────
function shoot(){
  const b=sphere(0.35,MAT.bullet); // larger bullet
  b.position.copy(playerShip.position);
  b.position.z+=2;
  // Add point light to bullet
  const bl=new THREE.PointLight(0xffff00,3,6); b.add(bl);
  scene.add(b);
  bullets.push({mesh:b,vz:0.6,vy:0,enemy:false,alive:true});
  fireCooldown=8;sfxShoot();
}

// ── Update ────────────────────────────────────────────────
function update(){
  frameCount++;
  if(fireCooldown>0)fireCooldown--;

  const d=getDiff();
  const moveSpd=0.12;

  // Player input
  if(keys['ArrowRight']||keys['KeyD']) playerX=Math.max(-9,playerX-moveSpd);
  if(keys['ArrowLeft']||keys['KeyA'])  playerX=Math.min(9,playerX+moveSpd);
  if(keys['ArrowUp']||keys['KeyW'])    playerAlt=Math.min(MAX_ALT,playerAlt+moveSpd*0.7);
  if(keys['ArrowDown']||keys['KeyS'])  playerAlt=Math.max(MIN_ALT,playerAlt-moveSpd*0.7);
  if(keys['Space']&&fireCooldown<=0)   shoot();

  // Smooth ship to target
  playerShip.position.x+=(playerX-playerShip.position.x)*0.15;
  playerShip.position.y+=(playerAlt-playerShip.position.y)*0.12;

  // Ship banking
  playerShip.rotation.z=(playerX-playerShip.position.x)*-0.3;
  playerShip.rotation.x=-0.05;

  // Fuel drain
  fuel=Math.max(0,fuel-d.spd*0.3);
  if(fuel<=0&&gstate==='playing'){ killPlayer(); return; }

  // Scroll world (enemies move toward player in Z)
  const scroll=d.spd;
  worldZ+=scroll;

  enemies.forEach(e=>{
    if(!e.alive)return;
    // Move enemy toward camera
    e.mesh.position.z-=scroll;
    // Lateral drift
    if(e.type!=='turret'&&e.type!=='fuel'){
      e.mesh.position.x+=e.vx;
      if(e.mesh.position.x>10||e.mesh.position.x<-10) e.vx*=-1;
    }
    // Rotation for fighters/boss
    if(e.type==='fighter') e.mesh.rotation.y+=0.02;
    if(e.type==='boss'){
      e.mesh.rotation.y+=0.01;
      // HP bar via scale
      const hpRatio=e.hp/e.maxHp;
      e.mesh.children[0].scale.x=hpRatio;
    }

    // Enemy shoot
    e.shootTimer--;
    if(e.shootTimer<=0&&e.mesh.position.z<15&&e.mesh.position.z>-5&&e.type!=='fuel'){
      e.shootTimer=Math.floor((120+Math.random()*120)/d.shootRate);
      const b=sphere(0.4,MAT.ebullet); // larger enemy bullet
      b.position.copy(e.mesh.position);
      // Reduced accuracy — aim at player with significant spread
      const spread=1.5;
      const dir=new THREE.Vector3(
        playerShip.position.x-e.mesh.position.x+(Math.random()-0.5)*spread,
        playerShip.position.y-e.mesh.position.y+(Math.random()-0.5)*spread,
        playerShip.position.z-e.mesh.position.z
      ).normalize().multiplyScalar(0.18);
      scene.add(b);
      bullets.push({mesh:b,vz:dir.z,vx:dir.x,vy:dir.y,enemy:true,alive:true});
    }

    // Collision with player
    if(e.mesh.position.z<2&&e.mesh.position.z>-2){
      const dist=Math.hypot(e.mesh.position.x-playerShip.position.x,e.mesh.position.y-playerShip.position.y);
      if(dist<2&&gstate==='playing'){
        if(e.type==='fuel'){
          e.alive=false; scene.remove(e.mesh);
          fuel=Math.min(100,fuel+30); sfxFuel();
        } else {
          spawnExplosion(e.mesh.position.clone()); killPlayer();
        }
      }
    }

    // Off screen — remove
    if(e.mesh.position.z<-20){ e.alive=false; scene.remove(e.mesh); }
  });

  // Move bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(!b.alive){ scene.remove(b.mesh); bullets.splice(i,1); continue; }
    b.mesh.position.z+=b.vz;
    if(b.vx) b.mesh.position.x+=b.vx;
    if(b.vy) b.mesh.position.y+=b.vy;

    if(!b.enemy){
      // Player bullet hits enemies
      enemies.forEach(e=>{
        if(!e.alive||!b.alive)return;
        const dist=b.mesh.position.distanceTo(e.mesh.position);
        if(dist<(e.type==='boss'?3:1.5)){
          b.alive=false;
          if(e.type==='fuel'){
            e.alive=false;scene.remove(e.mesh);fuel=Math.min(100,fuel+25);sfxFuel();score+=50;
          } else {
            e.hp--;
            spawnExplosion(e.mesh.position.clone(),e.type==='boss'?0xff0000:0xff6600);
            if(e.hp<=0){
              e.alive=false;scene.remove(e.mesh);
              score+=e.type==='boss'?3000:e.type==='turret'?150:100;
              if(e.type==='boss')setTimeout(waveComplete,1500);
            }
          }
          updateUI();
        }
      });
      // Out of range
      if(b.mesh.position.z>100){ b.alive=false; }
    } else {
      // Enemy bullet hits player
      if(b.mesh.position.distanceTo(playerShip.position)<1.5&&gstate==='playing'){
        b.alive=false; spawnExplosion(playerShip.position.clone()); killPlayer();
      }
      if(b.mesh.position.z<-10||b.mesh.position.z>50){ b.alive=false; }
    }
  }

  // Check wave clear (no living non-fuel enemies remain except pending)
  const livingEnemies=enemies.filter(e=>e.alive&&e.type!=='fuel');
  if(livingEnemies.length===0&&gstate==='playing'){
    waveComplete();
  }

  // Fixed isometric camera — slight x follow only
  camera.position.x+=(playerShip.position.x*0.15-camera.position.x)*0.04;
  camera.lookAt(camera.position.x*0.3,0,25);

  // Exhaust flicker
  playerShip.children.forEach(c=>{
    if(c.isPointLight&&c.color.r<0.5){ // engine lights (blue-ish)
      c.intensity=1+Math.sin(frameCount*0.3)*0.5;
    }
  });

  updateExplosions();
  updateHUD();
  updateUI();
  // Update altitude marker position
  if(altMarker){
    altMarker.position.set(10, (playerAlt-MIN_ALT)/(MAX_ALT-MIN_ALT)*10, 0);
  }
}

function updateHUD(){
  altFill.style.height=((playerAlt-MIN_ALT)/(MAX_ALT-MIN_ALT)*100)+'%';
  fuelFill.style.height=fuel+'%';
  fuelFill.style.background=fuel<25?'#f44':'#0f0';
}

// Altitude marker — vertical bar on right edge of battlefield
let altMarker=null;
let altMarkerFill=null;
function makeAltMarker(){
  // 3D vertical bar on right edge of ground
  const barGeo=new THREE.BoxGeometry(0.3,10,0.3);
  const barMat=new THREE.MeshBasicMaterial({color:0x004400,transparent:true,opacity:0.6});
  const bar=new THREE.Mesh(barGeo,barMat);
  bar.position.set(10,5,0); scene.add(bar);
  // Glowing indicator cube that moves up/down
  const indGeo=new THREE.BoxGeometry(0.6,0.4,0.6);
  const indMat=new THREE.MeshBasicMaterial({color:0x00ff44});
  altMarker=new THREE.Mesh(indGeo,indMat);
  const light=new THREE.PointLight(0x00ff44,2,3);
  altMarker.add(light);
  scene.add(altMarker);
  // Label bar ticks
  for(let i=0;i<=4;i++){
    const tickGeo=new THREE.BoxGeometry(0.5,0.08,0.08);
    const tick=new THREE.Mesh(tickGeo,new THREE.MeshBasicMaterial({color:0x006622}));
    tick.position.set(10.3,i*2.5,0);
    scene.add(tick);
  }
}
makeAltMarker();

function killPlayer(){
  if(gstate!=='playing')return;
  sfxDie(); lives--; updateUI();
  if(lives<=0){ setTimeout(gameOver,800); return; }
  gstate='dead_wait';
  showMsg('SHIP DESTROYED\nSPACE TO CONTINUE');
}

function respawn(){
  hideMsg();playerX=0;playerAlt=4;
  playerShip.position.set(0,4,0);
  fuel=Math.min(100,fuel+20);
  gstate='playing';
}

function waveComplete(){
  if(gstate!=='playing')return;
  gstate='levelup';
  sfxWave();
  showMsg(`WAVE ${wave} CLEAR!`);
  setTimeout(()=>{ wave++; initWave(); hideMsg(); gstate='playing'; },2500);
}

function gameOver(){
  gstate='gameover';
  if(score>hiScore)hiScore=score;
  updateUI();
  overlay.innerHTML=`
    <h1 style="font-size:clamp(22px,4vw,44px);color:#f44;text-shadow:0 0 20px #f44;margin-bottom:16px;">GAME OVER</h1>
    <p style="font-size:12px;color:#aaa;margin-bottom:24px;letter-spacing:2px;">SCORE: ${score} · HI: ${hiScore}</p>
    <div class="diff-btns">
      <button class="start-btn g" onclick="startGame('beginner')">BEGINNER</button>
      <button class="start-btn"   onclick="startGame('intermediate')">INTERMEDIATE</button>
      <button class="start-btn r" onclick="startGame('advanced')">ADVANCED</button>
    </div>`;
  overlay.style.display='flex';
}

function showMsg(t){msgEl.innerHTML=t.replace(/\n/g,'<br>');msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}
function updateUI(){
  hiEl.textContent=hiScore;scEl.textContent=score;
  lvEl.textContent=wave;lfEl.textContent=lives;fuEl.textContent=Math.round(fuel);
}

// ── Render loop ───────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  frameCount++;
  if(gstate==='playing') update();
  // Beacon pulse
  enemies.forEach(e=>{
    if(!e.alive)return;
    e.mesh.children.forEach(c=>{
      if(c.isPointLight) c.intensity=0.8+Math.sin(frameCount*0.08)*0.4;
    });
  });
  renderer.render(scene,camera);
}


// Touch overlay postMessage bridge
window.addEventListener("message",function(e){
  if(!e.data||e.data.type!=="key")return;
  const key=e.data.key;
  const code=key==="ArrowUp"?"ArrowUp":key==="ArrowDown"?"ArrowDown":
             key==="ArrowLeft"?"ArrowLeft":key==="ArrowRight"?"ArrowRight":"Space";
  document.dispatchEvent(new KeyboardEvent("keydown",{key,code,bubbles:true,cancelable:true}));
  setTimeout(()=>document.dispatchEvent(new KeyboardEvent("keyup",{key,code,bubbles:true,cancelable:true})),80);
});
// ── Boot ──────────────────────────────────────────────────
updateUI();
loop();

const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode) startGame('intermediate');
</script>
