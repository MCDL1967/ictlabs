<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ZAXXON</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Audiowide',sans-serif;}
canvas{display:block;image-rendering:pixelated;}
#ui{color:#fff;text-align:center;margin-bottom:6px;font-size:11px;letter-spacing:2px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;}
#ui .sc{color:#ff0;} #ui .hi{color:#f80;} #ui .lv{color:#0cf;} #ui .lf{color:#f44;} #ui .fu{color:#0f0;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;z-index:10;}
#overlay h1{font-size:clamp(28px,5vw,56px);color:#ff0;text-shadow:0 0 24px #ff0;margin-bottom:8px;letter-spacing:6px;}
.sub{font-size:clamp(8px,1.2vw,12px);color:rgba(255,255,255,0.5);margin-bottom:24px;letter-spacing:2px;line-height:2.2;}
.start-btn{background:transparent;border:2px solid #ff0;color:#ff0;font-family:'Audiowide',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:2px;padding:13px 48px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:#ff0;color:#000;}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Audiowide',sans-serif;font-size:clamp(14px,2.5vw,22px);color:#ff0;letter-spacing:3px;pointer-events:none;display:none;z-index:9;animation:blink .7s step-end infinite;text-align:center;line-height:1.8;}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">WAVE: <b id="lvEl">1</b></span>
  <span class="lf">SHIPS: <b id="lfEl">3</b></span>
  <span class="fu">FUEL: <b id="fuEl">100</b>%</span>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="overlay">
  <h1>ZAXXON</h1>
  <p class="sub">Diagonal space fortress assault<br>↑↓ Altitude &nbsp;·&nbsp; ←→ Strafe &nbsp;·&nbsp; Space Fire<br>Shadow shows your altitude · Watch the fuel!</p>
  <button class="start-btn" id="startBtn">START GAME</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ZAXXON — Diagonal pseudo-3D · ICTLabs Arcade
//  Approach: top-down diagonal scroll (NE→SW),
//  altitude shown by vertical position + shadow offset
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const hiEl=document.getElementById('hiEl'),scEl=document.getElementById('scEl');
const lvEl=document.getElementById('lvEl'),lfEl=document.getElementById('lfEl');
const fuEl=document.getElementById('fuEl'),msgEl=document.getElementById('msg');

const W=640,H=480;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize();window.addEventListener('resize',resize);

// ── Audio ────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='square'){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+0.01);}catch(e){}}
function sfxShoot(){tone(880,0.06,0.15);}
function sfxBoom(f=200){try{const b=AC.createBuffer(1,AC.sampleRate*.25,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();s.buffer=b;fl.type='bandpass';fl.frequency.value=f;fl.Q.value=.8;s.connect(fl);fl.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);s.start();s.stop(AC.currentTime+.26);}catch(e){}}
function sfxDie(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>tone(f,.15,.3,'sawtooth'),i*90));}
function sfxFuel(){[660,880].forEach((f,i)=>setTimeout(()=>tone(f,.08,.2),i*80));}
function sfxWave(){[523,659,784,1047,784].forEach((f,i)=>setTimeout(()=>tone(f,.1,.25),i*80));}
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();},{once:false});

// ── World → Screen projection ─────────────────────
// World: x=strafe (0..WORLD_W), y=scroll depth, z=altitude (0..MAX_ALT)
// Screen: diagonal scroll — world y increases as terrain scrolls toward player
// Screen X = world_x * CELL + world_y * DIAG_X (diagonal offset)
// Screen Y = world_y * DIAG_Y - world_z * ALT_SCALE (altitude raises object up)
const WORLD_W=12;
const CELL=48;
const DIAG_X=0.5;  // diagonal X skew per world-y unit
const DIAG_Y=0.6;  // diagonal Y advance per world-y unit
const ALT_SCALE=18; // pixels per altitude unit
const MAX_ALT=8, MIN_ALT=0;
const GROUND_Y=H*0.82; // screen Y where ground level (z=0) at scroll=0

function toScreen(wx,wy,wz){
  const sx = wx*CELL + wy*CELL*DIAG_X;
  const sy = GROUND_Y - wy*CELL*DIAG_Y - wz*ALT_SCALE;
  return{sx,sy};
}

// Shadow: same as toScreen but wz=0
function toShadow(wx,wy,wz){
  const sx = wx*CELL + wy*CELL*DIAG_X;
  const sy = GROUND_Y - wy*CELL*DIAG_Y;
  return{sx,sy};
}

// ── Constants ────────────────────────────────────
const SCROLL_SPD=0.9; // pixels per frame (ground tile advance)
const PLAYER_SPD_X=0.06;
const PLAYER_SPD_Z=0.05;
const MAX_FUEL=100;

// ── State ────────────────────────────────────────
let score,hiScore=0,lives,wave,fuel;
let player,bullets,enemies,walls,fuelTanks,explosions;
let scrollOffset=0; // how far ground has scrolled (in world-y units)
let gstate='idle',frameCount=0,fireCooldown=0;
const keys={};

function startGame(){
  overlay.style.display='none';hideMsg();
  score=0;lives=3;wave=1;fuel=MAX_FUEL;
  initWave();gstate='playing';
}

function initWave(){
  scrollOffset=0;
  // Player fixed at screen bottom-left area, world x=4, z=4
  player={wx:4,wz:4,dead:false,deadTimer:0,invincible:120};
  bullets=[];explosions=[];
  enemies=buildEnemies(wave);
  walls=buildWalls(wave);
  fuelTanks=buildFuel(wave);
  updateUI();
}

// Objects are placed at world_y values (how far ahead they are)
// They scroll toward the player as scrollOffset increases
// Effective world_y on screen = placed_y - scrollOffset
// When effective_y < -1, object has passed the player

function buildEnemies(w){
  const list=[];
  const count=6+w*2;
  for(let i=0;i<count;i++){
    list.push({
      wx:1+Math.random()*(WORLD_W-2),
      placed_y:8+i*3+Math.random()*2,
      wz:2+Math.floor(Math.random()*5),
      type:Math.random()<0.35?'missile':'turret',
      alive:true,
      shootTimer:100+Math.random()*100,
      vwx:(Math.random()-0.5)*0.015,
    });
  }
  // Boss
  list.push({
    wx:WORLD_W/2,placed_y:8+count*3+20,
    wz:4,type:'boss',alive:true,
    shootTimer:60,vwx:0.025,
    hp:3+w,maxHp:3+w
  });
  return list;
}

function buildWalls(w){
  const list=[];
  for(let i=0;i<4+w;i++){
    const py=12+i*15;
    const gap=1+Math.floor(Math.random()*(WORLD_W-3));
    const gapW=2;
    for(let x=0;x<WORLD_W;x++){
      if(x<gap||x>=gap+gapW){
        list.push({wx:x,placed_y:py,height:2+Math.floor(Math.random()*4),alive:true});
      }
    }
  }
  return list;
}

function buildFuel(w){
  return Array.from({length:5},(_,i)=>({
    wx:1+Math.random()*(WORLD_W-2),
    placed_y:7+i*9+Math.random()*4,
    collected:false
  }));
}

// ── Input ────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(e.code===k)e.preventDefault();});
  if(gstate==='idle'&&e.code==='Space'){startGame();return;}
  if(gstate==='dead_wait'&&e.code==='Space'){respawn();return;}
  if(gstate==='playing'&&e.code==='Space'&&fireCooldown<=0)shoot();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('startBtn').onclick=startGame;

function shoot(){
  // Bullet travels in +y direction (forward/away) and forward diagonally
  bullets.push({
    wx:player.wx,
    placed_y:scrollOffset+2, // starts just ahead of player
    wz:player.wz,
    alive:true,age:0,enemy:false,
    speed:0.18
  });
  fireCooldown=10;sfxShoot();
}

// ── Update ───────────────────────────────────────
function update(){
  frameCount++;
  if(fireCooldown>0)fireCooldown--;

  if(player.dead){player.deadTimer--;if(player.deadTimer<=0)killPlayer2();return;}
  if(player.invincible>0)player.invincible--;

  // Input
  const spd=PLAYER_SPD_X;
  if(keys['ArrowLeft']||keys['KeyA'])  player.wx=Math.max(0.5,player.wx-spd);
  if(keys['ArrowRight']||keys['KeyD']) player.wx=Math.min(WORLD_W-0.5,player.wx+spd);
  if(keys['ArrowUp']||keys['KeyW'])    player.wz=Math.min(MAX_ALT,player.wz+PLAYER_SPD_Z);
  if(keys['ArrowDown']||keys['KeyS'])  player.wz=Math.max(MIN_ALT,player.wz-PLAYER_SPD_Z);
  if(keys['Space']&&fireCooldown<=0)   shoot();

  // Scroll world
  scrollOffset+=SCROLL_SPD*(1+wave*0.08)/CELL;

  // Fuel drain
  fuel=Math.max(0,fuel-0.018*(1+wave*0.04));
  if(fuel<=0){player.dead=true;player.deadTimer=60;sfxDie();}

  // Player effective world y is always ~2 units ahead of scroll origin
  const playerEffY=2; // player is always at this effective y on screen

  // Move player bullets forward
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.enemy){
      // Enemy bullets scroll with world + move toward player
      b.placed_y-=b.speed;
      b.wx+=b.vwx||0;
      b.wz+=b.vwz||0;
      b.age++;
      if(b.age>90||b.placed_y<scrollOffset-1){bullets.splice(i,1);continue;}
      // Hit player
      if(!player.dead&&player.invincible<=0){
        const eff_y=b.placed_y-scrollOffset;
        if(Math.abs(eff_y-playerEffY)<0.9&&Math.abs(b.wx-player.wx)<0.9&&Math.abs(b.wz-player.wz)<1.0){
          player.dead=true;player.deadTimer=60;sfxDie();bullets.splice(i,1);
        }
      }
    } else {
      b.placed_y+=b.speed;
      b.age++;
      if(b.age>100){bullets.splice(i,1);continue;}
      // Hit enemies
      let hit=false;
      enemies.forEach(e=>{
        if(!e.alive||!b.alive||hit)return;
        const eff_y=e.placed_y-scrollOffset;
        const b_eff_y=b.placed_y-scrollOffset;
        if(Math.abs(b.wx-e.wx)<1.1&&Math.abs(b_eff_y-eff_y)<1.0&&Math.abs(b.wz-e.wz)<1.2){
          hit=true;b.alive=false;
          if(e.type==='boss'){
            e.hp--;spawnBoom(e.wx,e.placed_y,e.wz);sfxBoom(400);
            if(e.hp<=0){e.alive=false;score+=2000;sfxBoom(250);setTimeout(waveComplete,1800);}
          } else {
            e.alive=false;score+=e.type==='missile'?150:100;
            spawnBoom(e.wx,e.placed_y,e.wz);sfxBoom(e.type==='missile'?300:200);
          }
          updateUI();
        }
      });
      // Hit walls
      walls.forEach(w=>{
        if(!w.alive||!b.alive)return;
        const eff_y=w.placed_y-scrollOffset;
        const b_eff_y=b.placed_y-scrollOffset;
        if(Math.abs(b.wx-w.wx)<0.8&&Math.abs(b_eff_y-eff_y)<0.6&&b.wz<w.height+0.3){
          b.alive=false;w.alive=false;
          spawnBoom(w.wx,w.placed_y,w.height/2);sfxBoom(150);score+=50;updateUI();
        }
      });
      if(!b.alive)bullets.splice(i,1);
    }
  }

  // Enemy movement + shooting
  enemies.forEach(e=>{
    if(!e.alive)return;
    const eff_y=e.placed_y-scrollOffset;
    // Lateral movement
    if(e.type==='missile'||e.type==='boss'){e.wx+=e.vwx;if(e.wx<0.5||e.wx>WORLD_W-0.5)e.vwx*=-1;}
    // Shoot
    e.shootTimer--;
    if(e.shootTimer<=0&&eff_y>0&&eff_y<12){
      e.shootTimer=60+Math.random()*80;
      const dvwx=(player.wx-e.wx)*0.02;
      const dvwz=(player.wz-e.wz)*0.015;
      bullets.push({wx:e.wx,placed_y:e.placed_y,wz:e.wz,alive:true,age:0,enemy:true,speed:0.12,vwx:dvwx,vwz:dvwz});
    }
    // Collide with player
    if(!player.dead&&player.invincible<=0){
      if(Math.abs(eff_y-playerEffY)<0.9&&Math.abs(e.wx-player.wx)<0.9&&Math.abs(e.wz-player.wz)<1.0){
        player.dead=true;player.deadTimer=60;sfxDie();
      }
    }
  });

  // Wall collision with player
  if(!player.dead&&player.invincible<=0){
    walls.forEach(w=>{
      if(!w.alive)return;
      const eff_y=w.placed_y-scrollOffset;
      if(Math.abs(eff_y-playerEffY)<0.6&&Math.abs(w.wx-player.wx)<0.9&&player.wz<w.height){
        player.dead=true;player.deadTimer=60;sfxDie();
      }
    });
  }

  // Fuel collect
  fuelTanks.forEach(f=>{
    if(f.collected)return;
    const eff_y=f.placed_y-scrollOffset;
    if(Math.abs(eff_y-playerEffY)<0.8&&Math.abs(f.wx-player.wx)<0.8&&player.wz<1.5){
      f.collected=true;fuel=Math.min(MAX_FUEL,fuel+30);sfxFuel();updateUI();
    }
  });

  // Explosions
  for(let i=explosions.length-1;i>=0;i--){
    const ex=explosions[i];
    ex.life--;ex.wx+=ex.vwx;ex.wz+=ex.vwz;
    if(ex.life<=0)explosions.splice(i,1);
  }

  updateUI();
}

function spawnBoom(wx,placed_y,wz){
  for(let i=0;i<8;i++){
    explosions.push({wx:wx+(Math.random()-.5)*.5,placed_y:placed_y+(Math.random()-.5)*.3,wz:wz+(Math.random()-.5)*.4,vwx:(Math.random()-.5)*.02,vwz:Math.random()*.02,life:20+Math.random()*15,maxLife:35,hue:15+Math.random()*30});
  }
}

function killPlayer2(){lives--;updateUI();if(lives<=0){gameOver();return;}gstate='dead_wait';showMsg('SHIP DESTROYED\nSPACE TO CONTINUE');}
function respawn(){hideMsg();player.wx=4;player.wz=4;player.dead=false;player.deadTimer=0;player.invincible=180;fuel=Math.min(MAX_FUEL,fuel+20);gstate='playing';}
function waveComplete(){wave++;sfxWave();showMsg(`WAVE ${wave-1} CLEAR!`);setTimeout(()=>{initWave();hideMsg();},2500);}

function gameOver(){
  gstate='gameover';if(score>hiScore)hiScore=score;updateUI();
  overlay.innerHTML=`<h1 style="font-size:clamp(22px,4vw,44px);color:#f44;text-shadow:0 0 20px #f44;margin-bottom:16px;">GAME OVER</h1><p style="font-size:clamp(8px,1.2vw,12px);color:#aaa;margin-bottom:24px;letter-spacing:2px;">SCORE: ${score} · HI: ${hiScore}</p><button class="start-btn" id="retryBtn" style="border-color:#f44;color:#f44;">PLAY AGAIN</button>`;
  overlay.style.display='flex';
  document.getElementById('retryBtn').onclick=()=>{lives=3;wave=1;score=0;fuel=MAX_FUEL;initWave();updateUI();overlay.style.display='none';gstate='playing';};
}

// ── Draw ─────────────────────────────────────────
function draw(){
  // Space background
  ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);

  // Stars (parallax)
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<100;i++){ctx.fillRect((i*173+frameCount*.2)%W,(i*97)%H,1,1);}

  // ── Ground tiles — diagonal scroll ──
  // Tiles drawn at screen positions based on scrollOffset
  // A tile at world_y=py appears at effective_y = py - scrollOffset
  // We draw tiles for a range of effective_y values
  const startTile=Math.floor(scrollOffset)-2;
  const endTile=startTile+20;

  for(let ty=startTile;ty<endTile;ty++){
    for(let tx=-1;tx<=WORLD_W;tx++){
      const eff_y=ty-scrollOffset;
      // Screen position of tile corner
      const sx=tx*CELL+eff_y*CELL*DIAG_X;
      const sy=GROUND_Y-eff_y*CELL*DIAG_Y;
      if(sy>H+CELL||sy<-CELL)continue;

      // Diamond tile
      const tl={x:sx,          y:sy};
      const tr={x:sx+CELL,     y:sy};
      const br={x:sx+CELL+CELL*DIAG_X, y:sy-CELL*DIAG_Y};
      const bl={x:sx+CELL*DIAG_X,      y:sy-CELL*DIAG_Y};

      const checker=(tx+ty)%2;
      ctx.fillStyle=checker?'#0a1a08':'#061208';
      ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();ctx.fill();
      // Grid lines
      ctx.strokeStyle='rgba(0,80,20,0.3)';ctx.lineWidth=0.5;ctx.stroke();
    }
  }

  // ── Collect draw items, sort by effective_y descending (furthest first) ──
  const playerEffY=2;
  const items=[];

  walls.forEach(w=>{
    if(!w.alive)return;
    const eff_y=w.placed_y-scrollOffset;
    if(eff_y>-1&&eff_y<14)items.push({t:'wall',o:w,eff_y});
  });
  fuelTanks.forEach(f=>{
    if(f.collected)return;
    const eff_y=f.placed_y-scrollOffset;
    if(eff_y>-1&&eff_y<14)items.push({t:'fuel',o:f,eff_y});
  });
  enemies.forEach(e=>{
    if(!e.alive)return;
    const eff_y=e.placed_y-scrollOffset;
    if(eff_y>-2&&eff_y<14)items.push({t:'enemy',o:e,eff_y});
  });
  bullets.forEach(b=>{
    const eff_y=b.placed_y-scrollOffset;
    items.push({t:'bullet',o:b,eff_y});
  });
  // Player at fixed effective_y
  if(!player.dead||(player.dead&&Math.floor(frameCount/6)%2===0))
    items.push({t:'player',o:player,eff_y:playerEffY});
  explosions.forEach(ex=>{
    const eff_y=ex.placed_y-scrollOffset;
    items.push({t:'boom',o:ex,eff_y});
  });

  // Sort: larger eff_y = further away = draw first
  items.sort((a,b)=>b.eff_y-a.eff_y);

  items.forEach(({t,o,eff_y})=>{
    if(t==='wall'){
      const {sx,sy}=toScreen(o.wx,eff_y,0);
      const sh=o.height*ALT_SCALE;
      // Wall column
      ctx.fillStyle='#3a5a3a';
      ctx.fillRect(sx-CELL/2+2,sy-sh,CELL-4,sh);
      // Top cap
      ctx.fillStyle='#5a8a5a';
      ctx.fillRect(sx-CELL/2+2,sy-sh-4,CELL-4,6);
      // Warning beacon
      if(Math.floor(frameCount/12)%2===0){
        ctx.fillStyle='#f00';ctx.shadowBlur=8;ctx.shadowColor='#f00';
        ctx.beginPath();ctx.arc(sx,sy-sh-8,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      }
    }

    if(t==='fuel'){
      const {sx,sy}=toScreen(o.wx,eff_y,0);
      ctx.fillStyle='#0a0';ctx.fillRect(sx-12,sy-18,24,18);
      ctx.fillStyle='#0f0';ctx.fillRect(sx-10,sy-16,20,14);
      ctx.fillStyle='#0f0';ctx.font='7px Audiowide';ctx.textAlign='center';ctx.fillText('FUEL',sx,sy-20);
    }

    if(t==='enemy'){
      const {sx,sy}=toScreen(o.wx,eff_y,o.wz);
      const {sx:gsx,sy:gsy}=toShadow(o.wx,eff_y,o.wz);
      // Shadow on ground
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(gsx,gsy,14,5,0,0,Math.PI*2);ctx.fill();

      if(o.type==='turret'){
        ctx.fillStyle='#888';ctx.fillRect(sx-10,sy-4,20,12);
        ctx.fillStyle='#aaa';ctx.fillRect(sx-3,sy-18,6,16);
        ctx.fillStyle='rgba(255,180,0,0.5)';ctx.beginPath();ctx.arc(sx,sy-20,5,0,Math.PI*2);ctx.fill();
      }
      if(o.type==='missile'){
        ctx.shadowBlur=8;ctx.shadowColor='#f80';
        ctx.fillStyle='#f80';ctx.fillRect(sx-4,sy-14,8,18);
        ctx.fillStyle='#ff0';ctx.beginPath();ctx.moveTo(sx,sy-18);ctx.lineTo(sx-5,sy-12);ctx.lineTo(sx+5,sy-12);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
      }
      if(o.type==='boss'){
        ctx.shadowBlur=16;ctx.shadowColor='#f00';
        ctx.fillStyle='#cc0000';ctx.fillRect(sx-18,sy-22,36,28);
        ctx.fillStyle='#aa0000';ctx.fillRect(sx-10,sy-34,20,14);
        ctx.fillStyle='#ff0';ctx.fillRect(sx-7,sy-30,5,5);ctx.fillRect(sx+2,sy-30,5,5);
        ctx.fillStyle='#880000';ctx.fillRect(sx-28,sy-20,12,9);ctx.fillRect(sx+16,sy-20,12,9);
        ctx.fillStyle='#440000';ctx.fillRect(sx-18,sy-42,36,5);
        ctx.fillStyle='#f00';ctx.fillRect(sx-18,sy-42,(o.hp/o.maxHp)*36,5);
        ctx.shadowBlur=0;
      }
    }

    if(t==='bullet'){
      const {sx,sy}=toScreen(o.wx,eff_y,o.wz);
      ctx.shadowBlur=6;
      if(o.enemy){ctx.fillStyle='#f44';ctx.shadowColor='#f44';}
      else{ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
      ctx.fillRect(sx-2,sy-8,4,12);ctx.shadowBlur=0;
    }

    if(t==='player'){
      const {sx,sy}=toScreen(o.wx,eff_y,o.wz);
      const {sx:gsx,sy:gsy}=toShadow(o.wx,eff_y,o.wz);
      // Shadow — shows altitude
      const altFrac=o.wz/MAX_ALT;
      const shadowSize=18-altFrac*8;
      ctx.fillStyle=`rgba(0,150,255,${0.3-altFrac*0.2})`;
      ctx.beginPath();ctx.ellipse(gsx,gsy,shadowSize,shadowSize*0.4,0,0,Math.PI*2);ctx.fill();
      // Altitude line from shadow to ship
      if(o.wz>0.5){
        ctx.strokeStyle='rgba(0,180,255,0.25)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(gsx,gsy);ctx.lineTo(sx,sy+12);ctx.stroke();ctx.setLineDash([]);
      }
      // Ship
      const flash=o.invincible>0&&Math.floor(frameCount/6)%2===0;
      if(!flash){
        ctx.shadowBlur=14;ctx.shadowColor='#4af';
        ctx.fillStyle='#4af';
        ctx.beginPath();
        // Diagonal fighter shape
        ctx.moveTo(sx,sy-16);      // nose
        ctx.lineTo(sx+14,sy+4);    // right wing
        ctx.lineTo(sx+6,sy+2);
        ctx.lineTo(sx,sy+8);       // tail
        ctx.lineTo(sx-6,sy+2);
        ctx.lineTo(sx-14,sy+4);    // left wing
        ctx.closePath();ctx.fill();
        ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(sx,sy-4,5,0,Math.PI*2);ctx.fill();
        const engineGlow=0.4+Math.sin(frameCount*.4)*.15;
        ctx.fillStyle=`rgba(100,200,255,${engineGlow})`;ctx.beginPath();ctx.arc(sx,sy+10,4,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
    }

    if(t==='boom'){
      const {sx,sy}=toScreen(o.wx,eff_y,o.wz);
      const alpha=o.life/o.maxLife;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=`hsl(${o.hue},100%,${50+alpha*30}%)`;
      ctx.beginPath();ctx.arc(sx,sy,3+(1-alpha)*7,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  });

  // ── HUD: altitude meter ──
  drawMeter(W-22,60,100,'ALT','#0ff',player.wz/MAX_ALT);
  drawMeter(W-22,180,100,'FUEL','#0f0',fuel/MAX_FUEL,fuel<25);

  ctx.textAlign='left';
}

function drawMeter(x,y,h,label,color,frac,warn=false){
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(x-2,y-2,14,h+4);
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.strokeRect(x-2,y-2,14,h+4);
  ctx.fillStyle=warn?'#f44':color;
  ctx.fillRect(x,y+h-frac*h,10,frac*h);
  ctx.fillStyle=color;ctx.font='7px Audiowide';ctx.textAlign='center';ctx.fillText(label,x+5,y-6);
}

function showMsg(t){msgEl.innerHTML=t.replace(/\n/g,'<br>');msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}
function updateUI(){hiEl.textContent=hiScore;scEl.textContent=score;lvEl.textContent=wave;lfEl.textContent=lives;fuEl.textContent=Math.round(fuel);}

function loop(){requestAnimationFrame(loop);frameCount++;if(gstate==='playing')update();draw();}

updateUI();loop();
const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode)startGame();
</script>
