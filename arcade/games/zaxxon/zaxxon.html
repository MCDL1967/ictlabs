<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ZAXXON</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Audiowide',sans-serif;}
canvas{display:block;image-rendering:pixelated;}
#ui{color:#fff;text-align:center;margin-bottom:6px;font-size:11px;letter-spacing:2px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;}
#ui .sc{color:#ff0;} #ui .hi{color:#f80;} #ui .lv{color:#0cf;} #ui .lf{color:#f44;} #ui .fu{color:#0f0;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;z-index:10;}
#overlay h1{font-size:clamp(28px,5vw,56px);color:#ff0;text-shadow:0 0 24px #ff0;margin-bottom:8px;letter-spacing:6px;}
#overlay .sub{font-size:clamp(8px,1.2vw,12px);color:rgba(255,255,255,0.5);margin-bottom:24px;letter-spacing:2px;line-height:2;}
.start-btn{background:transparent;border:2px solid #ff0;color:#ff0;font-family:'Audiowide',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:2px;padding:13px 48px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:#ff0;color:#000;}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:'Audiowide',sans-serif;font-size:clamp(14px,2.5vw,22px);color:#ff0;letter-spacing:3px;pointer-events:none;display:none;z-index:9;animation:blink .7s step-end infinite;text-align:center;line-height:1.8;}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">WAVE: <b id="lvEl">1</b></span>
  <span class="lf">SHIPS: <b id="lfEl">3</b></span>
  <span class="fu">FUEL: <b id="fuEl">100</b>%</span>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="overlay">
  <h1>ZAXXON</h1>
  <p class="sub">Isometric space fortress assault<br>↑↓ Altitude &nbsp;·&nbsp; ←→ Strafe &nbsp;·&nbsp; Space Fire<br>Destroy turrets · Collect fuel · Reach the robot</p>
  <button class="start-btn" id="startBtn">START GAME</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  ZAXXON — Isometric shooter · ICTLabs Arcade
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const hiEl=document.getElementById('hiEl'),scEl=document.getElementById('scEl');
const lvEl=document.getElementById('lvEl'),lfEl=document.getElementById('lfEl');
const fuEl=document.getElementById('fuEl'),msgEl=document.getElementById('msg');

const W=640,H=480;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize();window.addEventListener('resize',resize);

// ── Audio ────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='square'){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+0.01);}catch(e){}}
function sfxShoot(){tone(880,0.06,0.15);}
function sfxBoom(f=200){try{const b=AC.createBuffer(1,AC.sampleRate*.25,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();s.buffer=b;fl.type='bandpass';fl.frequency.value=f;fl.Q.value=.8;s.connect(fl);fl.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.4,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);s.start();s.stop(AC.currentTime+.26);}catch(e){}}
function sfxDie(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>tone(f,.15,.3,'sawtooth'),i*90));}
function sfxFuel(){[660,880].forEach((f,i)=>setTimeout(()=>tone(f,.08,.2),i*80));}
function sfxWave(){[523,659,784,1047,784,659].forEach((f,i)=>setTimeout(()=>tone(f,.1,.25),i*80));}
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();},{once:false});

// ── Iso projection ───────────────────────────────
// Player moves in world space: wx=strafe, wz=altitude
// Enemies are placed ahead and scroll toward player (wDepth decreases)
const CX=W/2, CY=H*0.45;
const TW=40, TH=20;
function iso(wx,depth,wz){
  return{
    sx: CX+(wx-depth)*(TW/2),
    sy: CY+(wx+depth)*(TH/2)-wz*TH
  };
}

// ── Constants ────────────────────────────────────
const WORLD_W=7;
const MAX_ALT=8,MIN_ALT=1;
const SCROLL=0.06;
const MAX_FUEL=100;
let score,hiScore=0,lives,wave,fuel;
let player,bullets,enemies,walls,fuelTanks,explosions;
let gstate='idle',frameCount=0,fireCooldown=0;
const keys={};

function startGame(){
  overlay.style.display='none';hideMsg();
  score=0;lives=3;wave=1;fuel=MAX_FUEL;
  initWave();gstate='playing';
}

function initWave(){
  player={wx:WORLD_W/2,wz:4,invincible:120,dead:false,deadTimer:0};
  bullets=[];explosions=[];
  enemies=buildEnemies(wave);
  walls=buildWalls(wave);
  fuelTanks=buildFuel();
  updateUI();
}

// Enemies placed at positive depth values ahead of player
// depth decreases as world scrolls — when depth < 0 they're behind
function buildEnemies(w){
  const list=[];
  const count=5+w*2;
  for(let i=0;i<count;i++){
    list.push({
      wx:0.5+Math.random()*(WORLD_W-1),
      depth:8+i*3.5+Math.random()*2,
      wz:2+Math.floor(Math.random()*6),
      type:Math.random()<0.35?'missile':'turret',
      alive:true,
      shootTimer:80+Math.random()*80,
      vx:(Math.random()-0.5)*0.02,
    });
  }
  // Boss at end
  list.push({
    wx:WORLD_W/2,depth:8+count*3.5+15,
    wz:4,type:'boss',alive:true,
    shootTimer:60,vx:0.03,
    hp:3+w,maxHp:3+w
  });
  return list;
}

function buildWalls(w){
  const list=[];
  for(let i=0;i<3+w;i++){
    const depth=12+i*14;
    const gap=1+Math.floor(Math.random()*(WORLD_W-2));
    for(let x=0;x<WORLD_W;x++){
      if(x<gap||x>gap+1){
        list.push({wx:x,depth,height:2+Math.floor(Math.random()*3),alive:true});
      }
    }
  }
  return list;
}

function buildFuel(){
  return Array.from({length:4},(_,i)=>({
    wx:0.5+Math.random()*(WORLD_W-1),
    depth:6+i*10+Math.random()*4,
    collected:false
  }));
}

// ── Input ────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k=>{if(e.code===k)e.preventDefault();});
  if(gstate==='idle'&&e.code==='Space'){startGame();return;}
  if(gstate==='dead_wait'&&e.code==='Space'){respawn();return;}
  if(gstate==='playing'&&e.code==='Space'&&fireCooldown<=0){shoot();}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('startBtn').onclick=startGame;

function shoot(){
  bullets.push({wx:player.wx,depth:player.depth||0,wz:player.wz,alive:true,age:0,enemy:false});
  fireCooldown=10;sfxShoot();
}

// ── Update ───────────────────────────────────────
function update(){
  frameCount++;
  if(fireCooldown>0)fireCooldown--;

  if(player.dead){player.deadTimer--;if(player.deadTimer<=0)killPlayer2();return;}
  if(player.invincible>0)player.invincible--;

  // Player input
  const spd=0.07;
  if(keys['ArrowLeft']||keys['KeyA']) player.wx=Math.max(0.3,player.wx-spd);
  if(keys['ArrowRight']||keys['KeyD']) player.wx=Math.min(WORLD_W-0.3,player.wx+spd);
  if(keys['ArrowUp']||keys['KeyW'])   player.wz=Math.min(MAX_ALT,player.wz+spd*0.6);
  if(keys['ArrowDown']||keys['KeyS']) player.wz=Math.max(MIN_ALT,player.wz-spd*0.6);
  if(keys['Space']&&fireCooldown<=0)  shoot();

  // Fuel
  fuel=Math.max(0,fuel-0.02*(1+wave*0.05));
  if(fuel<=0){player.dead=true;player.deadTimer=60;sfxDie();}

  // Scroll — all objects' depth decreases toward player
  const scrollSpd=SCROLL*(1+wave*0.08);
  enemies.forEach(e=>{if(e.alive)e.depth-=scrollSpd;});
  walls.forEach(w=>{if(w.alive)w.depth-=scrollSpd;});
  fuelTanks.forEach(f=>{if(!f.collected)f.depth-=scrollSpd;});

  // Enemy lateral movement
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.type==='missile'||e.type==='boss'){
      e.wx+=e.vx;
      if(e.wx<0.3||e.wx>WORLD_W-0.3)e.vx*=-1;
    }
    // Enemy shoot
    e.shootTimer--;
    if(e.shootTimer<=0&&e.type!=='boss'){
      e.shootTimer=60+Math.random()*80;
      bullets.push({wx:e.wx,depth:e.depth,wz:e.wz,alive:true,age:0,enemy:true,
        vwx:(player.wx-e.wx)*0.02, vdepth:SCROLL*2, vwz:(player.wz-e.wz)*0.015});
    }
    if(e.type==='boss'&&e.shootTimer<=0){
      e.shootTimer=45+Math.random()*30;
      bullets.push({wx:e.wx,depth:e.depth,wz:e.wz,alive:true,age:0,enemy:true,
        vwx:0,vdepth:SCROLL*2.5,vwz:0});
    }
    // Out of range — remove
    if(e.depth<-5)e.alive=false;
  });

  // Move player bullets forward
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(!b.enemy){
      b.depth+=0.3;b.age++;
      if(b.age>80){bullets.splice(i,1);continue;}
      // Hit enemy
      let hit=false;
      enemies.forEach(e=>{
        if(!e.alive||!b.alive||hit)return;
        const d=Math.hypot(b.wx-e.wx,b.depth-e.depth)*1.2+Math.abs(b.wz-e.wz)*0.5;
        if(d<1.0){
          hit=true;b.alive=false;
          if(e.type==='boss'){
            e.hp--;spawnBoom(e.wx,e.depth,e.wz);sfxBoom(400);
            if(e.hp<=0){e.alive=false;score+=2000;sfxBoom(250);setTimeout(waveComplete,1500);}
          }else{
            e.alive=false;
            score+=(e.type==='missile'?150:100);
            spawnBoom(e.wx,e.depth,e.wz);sfxBoom(e.type==='missile'?300:200);
          }
          updateUI();
        }
      });
      // Hit wall
      walls.forEach(w=>{
        if(!w.alive||!b.alive)return;
        if(Math.abs(b.wx-w.wx)<0.7&&Math.abs(b.depth-w.depth)<0.4&&b.wz<w.height){
          b.alive=false;w.alive=false;
          spawnBoom(w.wx,w.depth,w.height/2);sfxBoom(150);score+=50;updateUI();
        }
      });
      if(!b.alive){bullets.splice(i,1);}
    } else {
      // Enemy bullets move toward where player was
      b.depth-=b.vdepth||SCROLL*2;
      if(b.vwx)b.wx+=b.vwx;
      if(b.vwz)b.wz+=b.vwz;
      b.age++;
      if(b.age>70){bullets.splice(i,1);continue;}
      // Hit player
      if(!player.dead&&player.invincible<=0){
        const d=Math.hypot(b.wx-player.wx)+Math.abs(b.wz-player.wz)*0.5+Math.abs(b.depth)*0.3;
        if(d<1.2){player.dead=true;player.deadTimer=60;sfxDie();bullets.splice(i,1);}
      }
    }
  }

  // Wall collision
  if(!player.dead&&player.invincible<=0){
    walls.forEach(w=>{
      if(!w.alive)return;
      if(Math.abs(player.wx-w.wx)<0.7&&Math.abs(w.depth)<0.6&&player.wz<w.height){
        player.dead=true;player.deadTimer=60;sfxDie();
      }
    });
    // Enemy collision
    enemies.forEach(e=>{
      if(!e.alive)return;
      if(Math.abs(e.wx-player.wx)<0.8&&Math.abs(e.depth)<0.8&&Math.abs(e.wz-player.wz)<0.8){
        player.dead=true;player.deadTimer=60;sfxDie();
      }
    });
  }

  // Fuel collect
  fuelTanks.forEach(f=>{
    if(f.collected)return;
    if(Math.abs(f.wx-player.wx)<0.8&&Math.abs(f.depth)<0.8&&player.wz<2.5){
      f.collected=true;fuel=Math.min(MAX_FUEL,fuel+30);sfxFuel();updateUI();
    }
  });

  // Explosions
  for(let i=explosions.length-1;i>=0;i--){
    explosions[i].life--;
    explosions[i].wx+=explosions[i].vx;
    explosions[i].wz+=explosions[i].vz;
    if(explosions[i].life<=0)explosions.splice(i,1);
  }

  updateUI();
}

function spawnBoom(wx,depth,wz){
  for(let i=0;i<6;i++){
    explosions.push({
      wx:wx+(Math.random()-.5)*.4,
      depth:depth+(Math.random()-.5)*.4,
      wz:wz+(Math.random()-.5)*.4,
      vx:(Math.random()-.5)*.03,
      vz:Math.random()*.03,
      life:15+Math.random()*15,
      maxLife:30,
      hue:20+Math.random()*30
    });
  }
}

function killPlayer2(){lives--;updateUI();if(lives<=0){gameOver();return;}gstate='dead_wait';showMsg('SHIP DESTROYED\nSPACE TO CONTINUE');}
function respawn(){hideMsg();player.wx=WORLD_W/2;player.wz=4;player.dead=false;player.deadTimer=0;player.invincible=180;fuel=Math.min(MAX_FUEL,fuel+20);gstate='playing';}
function waveComplete(){wave++;sfxWave();showMsg(`WAVE ${wave-1} CLEAR!\nPREPARING WAVE ${wave}...`);setTimeout(()=>{initWave();hideMsg();},2500);}

function gameOver(){
  gstate='gameover';if(score>hiScore)hiScore=score;updateUI();
  overlay.innerHTML=`<h1 style="font-size:clamp(22px,4vw,44px);color:#f44;text-shadow:0 0 20px #f44;margin-bottom:16px;">GAME OVER</h1><p style="font-size:clamp(8px,1.2vw,12px);color:#aaa;margin-bottom:24px;letter-spacing:2px;">SCORE: ${score} &nbsp;·&nbsp; HI: ${hiScore}</p><button class="start-btn" id="retryBtn" style="border-color:#f44;color:#f44;">PLAY AGAIN</button>`;
  overlay.style.display='flex';
  document.getElementById('retryBtn').onclick=()=>{lives=3;wave=1;score=0;fuel=MAX_FUEL;initWave();updateUI();overlay.style.display='none';gstate='playing';};
}

// ── Draw ─────────────────────────────────────────
function draw(){
  // Sky
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#000010');grad.addColorStop(1,'#000c20');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<80;i++){ctx.fillRect((i*173+frameCount*.15)%W,(i*97)%H,1,1);}

  // Ground tiles
  for(let gx=-1;gx<=WORLD_W+1;gx++){
    for(let d=-1;d<=10;d++){
      const p=iso(gx,d,0);
      if(p.sy<-10||p.sy>H+10)continue;
      const checker=(gx+Math.floor(d))%2;
      ctx.fillStyle=checker?'#0a1a0a':'#050f05';
      ctx.beginPath();
      const a=iso(gx,d,0),b=iso(gx+1,d,0),c=iso(gx+1,d+1,0),e=iso(gx,d+1,0);
      ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.lineTo(c.sx,c.sy);ctx.lineTo(e.sx,e.sy);
      ctx.closePath();ctx.fill();
    }
  }

  // Collect draw items sorted by depth (furthest first = largest depth)
  const items=[];

  walls.forEach(w=>{if(w.alive&&w.depth>-2&&w.depth<12)items.push({t:'wall',o:w,d:w.depth});});
  fuelTanks.forEach(f=>{if(!f.collected&&f.depth>-2&&f.depth<12)items.push({t:'fuel',o:f,d:f.depth});});
  enemies.forEach(e=>{if(e.alive&&e.depth>-3&&e.depth<12)items.push({t:'enemy',o:e,d:e.depth});});
  bullets.forEach(b=>{items.push({t:'bullet',o:b,d:b.depth});});
  if(!player.dead||(player.dead&&Math.floor(frameCount/6)%2===0))
    items.push({t:'player',o:player,d:0});
  explosions.forEach(ex=>{items.push({t:'boom',o:ex,d:ex.depth});});

  items.sort((a,b)=>b.d-a.d);

  items.forEach(({t,o})=>{
    if(t==='wall'){
      isoBox(o.wx,o.depth,0,0.85,0.25,o.height,'#445544','#223322','#334433');
      if(Math.floor(frameCount/15)%2===0){
        const {sx,sy}=iso(o.wx+.4,o.depth+.1,o.height);
        ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
      }
    }
    if(t==='fuel'){
      isoBox(o.wx-.25,o.depth-.1,0,.5,.2,.5,'#00aa00','#005500','#007700');
      const {sx,sy}=iso(o.wx,o.depth,.7);
      ctx.fillStyle='#0f0';ctx.font='7px Audiowide';ctx.textAlign='center';ctx.fillText('FUEL',sx,sy-2);
    }
    if(t==='enemy'){
      const {sx,sy}=iso(o.wx,o.depth,o.wz);
      if(o.type==='turret'){
        isoBox(o.wx-.25,o.depth-.1,o.wz-.4,.5,.2,.4,'#888','#444','#666');
        ctx.fillStyle='#aaa';ctx.fillRect(sx-3,sy-12,6,13);
        ctx.fillStyle='rgba(255,180,0,0.4)';ctx.beginPath();ctx.arc(sx,sy-14,4,0,Math.PI*2);ctx.fill();
      }
      if(o.type==='missile'){
        ctx.fillStyle='#f80';ctx.shadowBlur=8;ctx.shadowColor='#f80';
        ctx.fillRect(sx-4,sy-8,8,14);
        ctx.fillStyle='#ff0';ctx.beginPath();ctx.moveTo(sx,sy-12);ctx.lineTo(sx-4,sy-8);ctx.lineTo(sx+4,sy-8);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
      }
      if(o.type==='boss'){
        ctx.shadowBlur=16;ctx.shadowColor='#f00';
        ctx.fillStyle='#cc0000';ctx.fillRect(sx-14,sy-18,28,22);
        ctx.fillStyle='#aa0000';ctx.fillRect(sx-8,sy-28,16,12);
        ctx.fillStyle='#ff0';ctx.fillRect(sx-6,sy-25,4,4);ctx.fillRect(sx+2,sy-25,4,4);
        ctx.fillStyle='#880000';ctx.fillRect(sx-22,sy-16,10,7);ctx.fillRect(sx+12,sy-16,10,7);
        // HP bar
        ctx.fillStyle='#440000';ctx.fillRect(sx-14,sy-36,28,4);
        ctx.fillStyle='#f00';ctx.fillRect(sx-14,sy-36,(o.hp/o.maxHp)*28,4);
        ctx.shadowBlur=0;
      }
    }
    if(t==='bullet'){
      const {sx,sy}=iso(o.wx,o.depth,o.wz);
      ctx.shadowBlur=6;
      if(o.enemy){ctx.fillStyle='#f44';ctx.shadowColor='#f44';}
      else{ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';}
      ctx.fillRect(sx-2,sy-6,4,10);
      ctx.shadowBlur=0;
    }
    if(t==='player'){
      const {sx,sy}=iso(o.wx,0,o.wz);
      const flash=o.invincible>0&&Math.floor(frameCount/6)%2===0;
      if(!flash){
        ctx.shadowBlur=14;ctx.shadowColor='#4af';
        ctx.fillStyle='#4af';
        ctx.beginPath();ctx.moveTo(sx,sy-14);ctx.lineTo(sx-10,sy+4);ctx.lineTo(sx-5,sy+2);ctx.lineTo(sx,sy+6);ctx.lineTo(sx+5,sy+2);ctx.lineTo(sx+10,sy+4);ctx.closePath();ctx.fill();
        ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(sx,sy-4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(100,200,255,${.5+Math.sin(frameCount*.3)*.2})`;
        ctx.beginPath();ctx.arc(sx,sy+8,3,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        // Shadow on ground
        const {sx:gsx,sy:gsy}=iso(o.wx,0,0);
        ctx.fillStyle='rgba(0,150,255,0.15)';
        ctx.beginPath();ctx.ellipse(gsx,gsy+4,8,4,0,0,Math.PI*2);ctx.fill();
      }
    }
    if(t==='boom'){
      const {sx,sy}=iso(o.wx,o.depth,o.wz);
      const alpha=o.life/o.maxLife;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=`hsl(${o.hue},100%,${50+alpha*30}%)`;
      ctx.beginPath();ctx.arc(sx,sy,3+(1-alpha)*6,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  });

  // HUD — altitude meter
  const mx=W-20,my=70,mh=110;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(mx-2,my-2,12,mh+4);
  ctx.strokeStyle='#0ff';ctx.lineWidth=1;ctx.strokeRect(mx-2,my-2,12,mh+4);
  const af=((player.wz-MIN_ALT)/(MAX_ALT-MIN_ALT))*mh;
  ctx.fillStyle='#0ff';ctx.fillRect(mx,my+mh-af,8,af);
  ctx.fillStyle='#0ff';ctx.font='7px Audiowide';ctx.textAlign='center';ctx.fillText('ALT',mx+4,my-6);

  // Fuel meter
  const fmy=my+mh+20;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(mx-2,fmy-2,12,mh+4);
  ctx.strokeStyle='#0f0';ctx.lineWidth=1;ctx.strokeRect(mx-2,fmy-2,12,mh+4);
  const ff=(fuel/MAX_FUEL)*mh;
  ctx.fillStyle=fuel<25?'#f44':'#0f0';ctx.fillRect(mx,fmy+mh-ff,8,ff);
  ctx.fillStyle='#0f0';ctx.font='7px Audiowide';ctx.textAlign='center';ctx.fillText('FUEL',mx+4,fmy-6);

  ctx.textAlign='left';
}

function isoBox(wx,depth,wz,w,d,h,top,left,right){
  const p=iso(wx,depth,wz+h),q=iso(wx+w,depth,wz+h),g2=iso(wx+w,depth+d,wz+h),f=iso(wx,depth+d,wz+h);
  const a=iso(wx,depth,wz),e=iso(wx,depth+d,wz),c=iso(wx+w,depth+d,wz);
  ctx.fillStyle=top;ctx.beginPath();ctx.moveTo(p.sx,p.sy);ctx.lineTo(q.sx,q.sy);ctx.lineTo(g2.sx,g2.sy);ctx.lineTo(f.sx,f.sy);ctx.closePath();ctx.fill();
  ctx.fillStyle=left;ctx.beginPath();ctx.moveTo(p.sx,p.sy);ctx.lineTo(a.sx,a.sy);ctx.lineTo(e.sx,e.sy);ctx.lineTo(f.sx,f.sy);ctx.closePath();ctx.fill();
  ctx.fillStyle=right;ctx.beginPath();ctx.moveTo(f.sx,f.sy);ctx.lineTo(e.sx,e.sy);ctx.lineTo(c.sx,c.sy);ctx.lineTo(g2.sx,g2.sy);ctx.closePath();ctx.fill();
}

function showMsg(t){msgEl.innerHTML=t.replace(/\n/g,'<br>');msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}
function updateUI(){hiEl.textContent=hiScore;scEl.textContent=score;lvEl.textContent=wave;lfEl.textContent=lives;fuEl.textContent=Math.round(fuel);}

function loop(){requestAnimationFrame(loop);frameCount++;if(gstate==='playing')update();draw();}

updateUI();loop();
const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode)startGame();
</script>
