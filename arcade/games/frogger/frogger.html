<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>FROGGER</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Audiowide',sans-serif;}
canvas{display:block;image-rendering:pixelated;}
#ui{color:#fff;text-align:center;margin-bottom:6px;font-size:11px;letter-spacing:2px;display:flex;gap:24px;justify-content:center;align-items:center;}
#ui .sc{color:#0f0;} #ui .hi{color:#ff0;} #ui .lv{color:#0cf;} #ui .lf{color:#f44;} #ui .tm{color:#f80;}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;z-index:10;}
#overlay h1{font-size:clamp(32px,6vw,60px);color:#0f0;text-shadow:0 0 24px #0f0;margin-bottom:8px;letter-spacing:6px;}
.sub{font-size:clamp(8px,1.2vw,12px);color:rgba(255,255,255,0.5);margin-bottom:24px;letter-spacing:2px;line-height:2.2;}
.start-btn{background:transparent;border:2px solid #0f0;color:#0f0;font-family:'Audiowide',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:2px;padding:13px 48px;cursor:pointer;transition:all 0.15s;}
.start-btn:hover{background:#0f0;color:#000;}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Audiowide',sans-serif;font-size:clamp(12px,2.5vw,20px);color:#ff0;letter-spacing:3px;pointer-events:none;display:none;z-index:9;animation:blink .7s step-end infinite;text-align:center;line-height:1.8;}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">LEVEL: <b id="lvEl">1</b></span>
  <span class="lf">LIVES: <b id="lfEl">3</b></span>
  <span class="tm">TIME: <b id="tmEl">30</b></span>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="overlay">
  <h1>FROGGER</h1>
  <p class="sub">Get all frogs safely home<br>↑↓←→ or WASD to hop<br>Avoid cars · Ride logs & turtles · Don't drown!</p>
  <button class="start-btn" id="startBtn">START GAME</button>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const hiEl=document.getElementById('hiEl'),scEl=document.getElementById('scEl');
const lvEl=document.getElementById('lvEl'),lfEl=document.getElementById('lfEl');
const tmEl=document.getElementById('tmEl'),msgEl=document.getElementById('msg');

const COLS=13,ROWS=14,CELL=40;
const W=COLS*CELL,H=ROWS*CELL;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize();window.addEventListener('resize',resize);

// Audio
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.15,t='square'){try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d+0.01);}catch(e){}}
function sfxHop(){tone(440,0.04,0.12);}
function sfxSquash(){[330,200,100].forEach((f,i)=>setTimeout(()=>tone(f,.12,.25,'sawtooth'),i*60));}
function sfxDrown(){tone(220,.3,.25,'sawtooth');}
function sfxHome(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.1,.2),i*80));}
function sfxTimeout(){[440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,.15,.25,'sawtooth'),i*100));}
function sfxLevel(){[523,659,784,1047,784,659,523].forEach((f,i)=>setTimeout(()=>tone(f,.1,.2),i*70));}
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();});

// Row types (bottom=0 to top=13)
const ROW_TYPE=[
  'safe',
  'road','road','road','road','road',
  'safe',
  'water','water','water','water','water',
  'safe',
  'homes'
];

function rowY(r){return(ROWS-1-r)*CELL;}

function makeLanes(lv){
  const s=0.8+lv*0.2;
  return[
    null,
    {type:'car',   dir:-1,spd:s*1.2,w:CELL,   obs:[{x:80},{x:240},{x:400}],  color:'#f44'},
    {type:'car',   dir: 1,spd:s*1.5,w:CELL*2, obs:[{x:0}, {x:220},{x:400}],  color:'#f80'},
    {type:'truck', dir:-1,spd:s*0.8,w:CELL*3, obs:[{x:60},{x:300}],           color:'#fa0'},
    {type:'car',   dir: 1,spd:s*1.2,w:CELL,   obs:[{x:40},{x:200},{x:360}],   color:'#f44'},
    {type:'car',   dir:-1,spd:s*1.0,w:CELL,   obs:[{x:20},{x:180},{x:340}],   color:'#f80'},
    null,
    {type:'turtle',dir:-1,spd:s*0.6,w:CELL*2, obs:[{x:20},{x:200},{x:360}]},
    {type:'log',   dir: 1,spd:s*1.0,w:CELL*3, obs:[{x:60},{x:280}]},
    {type:'log',   dir:-1,spd:s*0.8,w:CELL*2, obs:[{x:0}, {x:200},{x:360}]},
    {type:'turtle',dir: 1,spd:s*0.7,w:CELL*2, obs:[{x:100},{x:300}]},
    {type:'log',   dir:-1,spd:s*1.1,w:CELL*3, obs:[{x:80},{x:320}]},
    null,
    null
  ];
}

let lanes,frog,homesReached,score,hiScore=0,lives,level,timeLeft,timerInterval,frameCount,gstate;
const HOME_SLOTS=[1,3,5,7,9];

function startGame(){
  overlay.style.display='none';hideMsg();
  score=0;lives=3;level=1;
  startLevel();gstate='playing';
}

function startLevel(){
  lanes=makeLanes(level);
  homesReached=new Set();
  resetFrog();
  timeLeft=Math.max(15,30-level*2);
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gstate!=='playing')return;
    timeLeft--;
    if(timeLeft<=0){sfxTimeout();killFrog('time');}
    updateUI();
  },1000);
  frameCount=0;updateUI();
}

function resetFrog(){
  frog={col:6,row:0,px:6*CELL+CELL/2,py:rowY(0)+CELL/2,dead:false,deadTimer:0,onRider:null};
}

let moveLock=false;
const MOVES={ArrowUp:{dr:1},ArrowDown:{dr:-1},ArrowLeft:{dc:-1},ArrowRight:{dc:1},
             KeyW:{dr:1},KeyS:{dr:-1},KeyA:{dc:-1},KeyD:{dc:1}};
document.addEventListener('keydown',e=>{
  if(gstate==='idle'&&e.code==='Space'){startGame();return;}
  if(gstate==='dead_wait'&&e.code==='Space'){resetFrog();gstate='playing';hideMsg();return;}
  if(gstate!=='playing'||moveLock||frog.dead)return;
  const m=MOVES[e.code];if(!m)return;
  e.preventDefault();
  const nr=frog.row+(m.dr||0),nc=frog.col+(m.dc||0);
  if(nc<0||nc>=COLS||nr<0||nr>=ROWS)return;
  frog.row=nr;frog.col=nc;
  frog.px=nc*CELL+CELL/2;frog.py=rowY(nr)+CELL/2;
  sfxHop();
  if(m.dr>0)score+=10;
  moveLock=true;setTimeout(()=>{moveLock=false;},120);
  checkLanding();updateUI();
});
document.getElementById('startBtn').onclick=startGame;

function checkLanding(){
  if(ROW_TYPE[frog.row]==='homes'){
    const slot=HOME_SLOTS.indexOf(frog.col);
    if(slot>=0&&!homesReached.has(slot)){
      homesReached.add(slot);score+=200+timeLeft*10;sfxHome();updateUI();
      if(homesReached.size>=HOME_SLOTS.length){
        clearInterval(timerInterval);gstate='levelup';
        showMsg(`LEVEL ${level} CLEAR!`);sfxLevel();
        setTimeout(()=>{level++;startLevel();hideMsg();gstate='playing';},2000);
      } else {resetFrog();}
    } else {killFrog('squash');}
  }
}

function update(){
  frameCount++;
  if(frog.dead){
    frog.deadTimer--;
    if(frog.deadTimer<=0){
      if(lives<=0){gameOver();return;}
      gstate='dead_wait';showMsg('SPACE TO CONTINUE');
    }
    return;
  }
  const row=frog.row,type=ROW_TYPE[row],lane=lanes[row];
  frog.onRider=null;

  if(type==='water'&&lane){
    let riding=false;
    const totalW=W+(lane.w||CELL)*2;
    lane.obs.forEach(ob=>{
      if(riding)return;
      const ox=((ob.x+lane.spd*frameCount*lane.dir)%totalW+totalW)%totalW-lane.w;
      const lw=lane.w;
      if(frog.px>=ox&&frog.px<=ox+lw){
        if(lane.type==='turtle'){
          const divePhase=Math.floor(frameCount/100+ob.x/50)%5;
          if(divePhase<3){riding=true;frog.onRider={dx:lane.spd*lane.dir};}
        } else {
          riding=true;frog.onRider={dx:lane.spd*lane.dir};
        }
      }
    });
    if(!riding){killFrog('drown');return;}
  }

  if(frog.onRider){
    frog.px+=frog.onRider.dx;
    frog.col=Math.round((frog.px-CELL/2)/CELL);
    if(frog.px<0||frog.px>W){killFrog('drown');return;}
  }

  if(type==='road'&&lane){
    const totalW=W+(lane.w||CELL)*2;
    lane.obs.forEach(ob=>{
      const ox=((ob.x+lane.spd*frameCount*lane.dir)%totalW+totalW)%totalW-lane.w;
      const lw=lane.w;
      if(frog.px>ox+4&&frog.px<ox+lw-4)killFrog('squash');
    });
  }
}

function killFrog(reason){
  if(frog.dead)return;
  frog.dead=true;frog.deadTimer=45;
  if(reason==='squash')sfxSquash();else sfxDrown();
  lives--;updateUI();
}

function gameOver(){
  clearInterval(timerInterval);gstate='gameover';
  if(score>hiScore)hiScore=score;updateUI();
  overlay.innerHTML=`<h1 style="font-size:clamp(22px,4vw,44px);color:#f44;margin-bottom:16px;">GAME OVER</h1><p style="color:#aaa;margin-bottom:24px;font-size:12px;letter-spacing:2px;">SCORE: ${score} · HI: ${hiScore}</p><button class="start-btn" id="rb" style="border-color:#f44;color:#f44;">PLAY AGAIN</button>`;
  overlay.style.display='flex';
  document.getElementById('rb').onclick=()=>{score=0;lives=3;level=1;overlay.style.display='none';startLevel();gstate='playing';};
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Row backgrounds
  for(let r=0;r<ROWS;r++){
    const y=rowY(r),type=ROW_TYPE[r];
    if(type==='road')      ctx.fillStyle=r%2?'#2d2d2d':'#333';
    else if(type==='water')ctx.fillStyle=r%2?'#002255':'#003080';
    else if(type==='homes')ctx.fillStyle='#001a00';
    else                   ctx.fillStyle='#1a3a1a';
    ctx.fillRect(0,y,W,CELL);
    if(type==='road'){ctx.fillStyle='rgba(255,220,0,0.18)';ctx.fillRect(0,y+CELL/2-1,W,2);}
    if(type==='water'){
      ctx.fillStyle='rgba(50,150,255,0.12)';
      for(let x=0;x<W;x+=24)ctx.fillRect((x+(frameCount*1.5+r*20)%24)%W,y+CELL/3,12,3);
    }
  }

  // Home slots
  const homeY=rowY(13);
  HOME_SLOTS.forEach((col,i)=>{
    const hx=col*CELL;
    ctx.fillStyle=homesReached&&homesReached.has(i)?'#005500':'#000a00';
    ctx.fillRect(hx+2,homeY+2,CELL-4,CELL-4);
    if(homesReached&&homesReached.has(i)){
      drawFrogAt(hx+CELL/2,homeY+CELL/2,0.55,true);
    } else {
      ctx.strokeStyle='#0f0';ctx.lineWidth=1.5;ctx.strokeRect(hx+3,homeY+3,CELL-6,CELL-6);
    }
  });

  // Obstacles
  for(let r=0;r<ROWS;r++){
    const lane=lanes[r];if(!lane)continue;
    const y=rowY(r),totalW=W+(lane.w||CELL)*2;
    lane.obs.forEach(ob=>{
      const ox=((ob.x+lane.spd*frameCount*lane.dir)%totalW+totalW)%totalW-lane.w;
      const lw=lane.w;
      if(lane.type==='log'){
        ctx.fillStyle='#7a3a10';ctx.fillRect(ox+2,y+7,lw-4,CELL-14);
        ctx.fillStyle='#a05020';ctx.fillRect(ox+6,y+9,lw-12,CELL-18);
        ctx.fillStyle='rgba(0,0,0,0.2)';
        for(let i=1;i<lw/CELL;i++)ctx.fillRect(ox+i*CELL-1,y+7,2,CELL-14);
        ctx.fillStyle='#5a2808';ctx.fillRect(ox+2,y+7,6,CELL-14);ctx.fillRect(ox+lw-8,y+7,6,CELL-14);
      }
      if(lane.type==='turtle'){
        const divePhase=Math.floor(frameCount/100+ob.x/50)%5;
        const diving=divePhase>=3;
        for(let t=0;t<lw/CELL;t++){
          const tx=ox+t*CELL;
          if(diving){
            ctx.fillStyle='rgba(0,100,80,0.5)';
            ctx.beginPath();ctx.ellipse(tx+CELL/2,y+CELL/2,CELL/2-4,CELL/2-8,0,0,Math.PI*2);ctx.fill();
          } else {
            ctx.fillStyle='#2a7a40';
            ctx.beginPath();ctx.ellipse(tx+CELL/2,y+CELL/2,CELL/2-4,CELL/2-6,0,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#3a9a55';
            ctx.beginPath();ctx.ellipse(tx+CELL/2,y+CELL/2,CELL/2-8,CELL/2-10,0,0,Math.PI*2);ctx.fill();
            const hx2=tx+CELL/2+(lane.dir>0?12:-12);
            ctx.fillStyle='#2a7a40';ctx.beginPath();ctx.arc(hx2,y+CELL/2,5,0,Math.PI*2);ctx.fill();
          }
        }
      }
      if(lane.type==='car'||lane.type==='truck'){
        const col=lane.color||'#f44';
        ctx.fillStyle=col;ctx.fillRect(ox+2,y+6,lw-4,CELL-12);
        ctx.fillStyle='rgba(180,220,255,0.7)';
        const wsX=lane.dir>0?ox+lw-14:ox+4;
        ctx.fillRect(wsX,y+9,10,CELL-18);
        ctx.fillStyle='#111';
        [y+4,y+CELL-9].forEach(wy=>{ctx.fillRect(ox+4,wy,8,5);ctx.fillRect(ox+lw-12,wy,8,5);});
        ctx.fillStyle='#ffa';
        const hlX=lane.dir>0?ox+lw-4:ox+2;
        ctx.fillRect(hlX,y+8,3,4);ctx.fillRect(hlX,y+CELL-12,3,4);
      }
    });
  }

  // Frog
  if(!frog.dead||(frog.dead&&Math.floor(frameCount/5)%2===0)){
    const deathProg=frog.dead?1-(frog.deadTimer/45):0;
    drawFrogAt(frog.px,frog.py,1,false,deathProg);
  }

  // Time bar
  const maxTime=Math.max(15,30-level*2);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(0,H-3,W,3);
  ctx.fillStyle=timeLeft<8?'#f44':'#f80';
  ctx.fillRect(0,H-3,(timeLeft/maxTime)*W,3);

  // Visible border — the only addition to original
  ctx.shadowBlur=10;ctx.shadowColor='rgba(0,255,80,0.6)';
  ctx.strokeStyle='rgba(0,255,80,0.85)';ctx.lineWidth=3;
  ctx.strokeRect(1.5,1.5,W-3,H-3);
  ctx.shadowBlur=0;
}

function drawFrogAt(px,py,scale=1,home=false,death=0){
  ctx.save();ctx.translate(px,py);ctx.scale(scale,scale);
  if(death>0){ctx.globalAlpha=1-death*0.8;ctx.scale(1+death,1+death);}
  ctx.fillStyle=home?'#1a8a1a':'#22cc22';
  ctx.beginPath();ctx.ellipse(0,0,11,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(-8,-2,16,1);ctx.fillRect(-8,2,16,1);
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-5,-7,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-7,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-5,-7,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-7,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=home?'#1a8a1a':'#22cc22';
  ctx.fillRect(-18,-2,8,4);ctx.fillRect(10,-2,8,4);
  ctx.fillRect(-16,4,7,4);ctx.fillRect(9,4,7,4);
  ctx.restore();
}

function showMsg(t){msgEl.innerHTML=t.replace(/\n/g,'<br>');msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}
function updateUI(){hiEl.textContent=hiScore;scEl.textContent=score;lvEl.textContent=level;lfEl.textContent=Math.max(0,lives);tmEl.textContent=timeLeft;}
function loop(){requestAnimationFrame(loop);if(gstate==='playing')update();draw();}

gstate='idle';updateUI();loop();
const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode)startGame();
</script>
</body>
</html>
