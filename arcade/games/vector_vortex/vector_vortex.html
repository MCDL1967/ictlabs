<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VECTOR VORTEX</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#02040a;font-family:'Audiowide',sans-serif;color:#dff;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#ui{height:46px;min-height:46px;width:100%;display:flex;align-items:center;justify-content:center;gap:26px;color:#9ff;text-shadow:0 0 9px #0ff;font-size:11px;letter-spacing:2px;}
#wrap{position:relative;display:flex;align-items:center;justify-content:center;}
canvas{display:block;background:radial-gradient(circle at center,#061019 0%,#02040a 72%,#000 100%);image-rendering:pixelated;box-shadow:0 0 22px rgba(0,255,255,.28), inset 0 0 28px rgba(0,255,255,.12);border:1px solid rgba(0,255,255,.32);}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:10;padding:24px;}
#overlay h1{font-size:clamp(32px,7vw,66px);letter-spacing:7px;color:#fff;text-shadow:0 0 8px #fff,0 0 19px #0ff,0 0 34px #0ff;margin-bottom:12px;}
#overlay h2{font-size:14px;color:#ff0;text-shadow:0 0 10px #ff0;margin-bottom:24px;letter-spacing:3px;}
#overlay p{max-width:680px;white-space:pre-line;line-height:1.7;font-size:12px;color:#bff;letter-spacing:1.5px;margin-bottom:24px;}
.btn{background:transparent;border:2px solid #0ff;color:#0ff;font-family:'Audiowide',sans-serif;font-size:13px;letter-spacing:2px;padding:13px 42px;cursor:pointer;box-shadow:0 0 14px rgba(0,255,255,.35);}
.btn:hover{background:#0ff;color:#001;}
#msg{position:fixed;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;pointer-events:none;font-size:20px;color:#ff0;text-shadow:0 0 10px #ff0;letter-spacing:3px;animation:blink .7s infinite;display:none;z-index:5;}
@keyframes blink{50%{opacity:.25}}
</style>
</head>
<body>
<div id="ui"><span>SCORE <b id="score">0</b></span><span>HI <b id="hi">0</b></span><span>LIVES <b id="lives">3</b></span><span>WAVE <b id="wave">1</b></span></div>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="msg">WAVE CLEAR</div>
<div id="overlay"><h1>VECTOR VORTEX</h1><h2>NEON VECTOR SPACE COMBAT</h2><p>Rotate, thrust, and survive the asteroid field.
Use shields when the screen gets ugly.

Arrow Keys / WASD = fly
Mobile TRACKPAD = steer/thrust
Space / FIRE = fire
Shift = shield
P / PAUSE = pause</p><button class="btn" id="startBtn">START GAME</button></div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=640,H=480; canvas.width=W; canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize(); addEventListener('resize',resize);

const $=id=>document.getElementById(id);
const scoreEl=$('score'),hiEl=$('hi'),livesEl=$('lives'),waveEl=$('wave'),overlay=$('overlay'),msg=$('msg');
let AC, master;
function audio(){ if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)(); master=AC.createGain(); master.gain.value=.16; master.connect(AC.destination);} if(AC.state==='suspended')AC.resume(); }
document.addEventListener('keydown',audio,{once:false});
function tone(freq,dur=.08,type='square',vol=.35,slide=0){ if(!AC) return; const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.setValueAtTime(freq,t); if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),t+dur); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.02); }
function noise(dur=.22,vol=.25,low=500){ if(!AC) return; const len=AC.sampleRate*dur,b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0); for(let i=0;i<len;i++)d[i]=Math.random()*2-1; const src=AC.createBufferSource(),f=AC.createBiquadFilter(),g=AC.createGain(); src.buffer=b; f.type='lowpass'; f.frequency.value=low; g.gain.setValueAtTime(vol,AC.currentTime); g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur); src.connect(f); f.connect(g); g.connect(master); src.start(); }
function sfxFire(){tone(900,.055,'square',.25,-420)} function sfxThrust(){tone(70,.045,'sawtooth',.08,20)} function sfxBoom(){noise(.38,.48,760);tone(90,.22,'sawtooth',.22,-50)} function sfxHit(){tone(160,.18,'triangle',.25,-90);noise(.18,.2,900)} function sfxShield(){tone(520,.08,'sine',.18,200)} function sfxWave(){[330,440,660,880].forEach((f,i)=>setTimeout(()=>tone(f,.09,'square',.2),i*70));}
const keys={}; document.addEventListener('keydown',e=>{ if(e.code!=='Escape') keys[e.code]=true; if(e.code==='KeyP'&&state==='playing'){paused=!paused; showMsg(paused?'PAUSED':'', paused?999:0);} }); document.addEventListener('keyup',e=>{ if(e.code!=='Escape') keys[e.code]=false; });

// ICTLabs Mobile Input API v4.6
let lastMobilePause=false;
function getICTInput(){
  return window.ICTLabsInput || (window.parent && window.parent.ICTLabsInput) || null;
}
function pollICTPause(input){
  if(!input) return;
  if(input.pause && !lastMobilePause && state==='playing'){
    paused=!paused;
    showMsg(paused?'PAUSED':'', paused?999:0);
  }
  lastMobilePause=!!input.pause;
}
const rnd=(a,b)=>a+Math.random()*(b-a), TAU=Math.PI*2;
function wrap(o){ if(o.x<0)o.x+=W; if(o.x>W)o.x-=W; if(o.y<0)o.y+=H; if(o.y>H)o.y-=H; }
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.hypot(dx,dy)}
let ship,rocks,shots,particles,score,hi,lives,wave,state='idle',paused=false,fireCd=0,inv=0,shield=100,shieldCd=0;
try{hi=Number(localStorage.getItem('vector_vortex_hi')||0)}catch(e){hi=0} hiEl.textContent=hi;
function newShip(){ ship={x:W/2,y:H/2,vx:0,vy:0,a:-Math.PI/2,r:13}; inv=120; shield=100; }
function makeRock(x,y,size){ const pts=[],n=Math.floor(rnd(8,13)); for(let i=0;i<n;i++){pts.push(rnd(.65,1.28));} return {x,y,vx:rnd(-1.15,1.15)*(4-size),vy:rnd(-1.15,1.15)*(4-size),a:rnd(0,TAU),va:rnd(-.025,.025),size,r:size*14+12,pts}; }
function spawnWave(){ rocks=[]; const count=3+wave; for(let i=0;i<count;i++){ let x,y; do{x=rnd(0,W);y=rnd(0,H)}while(Math.hypot(x-W/2,y-H/2)<120); rocks.push(makeRock(x,y,3)); }}
function startGame(mode='1p'){ audio(); overlay.style.display='none'; state='playing'; paused=false; score=0;lives=3;wave=1;shots=[];particles=[];newShip();spawnWave();updateUI(); }
$('startBtn').onclick=()=>startGame('1p');
document.addEventListener('keydown',e=>{ if((state==='idle'||state==='gameover')&&(e.code==='Space'||e.code==='Enter')) startGame('1p'); if(state==='gameover'&&e.code==='KeyR') startGame('1p'); });
function updateUI(){ scoreEl.textContent=score; livesEl.textContent=lives; waveEl.textContent=wave; hiEl.textContent=hi; }
function showMsg(t,frames=95){ msg.textContent=t; msg.style.display=t?'block':'none'; if(frames>0)setTimeout(()=>{ if(msg.textContent===t) msg.style.display='none';},frames*16); }
function explode(x,y,n=18,c='#0ff'){ for(let i=0;i<n;i++){ const a=rnd(0,TAU),s=rnd(.5,3.2); particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(20,48),c}); }}
function shoot(){ if(fireCd>0)return; fireCd=11; shots.push({x:ship.x+Math.cos(ship.a)*16,y:ship.y+Math.sin(ship.a)*16,vx:ship.vx+Math.cos(ship.a)*6.8,vy:ship.vy+Math.sin(ship.a)*6.8,life:58}); sfxFire(); }
function damageShip(){ if(inv>0)return; if(shield>20 && (keys.ShiftLeft||keys.ShiftRight)){ shield-=28; inv=38; sfxShield(); return; } lives--; sfxHit(); explode(ship.x,ship.y,34,'#ff0'); if(lives<=0){ gameOver(); } else { newShip(); } updateUI(); }
function gameOver(){ state='gameover'; if(score>hi){hi=score; try{localStorage.setItem('vector_vortex_hi',hi)}catch(e){} } updateUI(); overlay.innerHTML='<h1>GAME OVER</h1><h2>SCORE '+score+'</h2><p>Press ENTER or SPACE to launch again.</p><button class="btn" id="again">PLAY AGAIN</button>'; overlay.style.display='flex'; document.getElementById('again').onclick=()=>startGame('1p'); }
function splitRock(r){ score += r.size===3?50:r.size===2?100:200; explode(r.x,r.y,12+r.size*5,r.size===1?'#ff0':'#0ff'); sfxBoom(); if(r.size>1){ rocks.push(makeRock(r.x,r.y,r.size-1),makeRock(r.x,r.y,r.size-1)); } updateUI(); }
function update(){ 
 const ict=getICTInput(); 
 pollICTPause(ict);
 if(state!=='playing'||paused)return; fireCd=Math.max(0,fireCd-1); inv=Math.max(0,inv-1); shieldCd=Math.max(0,shieldCd-1); if(shield<100)shield+=.08;
 const mx=ict?ict.moveX:0, my=ict?ict.moveY:0, mm=ict?ict.magnitude:0;
 const left=keys.ArrowLeft||keys.KeyA||mx<-0.18,right=keys.ArrowRight||keys.KeyD||mx>0.18,up=keys.ArrowUp||keys.KeyW||my<-0.18,down=keys.ArrowDown||keys.KeyS||my>0.18;
 const analogTurn=ict?mx:0;
 const analogThrust=ict?Math.max(0,-my):0;
 if(ict && Math.abs(analogTurn)>.18) ship.a+=analogTurn*.095;
 else { if(left)ship.a-=.085; if(right)ship.a+=.085; }
 if(up){const thrust=ict?(.08+analogThrust*.12):.13; ship.vx+=Math.cos(ship.a)*thrust;ship.vy+=Math.sin(ship.a)*thrust; if(Math.random()<.35)sfxThrust(); particles.push({x:ship.x-Math.cos(ship.a)*15,y:ship.y-Math.sin(ship.a)*15,vx:-Math.cos(ship.a)*rnd(1,2)+rnd(-.5,.5),vy:-Math.sin(ship.a)*rnd(1,2)+rnd(-.5,.5),life:18,c:'#f80'});}
 if(down){ship.vx*=.985; ship.vy*=.985;} if(keys.Space||(ict&&ict.fire))shoot(); ship.vx*=.992; ship.vy*=.992; ship.x+=ship.vx; ship.y+=ship.vy; wrap(ship);
 for(const s of shots){s.x+=s.vx;s.y+=s.vy;s.life--;wrap(s);} shots=shots.filter(s=>s.life>0);
 for(const r of rocks){r.x+=r.vx;r.y+=r.vy;r.a+=r.va;wrap(r);} for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--; } particles=particles.filter(p=>p.life>0);
 for(let i=rocks.length-1;i>=0;i--){const r=rocks[i]; for(let j=shots.length-1;j>=0;j--){ if(dist(r,shots[j])<r.r){shots.splice(j,1);rocks.splice(i,1);splitRock(r);break;} } }
 for(const r of rocks){ if(dist(r,ship)<r.r+ship.r) damageShip(); }
 if(rocks.length===0){ wave++; updateUI(); showMsg('WAVE '+wave,90); sfxWave(); spawnWave(); }
}
function drawShip(){ ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.a); const blink=inv>0&&Math.floor(inv/6)%2===0; if(!blink){ ctx.strokeStyle='#fff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=12; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,-10);ctx.lineTo(-7,0);ctx.lineTo(-12,10);ctx.closePath();ctx.stroke(); if(keys.ArrowUp||keys.KeyW){ctx.strokeStyle='#f80';ctx.shadowColor='#f80';ctx.beginPath();ctx.moveTo(-12,-6);ctx.lineTo(-24,0);ctx.lineTo(-12,6);ctx.stroke();}}
 ctx.restore(); if((keys.ShiftLeft||keys.ShiftRight)&&shield>2){ctx.strokeStyle='rgba(0,255,255,.72)';ctx.shadowColor='#0ff';ctx.shadowBlur=16;ctx.lineWidth=2;ctx.beginPath();ctx.arc(ship.x,ship.y,24+Math.sin(Date.now()/70)*2,0,TAU);ctx.stroke();}}
function drawRock(r){ ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.a);ctx.strokeStyle=r.size===3?'#0ff':r.size===2?'#9ff':'#ff0';ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=9;ctx.lineWidth=2;ctx.beginPath(); for(let i=0;i<r.pts.length;i++){const a=i/r.pts.length*TAU,rad=r.r*r.pts[i]; const x=Math.cos(a)*rad,y=Math.sin(a)*rad; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath();ctx.stroke();ctx.restore(); }
function draw(){ ctx.clearRect(0,0,W,H); ctx.fillStyle='rgba(255,255,255,.22)'; for(let i=0;i<80;i++){ const x=(i*97+wave*13)%W,y=(i*53+Math.floor(Date.now()/90))%H; ctx.fillRect(x,y,1,1);} ctx.save();ctx.globalAlpha=.055;ctx.strokeStyle='#0ff'; for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();} for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();} ctx.restore();
 for(const r of rocks)drawRock(r); ctx.shadowBlur=10;ctx.shadowColor='#ff0';ctx.strokeStyle='#ff0';ctx.lineWidth=2; for(const s of shots){ctx.beginPath();ctx.arc(s.x,s.y,2.4,0,TAU);ctx.stroke();} for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/45);ctx.strokeStyle=p.c;ctx.shadowColor=p.c;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3);ctx.stroke();ctx.globalAlpha=1;} if(state==='playing')drawShip();
 ctx.shadowBlur=0; ctx.fillStyle='#7ff'; ctx.font="10px Audiowide"; ctx.fillText('SHIELD '+Math.floor(shield)+'%',14,H-18); ctx.strokeStyle='rgba(0,255,255,.65)'; ctx.strokeRect(104,H-27,104,10); ctx.fillStyle='rgba(0,255,255,.55)'; ctx.fillRect(106,H-25,Math.max(0,shield),6);
}
function loop(){requestAnimationFrame(loop);update();draw();} loop();
const urlMode=new URLSearchParams(window.location.search).get('mode'); if(urlMode)startGame(urlMode==='2p'?'1p':urlMode);
</script>
</body>
</html>
