<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100vh;overflow:hidden;
  font-family:'Audiowide',sans-serif;
}
canvas{display:block;image-rendering:pixelated;}
#ui{
  color:#fff;text-align:center;
  margin-bottom:8px;font-size:12px;letter-spacing:2px;
  display:flex;gap:28px;justify-content:center;align-items:center;
}
#ui .sc{color:#00ff64;}
#ui .hi{color:#ff0;}
#ui .lv{color:#0cf;}
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#fff;text-align:center;z-index:10;
}
#overlay h1{
  font-size:clamp(32px,6vw,64px);color:#00ff64;
  text-shadow:0 0 24px #00ff64;margin-bottom:20px;letter-spacing:6px;
}
.start-btn{
  background:transparent;border:2px solid #00ff64;color:#00ff64;
  font-family:'Audiowide',sans-serif;font-size:clamp(10px,1.6vw,14px);
  letter-spacing:2px;padding:14px 48px;cursor:pointer;
  margin-top:8px;transition:all 0.15s;
}
.start-btn:hover{background:#00ff64;color:#000;}
.sub{
  font-size:clamp(8px,1.2vw,11px);color:rgba(255,255,255,0.5);
  margin-top:20px;line-height:2.2;letter-spacing:1px;
}
.sub span{color:#00ff64;}
#msgText{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Audiowide',sans-serif;
  font-size:clamp(12px,2.5vw,20px);
  color:#ff0;letter-spacing:3px;
  pointer-events:none;display:none;z-index:9;
  animation:blink .6s step-end infinite;
  text-align:center;line-height:1.8;
}
@keyframes blink{50%{opacity:0}}

#tapBtn{
  display:none;
  position:fixed;bottom:30%;left:50%;transform:translateX(-50%);
  z-index:10;
  background:rgba(0,0,0,0.85);
  border:2px solid #ff0;color:#ff0;
  font-family:'Audiowide',sans-serif;
  font-size:clamp(11px,2vw,15px);
  letter-spacing:2px;padding:14px 36px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
@media (pointer:coarse){
  #tapBtn{ display:block; }
}
</style>
</head>
<body>
<div id="ui">
  <span class="hi">HI: <b id="hiEl">0</b></span>
  <span class="sc">SCORE: <b id="scEl">0</b></span>
  <span class="lv">LEVEL: <b id="lvEl">1</b></span>
</div>
<canvas id="c"></canvas>
<div id="msgText"></div>

<div id="overlay">
  <h1>SNAKE</h1>
  <button class="start-btn" id="startBtn">START GAME</button>
  <p class="sub" data-es>Arrow keys or <span>WASD</span> to move<br>Eat <span>🍎</span> to grow · Avoid walls and yourself<br>Grab <span>⭐ 5×</span> bonus before it disappears!</p>
  <p class="sub" data-en>Arrow keys or <span>WASD</span> to move<br>Eat <span>🍎</span> to grow · Avoid walls and yourself<br>Grab <span>⭐ 5×</span> bonus before it disappears!</p>
</div>
<button id="tapBtn">▶ TAP TO CONTINUE</button>

<script>
// ═══════════════════════════════════════════════════════
//  SNAKE — ICTLabs Arcade
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay= document.getElementById('overlay');
const hiEl   = document.getElementById('hiEl');
const scEl   = document.getElementById('scEl');
const lvEl   = document.getElementById('lvEl');
const msgText= document.getElementById('msgText');

// ── Sizing ─────────────────────────────────────────────
const COLS=28, ROWS=22, CELL=20;
const W=COLS*CELL, H=ROWS*CELL;
canvas.width=W; canvas.height=H;
function resize(){
  const s=Math.min(window.innerWidth/W,(window.innerHeight-52)/H);
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
}
resize(); window.addEventListener('resize',resize);

// ── Web Audio ──────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,vol=0.18,type='square'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
// Classic Snake-style sounds
function sfxEat(){   beep(660,0.06,0.2,'square'); }
function sfxBonus(){ [880,1100,1320].forEach((f,i)=>setTimeout(()=>beep(f,0.07,0.22,'square'),i*55)); }
function sfxDie(){   [330,220,110].forEach((f,i)=>setTimeout(()=>beep(f,0.14,0.3,'sawtooth'),i*100)); }
function sfxTurn(){  beep(220,0.03,0.06,'square'); }
function sfxLevel(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.1,0.2,'square'),i*80)); }
document.addEventListener('keydown',()=>{ if(AC.state==='suspended') AC.resume(); },{once:false});

// ── State ──────────────────────────────────────────────
let snake,dir,nextDir,food,bonus,score,hiScore=0,level,speed,gameLoop,frameCount;
let gstate='idle';

const DIRS={
  ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
  KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}
};

// ── Input ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(gstate==='idle'&&e.code==='Space'){ startGame(); return; }
  if(gstate==='dead'&&e.code==='Space'){ startGame(); return; }
  const d=DIRS[e.code];
  if(!d) return;
  e.preventDefault();
  // Prevent reversing
  if(d.x===dir.x*-1&&d.y===dir.y*-1) return;
  if(nextDir.x!==d.x||nextDir.y!==d.y){ sfxTurn(); nextDir=d; }
});

// ── Menu ──────────────────────────────────────────────
document.getElementById('startBtn').onclick=startGame;

function startGame(){
  overlay.style.display='none';
  hideMsg();
  snake=[{x:Math.floor(COLS/2),y:Math.floor(ROWS/2)}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; level=1; frameCount=0;
  speed=baseSpeed();
  spawnFood(); bonus=null;
  updateUI();
  gstate='playing';
  if(gameLoop) clearInterval(gameLoop);
  gameLoop=setInterval(tick,speed);
}

function baseSpeed(){ return Math.max(60,180-level*12); }

// ── Game tick ──────────────────────────────────────────
function tick(){
  frameCount++;
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};

  // Wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ die(); return; }
  // Self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){ die(); return; }

  snake.unshift(head);

  // Eat food
  if(head.x===food.x&&head.y===food.y){
    score+=10*level; sfxEat(); updateUI();
    spawnFood();
    // Level up every 5 food
    if(score%(50*level)===0){
      level++; sfxLevel(); updateUI();
      clearInterval(gameLoop);
      speed=baseSpeed();
      gameLoop=setInterval(tick,speed);
      showMsg(`LEVEL ${level}`);
      setTimeout(hideMsg,900);
    }
    // Spawn bonus occasionally
    if(!bonus&&Math.random()<0.3) spawnBonus();
  } else if(bonus&&head.x===bonus.x&&head.y===bonus.y){
    score+=50*level; sfxBonus(); updateUI();
    bonus=null;
  } else {
    snake.pop();
  }

  // Expire bonus after 8 seconds
  if(bonus&&frameCount-bonus.frame>8000/speed){ bonus=null; }

  draw();
}

function die(){
  clearInterval(gameLoop);
  if(score>hiScore){ hiScore=score; }
  updateUI(); sfxDie(); gstate='dead';
  showMsg(`GAME OVER\nSPACE TO RETRY`);
}

// ── Food spawning ──────────────────────────────────────
function spawnFood(){
  let pos;
  do{ pos={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y)||(bonus&&bonus.x===pos.x&&bonus.y===pos.y));
  food=pos;
}

function spawnBonus(){
  let pos;
  do{ pos={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y)||pos.x===food.x&&pos.y===food.y);
  bonus={...pos, frame:frameCount};
}

// ── Draw ───────────────────────────────────────────────
function draw(){
  // Background with subtle grid
  ctx.fillStyle='#000d00';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,80,20,0.25)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke();}

  // Visible border
  ctx.strokeStyle='rgba(0,255,80,0.6)';
  ctx.lineWidth=3;
  ctx.shadowBlur=8; ctx.shadowColor='rgba(0,255,80,0.4)';
  ctx.strokeRect(1.5,1.5,W-3,H-3);
  ctx.shadowBlur=0;

  // Snake body (draw tail to neck, skip head)
  for(let i=snake.length-1;i>=1;i--){
    const s=snake[i];
    const t=i/snake.length;
    // Gradient green — brighter near head
    const green=Math.floor(120+100*(1-t));
    const alpha=Math.max(0.4,1-t*0.5);
    ctx.fillStyle=`rgba(0,${green},30,${alpha})`;
    ctx.shadowBlur=0;
    // Rounded body segments
    const pad=2;
    const sx=s.x*CELL+pad, sy=s.y*CELL+pad;
    const sw=CELL-pad*2, sh=CELL-pad*2;
    ctx.beginPath();
    ctx.roundRect(sx,sy,sw,sh,4);
    ctx.fill();
    // Scale highlight
    ctx.fillStyle=`rgba(100,255,120,${0.08*(1-t)})`;
    ctx.beginPath();
    ctx.roundRect(sx+2,sy+2,sw-4,sh/2-2,3);
    ctx.fill();
  }

  // Snake HEAD — proper face
  if(snake.length>0){
    const h=snake[0];
    const hx=h.x*CELL, hy=h.y*CELL;
    const cx=hx+CELL/2, cy=hy+CELL/2;

    // Direction angle for rotating head
    const angle=dir.x===1?0:dir.x===-1?Math.PI:dir.y===1?Math.PI/2:-Math.PI/2;

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle);

    // Head glow
    ctx.shadowBlur=12; ctx.shadowColor='#00ff44';

    // Head shape — slightly wider front
    const headGrad=ctx.createRadialGradient(2,0,1,0,0,CELL/2);
    headGrad.addColorStop(0,'#44ff88');
    headGrad.addColorStop(0.6,'#00cc44');
    headGrad.addColorStop(1,'#006622');
    ctx.fillStyle=headGrad;
    ctx.beginPath();
    ctx.moveTo(CELL/2-1,0); // nose tip
    ctx.bezierCurveTo(CELL/2+1,-CELL/2+3, CELL/2-3,-CELL/2, 0,-CELL/2+2);
    ctx.bezierCurveTo(-CELL/2+3,-CELL/2, -CELL/2+1,-CELL/2+3, -CELL/2+2,0);
    ctx.bezierCurveTo(-CELL/2+1,CELL/2-3, -CELL/2+3,CELL/2, 0,CELL/2-2);
    ctx.bezierCurveTo(CELL/2-3,CELL/2, CELL/2+1,CELL/2-3, CELL/2-1,0);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;

    // Scales on head
    ctx.fillStyle='rgba(0,180,50,0.3)';
    ctx.beginPath(); ctx.ellipse(0,-3,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-4,3,3,2,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,3,3,2,-0.3,0,Math.PI*2); ctx.fill();

    // Eyes — positioned on upper sides of head
    [-1,1].forEach(side=>{
      const ex=2, ey=side*5;
      // Eye white/sclera
      ctx.fillStyle='#ccffcc';
      ctx.beginPath(); ctx.ellipse(ex,ey,4,3.5,0,0,Math.PI*2); ctx.fill();
      // Pupil — vertical slit like a snake
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.ellipse(ex+1,ey,1.5,2.5,0,0,Math.PI*2); ctx.fill();
      // Eye shine
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(ex,ey-1,1,0,Math.PI*2); ctx.fill();
    });

    // Nostrils
    ctx.fillStyle='rgba(0,80,20,0.7)';
    ctx.beginPath(); ctx.arc(CELL/2-3,-2,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(CELL/2-3,2,1.2,0,Math.PI*2); ctx.fill();

    // Forked tongue — flicks every 30 frames
    const tongueOut=Math.floor(frameCount/15)%4<2;
    if(tongueOut){
      const tongueLen=tongueOut?8:4;
      ctx.strokeStyle='#ff2244';
      ctx.lineWidth=1.5;
      ctx.shadowBlur=4; ctx.shadowColor='#ff0044';
      // Base
      ctx.beginPath(); ctx.moveTo(CELL/2-1,0); ctx.lineTo(CELL/2+4,0); ctx.stroke();
      // Fork
      ctx.beginPath(); ctx.moveTo(CELL/2+4,0); ctx.lineTo(CELL/2+4+tongueLen/2,-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(CELL/2+4,0); ctx.lineTo(CELL/2+4+tongueLen/2,3); ctx.stroke();
      ctx.shadowBlur=0;
    }

    ctx.restore();
  }

  // Food — glowing apple/orb
  const pulse=0.75+Math.sin(frameCount*0.15)*0.25;
  ctx.shadowBlur=14*pulse; ctx.shadowColor='#ff2200';
  const fr=food.x*CELL+CELL/2, fy2=food.y*CELL+CELL/2;
  const foodGrad=ctx.createRadialGradient(fr-2,fy2-2,1,fr,fy2,(CELL/2-3)*pulse);
  foodGrad.addColorStop(0,'#ffaa88');
  foodGrad.addColorStop(0.4,'#ff4422');
  foodGrad.addColorStop(1,'#aa1100');
  ctx.fillStyle=foodGrad;
  ctx.beginPath();
  ctx.arc(fr,fy2,(CELL/2-3)*pulse,0,Math.PI*2);
  ctx.fill();
  // Stem
  ctx.shadowBlur=0;
  ctx.strokeStyle='#44aa00';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(fr,fy2-(CELL/2-3)*pulse);ctx.lineTo(fr+2,fy2-(CELL/2-2)*pulse-3);ctx.stroke();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(fr-2,fy2-2,(CELL/2-6)*pulse,(CELL/2-7)*pulse,-0.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Bonus star — with countdown ring
  if(bonus){
    const age=(frameCount-bonus.frame)/(8000/speed);
    const bp=0.75+Math.sin(frameCount*0.25)*0.25;
    const bx=bonus.x*CELL+CELL/2, by=bonus.y*CELL+CELL/2;
    // Countdown ring
    ctx.strokeStyle=`rgba(255,220,0,${0.5*(1-age)})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(bx,by,CELL/2,- Math.PI/2,-Math.PI/2+Math.PI*2*(1-age));
    ctx.stroke();
    // Star
    ctx.shadowBlur=12*bp; ctx.shadowColor='#ffdd00';
    ctx.fillStyle=`rgba(255,220,0,${1-age*0.5})`;
    drawStar(ctx,bx,by,(CELL/2-3)*bp,(CELL/4)*bp,5);
    // ★ label
    ctx.shadowBlur=0;
    ctx.fillStyle=`rgba(255,255,200,${1-age})`;
    ctx.font=`bold 8px Audiowide`;
    ctx.textAlign='center';
    ctx.fillText('5×',bx,by-CELL/2-3);
    ctx.textAlign='left';
    ctx.shadowBlur=0;
  }
}

function drawStar(ctx,cx,cy,r,ir,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const rad=(i*Math.PI)/pts-Math.PI/2;
    const radius=i%2===0?r:ir;
    i===0?ctx.moveTo(cx+Math.cos(rad)*radius,cy+Math.sin(rad)*radius)
         :ctx.lineTo(cx+Math.cos(rad)*radius,cy+Math.sin(rad)*radius);
  }
  ctx.closePath(); ctx.fill();
}

function showMsg(t){ msgText.innerHTML=t.replace(/\n/g,'<br>'); msgText.style.display='block'; }
function hideMsg(){ msgText.style.display='none'; }
function updateUI(){ hiEl.textContent=hiScore; scEl.textContent=score; lvEl.textContent=level; }

// ── Draw loop (idle animation) ─────────────────────────
let idleFrame=0;
function idleDraw(){
  if(gstate!=='idle'&&gstate!=='dead') return;
  idleFrame++;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) ctx.fillRect(x*CELL+CELL/2-1,y*CELL+CELL/2-1,2,2);
  requestAnimationFrame(idleDraw);
}


// Touch overlay postMessage bridge
window.addEventListener("message",function(e){
  if(!e.data||e.data.type!=="key")return;
  const key=e.data.key;
  const code=key==="ArrowUp"?"ArrowUp":key==="ArrowDown"?"ArrowDown":
             key==="ArrowLeft"?"ArrowLeft":key==="ArrowRight"?"ArrowRight":"Space";
  document.dispatchEvent(new KeyboardEvent("keydown",{key,code,bubbles:true,cancelable:true}));
  setTimeout(()=>document.dispatchEvent(new KeyboardEvent("keyup",{key,code,bubbles:true,cancelable:true})),80);
});
// ── Boot ───────────────────────────────────────────────
updateUI();
idleDraw();
// Auto-start if launched from console

// Mobile tap-to-continue button
document.getElementById('tapBtn').addEventListener('touchstart',function(e){
  e.preventDefault();
  document.dispatchEvent(new KeyboardEvent('keydown',{key:' ',code:'Space',bubbles:true,cancelable:true}));
},{passive:false});
document.getElementById('tapBtn').addEventListener('click',function(){
  document.dispatchEvent(new KeyboardEvent('keydown',{key:' ',code:'Space',bubbles:true,cancelable:true}));
});
const urlMode=new URLSearchParams(window.location.search).get('mode');
if(urlMode) startGame();
</script>
</body>
</html>
