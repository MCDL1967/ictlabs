<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICTLab's Retro Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1a1a1a;
      --bg-dark:  #000;
      --bg-pane:  #222;
      --accent:   #00ff00;
      --accent2:  #00cc00;
      --text:     #00ff00;
      --text-inv: #000;
      --border:   #00ff00;
      --glow:     rgba(0,255,0,0.55);
      --font:     'Press Start 2P', cursive;
    }
    body.alt-skin    { --bg:#2a2a1a; --bg-dark:#111100; --bg-pane:#332; --accent:#ffff00; --accent2:#cccc00; --text:#ffff00; --border:#ffff00; --glow:rgba(255,255,0,0.55); --font:'Press Start 2P',cursive; }
    body.purple-skin { --bg:#300030; --bg-dark:#200020; --bg-pane:#350035; --accent:#cc00cc; --accent2:#990099; --text:#cc00cc; --border:#cc00cc; --glow:rgba(204,0,204,0.55); --font:'VT323',monospace; }
    body.red-skin    { --bg:#300000; --bg-dark:#200000; --bg-pane:#350000; --accent:#ff4444; --accent2:#cc2222; --text:#ff4444; --border:#ff4444; --glow:rgba(255,68,68,0.55); --font:'Courier Prime',monospace; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.4s, color 0.4s;
    }

    /* SCANLINE OVERLAY */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      z-index: 9999;
    }

    /* HEADER */
    .header {
      background-color: var(--bg-dark);
      padding: 14px 20px;
      text-align: center;
      font-size: clamp(0.9em, 2vw, 1.6em);
      border-bottom: 4px solid var(--border);
      box-shadow: 0 4px 20px var(--glow);
      text-shadow: 0 0 12px var(--accent);
      letter-spacing: 2px;
      flex-shrink: 0;
      transition: all 0.4s;
    }

    /* MAIN AREA */
    .main-content {
      display: flex;
      flex: 1;
      margin: 10px;
      border: 3px solid var(--border);
      box-shadow: 0 0 18px var(--glow), inset 0 0 40px rgba(0,0,0,0.4);
      background-color: var(--bg);
      overflow: hidden;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    /* LEFT PANE */
    .left-pane {
      width: 28%;
      min-width: 160px;
      border-right: 3px solid var(--border);
      overflow-y: auto;
      padding: 8px;
      background-color: var(--bg-pane);
      transition: all 0.4s;
    }
    .left-pane::-webkit-scrollbar { width: 6px; }
    .left-pane::-webkit-scrollbar-track { background: var(--bg-dark); }
    .left-pane::-webkit-scrollbar-thumb { background: var(--accent2); }

    .game-item {
      padding: 10px 8px;
      cursor: pointer;
      border-bottom: 1px dotted var(--accent2);
      font-size: clamp(0.55em, 1vw, 0.85em);
      line-height: 1.6;
      transition: background-color 0.15s, color 0.15s;
      word-break: break-word;
    }
    .game-item:hover,
    .game-item.selected {
      background-color: var(--accent);
      color: var(--text-inv);
      text-shadow: none;
      padding-left: 14px;
    }
    .game-item.selected::before {
      content: '▶ ';
    }

    /* RIGHT PANE */
    .right-pane {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-pane);
      position: relative;
      gap: 12px;
      transition: background-color 0.4s;
      overflow: hidden;
    }

    .game-meta {
      text-align: center;
      font-size: clamp(0.55em, 1vw, 0.8em);
      color: var(--text);
      text-shadow: 0 0 8px var(--accent);
      max-width: 90%;
      line-height: 1.8;
    }
    .game-meta .title { font-size: 1.3em; margin-bottom: 6px; }
    .game-meta .subtitle { opacity: 0.75; font-size: 0.85em; }

    .game-preview {
      width: 90%;
      max-width: 640px;
      aspect-ratio: 16/9;
      position: relative;
      background-color: #000;
      border: 2px solid var(--border);
      box-shadow: 0 0 20px var(--glow);
      transition: border-color 0.4s;
      overflow: hidden;
    }
    .game-preview iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      transition: opacity 0.4s;
    }

    .no-game-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent2);
      font-size: clamp(0.5em, 1.2vw, 0.75em);
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }

    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--accent);
      font-size: clamp(0.6em, 1.5vw, 1.2em);
      text-shadow: 0 0 10px var(--accent);
      display: none;
      animation: blink 0.8s step-end infinite;
      z-index: 2;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* CONTROLS BAR */
    .controls {
      background-color: var(--bg-dark);
      padding: 10px 16px;
      border-top: 4px solid var(--border);
      box-shadow: 0 -4px 20px var(--glow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
      transition: all 0.4s;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 4px; }

    .button {
      background-color: var(--accent);
      color: var(--text-inv);
      border: none;
      padding: 8px 14px;
      font-family: var(--font);
      font-size: clamp(0.45em, 0.9vw, 0.75em);
      cursor: pointer;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      transition: background-color 0.15s, transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .button:hover {
      filter: brightness(1.25);
      transform: translateY(-2px);
      box-shadow: 2px 4px 0 rgba(0,0,0,0.5);
    }
    .button:active {
      transform: translateY(0);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      opacity: 0.5;
      font-size: clamp(0.5em, 0.9vw, 0.7em);
      text-align: center;
      padding: 20px;
    }
    .empty-state .big { font-size: 2em; }
  </style>
</head>
<body>

  <div class="header">⚡ ICTLab's Retro Console ⚡</div>

  <div class="main-content">
    <div class="left-pane" id="gameListPane">
      <div class="empty-state">
        <div class="big">📂</div>
        <div>No games found.<br>Check games/manifest.json</div>
      </div>
    </div>
    <div class="right-pane" id="rightPane">
      <div class="game-meta" id="gameMeta" style="display:none">
        <div class="title" id="metaTitle"></div>
        <div class="subtitle" id="metaSubtitle"></div>
        <div id="metaDesc" style="margin-top:8px;"></div>
      </div>
      <div class="game-preview" id="gamePreview" style="display:none">
        <iframe id="previewFrame" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="loading-indicator" id="loadingIndicator">LOADING...</div>
        <div class="no-game-msg" id="noVideoMsg" style="display:none">NO PREVIEW AVAILABLE</div>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="big">🕹️</div>
        <div>SELECT A GAME<br>TO GET STARTED</div>
      </div>
      <!-- GAME MODE — full pane inline play -->
      <div id="gamePane" style="display:none;position:absolute;inset:0;flex-direction:column;background:#000;">
        <div id="gameBar" style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#000;border-bottom:1px solid var(--border);flex-shrink:0;">
          <span id="gameBarTitle" style="font-family:var(--font);font-size:0.55em;color:var(--accent);letter-spacing:2px;"></span>
          <button id="exitButton" style="background:var(--accent);color:var(--text-inv);border:none;font-family:var(--font);font-size:0.5em;letter-spacing:2px;padding:5px 12px;cursor:pointer;">✕ EXIT</button>
        </div>
        <iframe id="gameFrame" src="about:blank" style="flex:1;border:none;width:100%;display:block;" allow="autoplay" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="btn-group">
      <button class="button" id="upButton">▲ UP</button>
      <button class="button" id="downButton">▼ DOWN</button>
      <button class="button" id="selectButton">⏎ SELECT</button>
    </div>
    <div class="btn-group">
      <button class="button" onclick="">Trackpad</button>
      <button class="button" onclick="">Keyboard</button>
      <button class="button" onclick="">Mouse</button>
    </div>
    <div class="btn-group">
      <button class="button" id="chooseSkinButton">🎨 Skin</button>
    </div>
  </div>

  <audio id="selectSound"   src="https://www.soundjay.com/buttons/beep-07.mp3"    preload="auto"></audio>
  <audio id="navigateSound" src="https://www.soundjay.com/buttons/beep-01a.mp3"   preload="auto"></audio>
  <audio id="skinSound"     src="https://www.soundjay.com/buttons/button-10.mp3"  preload="auto"></audio>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let GAMES = [];
    let selectedIndex = 0;
    const skins = ['', 'alt-skin', 'purple-skin', 'red-skin'];
    let skinIndex = 0;
    let loadTimer = null;

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const listPane       = document.getElementById('gameListPane');
    const metaBox        = document.getElementById('gameMeta');
    const metaTitle      = document.getElementById('metaTitle');
    const metaSubtitle   = document.getElementById('metaSubtitle');
    const metaDesc       = document.getElementById('metaDesc');
    const previewWrap    = document.getElementById('gamePreview');
    const previewFrame   = document.getElementById('previewFrame');
    const loadingInd     = document.getElementById('loadingIndicator');
    const noVideoMsg     = document.getElementById('noVideoMsg');
    const emptyState     = document.getElementById('emptyState');
    const gamePane       = document.getElementById('gamePane');
    const gameFrame      = document.getElementById('gameFrame');
    const gameBarTitle   = document.getElementById('gameBarTitle');
    const sfxSelect      = document.getElementById('selectSound');
    const sfxNav         = document.getElementById('navigateSound');
    const sfxSkin        = document.getElementById('skinSound');

    // ── Audio helper ───────────────────────────────────────────────────────────
    function play(el) { try { el.currentTime = 0; el.play(); } catch(e) {} }

    // ── Load manifest then all game_info.json files ────────────────────────────
    async function loadGames() {
      try {
        const mRes = await fetch('games/manifest.json');
        if (!mRes.ok) throw new Error('manifest not found');
        const manifest = await mRes.json();
        const folders = manifest.games || [];

        const promises = folders.map(async folder => {
          try {
            const r = await fetch(`games/${folder}/game_info.json`);
            if (!r.ok) return null;
            const data = await r.json();
            data._folder = folder;
            return data;
          } catch { return null; }
        });

        GAMES = (await Promise.all(promises)).filter(Boolean);
      } catch (e) {
        console.warn('Could not load games manifest:', e.message);
        GAMES = [];
      }
      renderList();
      if (GAMES.length > 0) selectGame(0);
    }

    // ── Render left pane ───────────────────────────────────────────────────────
    function renderList() {
      listPane.innerHTML = '';
      if (GAMES.length === 0) {
        listPane.innerHTML = '<div class="empty-state"><div class="big">📂</div><div>No games found.<br>Run update_manifest.py<br>then reload.</div></div>';
        return;
      }
      GAMES.forEach((g, i) => {
        const el = document.createElement('div');
        el.className = 'game-item';
        el.textContent = g.name || `Game ${i+1}`;
        el.addEventListener('click', () => { play(sfxSelect); selectGame(i); });
        listPane.appendChild(el);
      });
    }

    // ── Select a game ──────────────────────────────────────────────────────────
    function selectGame(index) {
      if (GAMES.length === 0) return;
      if (index < 0) index = GAMES.length - 1;
      if (index >= GAMES.length) index = 0;
      selectedIndex = index;

      document.querySelectorAll('.game-item').forEach((el, i) => {
        el.classList.toggle('selected', i === selectedIndex);
        if (i === selectedIndex) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      showDetails(GAMES[selectedIndex]);
    }

    // ── Show right pane details ────────────────────────────────────────────────
    function showDetails(game) {
      emptyState.style.display   = 'none';
      metaBox.style.display      = 'block';
      previewWrap.style.display  = 'block';

      metaTitle.textContent    = game.name || '—';
      metaSubtitle.textContent = [game.genre, game.release_year].filter(Boolean).join(' · ');
      metaDesc.textContent     = game.image_desc || '';

      // Clear & show loading
      if (loadTimer) clearTimeout(loadTimer);
      previewFrame.src            = 'about:blank';
      previewFrame.style.opacity  = '0';
      loadingInd.style.display    = 'block';
      noVideoMsg.style.display    = 'none';

      if (game.video_src) {
        loadTimer = setTimeout(() => {
          previewFrame.src = game.video_src;
        }, 1500);
      } else {
        loadingInd.style.display  = 'none';
        noVideoMsg.style.display  = 'flex';
        previewFrame.style.opacity = '1';
      }
    }

    previewFrame.addEventListener('load', () => {
      if (previewFrame.src !== 'about:blank' && previewFrame.src !== '') {
        loadingInd.style.display   = 'none';
        previewFrame.style.opacity = '1';
      }
    });

    // ── Keyboard nav ───────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp')   { play(sfxNav);    selectGame(selectedIndex - 1); e.preventDefault(); }
      if (e.key === 'ArrowDown') { play(sfxNav);    selectGame(selectedIndex + 1); e.preventDefault(); }
      if (e.key === 'Enter')     { play(sfxSelect); launchGame(); e.preventDefault(); }
    });

    // ── Button nav ─────────────────────────────────────────────────────────────
    document.getElementById('upButton').addEventListener('click',     () => { play(sfxNav);    selectGame(selectedIndex - 1); });
    document.getElementById('downButton').addEventListener('click',   () => { play(sfxNav);    selectGame(selectedIndex + 1); });
    document.getElementById('selectButton').addEventListener('click', () => { play(sfxSelect); launchGame(); });

    // ── Launch — loads game inline in right pane ──────────────────
    function launchGame() {
      if (GAMES.length === 0) return;
      const game = GAMES[selectedIndex];
      if (!game.play_url) return;

      // Switch right pane to full game mode
      metaBox.style.display      = 'none';
      previewWrap.style.display  = 'none';
      emptyState.style.display   = 'none';

      gameFrame.src = game.play_url;
      gameBarTitle.textContent = game.name;
      gamePane.style.display = 'flex';
      gamePane.focus();
    }

    // ── Exit game — return to preview ─────────────────────────────
    function exitGame() {
      gamePane.style.display = 'none';
      gameFrame.src = 'about:blank';
      showDetails(GAMES[selectedIndex]);
    }

    document.getElementById('exitButton').addEventListener('click', exitGame);
    // ESC key exits game
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && gamePane.style.display !== 'none') {
        exitGame();
      }
    });

    // ── Skin cycling ───────────────────────────────────────────────────────────
    document.getElementById('chooseSkinButton').addEventListener('click', () => {
      play(sfxSkin);
      if (skins[skinIndex]) document.body.classList.remove(skins[skinIndex]);
      skinIndex = (skinIndex + 1) % skins.length;
      if (skins[skinIndex]) document.body.classList.add(skins[skinIndex]);
    });

    // ── Boot ───────────────────────────────────────────────────────────────────
    loadGames();
  </script>
</body>
</html>
