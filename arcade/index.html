<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>ICTLabs Retro Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #000;
  --bg-dark: #000;
  --bg-pane: #05080f;
  --accent:  #2563eb;
  --accent2: #1a4fd6;
  --text:    #ffffff;
  --text-inv:#ffffff;
  --border:  #2563eb;
  --glow:    rgba(37,99,235,0.45);
  --grid:    rgba(26,79,214,0.06);
  --font:    'Audiowide', sans-serif;
}
body.skin-green  { --accent:#00cc44; --accent2:#009933; --text:#00ff64; --border:#00cc44; --glow:rgba(0,204,68,0.45); --grid:rgba(0,180,60,0.05); }
body.skin-gold   { --accent:#c9a84c; --accent2:#8a6e2f; --text:#e2c47a; --border:#c9a84c; --glow:rgba(201,168,76,0.4); --grid:rgba(201,168,76,0.04); }
body.skin-red    { --accent:#e02020; --accent2:#aa1010; --text:#ff4444; --border:#e02020; --glow:rgba(224,32,32,0.45); --grid:rgba(220,30,30,0.05); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
  transition:background 0.4s,color 0.4s;
}
/* Grid texture */
body::before{
  content:'';pointer-events:none;
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:36px 36px;
  transition:background-image 0.4s;
}
/* Scanlines */
body::after{
  content:'';pointer-events:none;
  position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
}

/* HEADER */
.header{
  position:relative;z-index:1;
  background:var(--bg-dark);
  padding:12px 20px;text-align:center;
  font-size:clamp(0.85em,2vw,1.4em);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 20px var(--glow);
  letter-spacing:4px;flex-shrink:0;
  transition:all 0.4s;
  color:var(--text);
}
.back-arrow{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-family:var(--font);font-size:0.55em;letter-spacing:2px;
  color:var(--text);text-decoration:none;opacity:0.6;
  transition:all 0.2s;padding:4px 10px;
  border:1px solid var(--border);text-transform:uppercase;
}
.back-arrow:hover{opacity:1;background:var(--accent);color:var(--bg-dark);}

/* GAME META — prominent, centered above preview */
.game-meta{
  width:100%;text-align:center;
  padding:12px 16px 8px;flex-shrink:0;
}
.game-meta .title{
  font-size:clamp(1em,2.5vw,1.8em);
  letter-spacing:4px;color:var(--text);
  text-shadow:0 0 12px var(--accent);
  margin-bottom:6px;
}
.game-meta .subtitle{
  font-size:clamp(0.6em,1.2vw,0.85em);
  letter-spacing:3px;opacity:0.5;margin-bottom:8px;
}
.meta-desc{
  font-size:clamp(0.55em,1vw,0.72em);
  color:var(--text);opacity:0.45;
  line-height:1.7;max-width:500px;
  margin:0 auto;letter-spacing:1px;
}

/* MAIN */
.main-content{
  position:relative;z-index:1;
  display:flex;flex:1;margin:10px;
  border:2px solid var(--border);
  box-shadow:0 0 24px var(--glow);
  background:var(--bg);
  overflow:hidden;
  transition:border-color 0.4s,box-shadow 0.4s;
}

/* LEFT PANE */
.left-pane{
  width:28%;min-width:150px;
  border-right:2px solid var(--border);
  overflow-y:auto;padding:8px;
  background:var(--bg-pane);
  transition:all 0.4s;
}
.left-pane::-webkit-scrollbar{width:4px;}
.left-pane::-webkit-scrollbar-track{background:var(--bg-dark);}
.left-pane::-webkit-scrollbar-thumb{background:var(--accent2);}

.game-item{
  padding:10px 8px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:clamp(0.6em,1vw,0.8em);
  line-height:1.6;letter-spacing:1px;
  color:rgba(255,255,255,0.7);
  transition:all 0.15s;
  text-transform:uppercase;
}
.game-item:hover,.game-item.selected{
  background:var(--accent);
  color:#fff;padding-left:14px;
}
.game-item.selected::before{content:'▶ ';}

/* RIGHT PANE */
.right-pane{
  flex:1;padding:10px 14px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:var(--bg-pane);
  position:relative;gap:8px;
  transition:background 0.4s;overflow:hidden;
}

.game-preview{
  width:90%;max-width:640px;aspect-ratio:16/9;
  position:relative;background:#000;
  border:2px solid var(--border);
  box-shadow:0 0 16px var(--glow);
  transition:border-color 0.4s;overflow:hidden;
}
.game-preview iframe{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;transition:opacity 0.4s;
}
.no-game-msg{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,0.3);
  font-size:clamp(0.5em,1.2vw,0.7em);
  text-align:center;padding:20px;
}
.loading-indicator{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:var(--accent);
  font-size:clamp(0.6em,1.5vw,1em);
  display:none;z-index:2;letter-spacing:3px;
  animation:blink 0.8s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* GAME MODE PANE */
#gamePane{
  display:none;position:absolute;inset:0;
  flex-direction:column;background:#000;
}
#gameBar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;background:#000;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#gameBarTitle{
  font-family:var(--font);font-size:0.6em;
  color:var(--accent);letter-spacing:3px;text-transform:uppercase;
}
#exitButton{
  background:var(--accent);color:#fff;border:none;
  font-family:var(--font);font-size:0.5em;letter-spacing:2px;
  padding:5px 14px;cursor:pointer;text-transform:uppercase;
  transition:filter 0.15s;
}
#exitButton:hover{filter:brightness(1.2);}
#gameFrame{flex:1;border:none;width:100%;display:block;}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:12px;
  opacity:0.4;font-size:clamp(0.5em,0.9vw,0.7em);
  text-align:center;padding:20px;letter-spacing:2px;
}
.empty-state .big{font-size:2.5em;}

/* CONTROLS */
.controls{
  position:relative;z-index:1;
  background:var(--bg-dark);
  padding:8px 16px;
  border-top:2px solid var(--border);
  box-shadow:0 -2px 20px var(--glow);
  display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:6px;
  flex-shrink:0;transition:all 0.4s;
}
.btn-group{display:flex;flex-wrap:wrap;gap:4px;}

.button{
  background:transparent;
  color:var(--text);
  border:1px solid var(--border);
  padding:7px 14px;
  font-family:var(--font);
  font-size:clamp(0.42em,0.85vw,0.68em);
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.button:hover{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--glow);}
.button:active{transform:translateY(1px);}
.button.active-btn{background:var(--accent);color:#fff;}

/* INSTRUCTIONS MODAL */
#instrModal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);z-index:200;
  align-items:center;justify-content:center;
}
.instr-box{
  background:var(--bg-pane);
  border:2px solid var(--border);
  box-shadow:0 0 40px var(--glow);
  padding:32px;max-width:460px;width:90%;
  position:relative;
}
.instr-title{
  font-family:var(--font);font-size:1.1em;
  color:var(--text);letter-spacing:3px;
  text-transform:uppercase;margin-bottom:24px;
}
.instr-body{
  font-family:var(--font);font-size:0.9em;
  color:rgba(255,255,255,0.75);line-height:2.4;
  letter-spacing:1px;
}
.instr-close{
  margin-top:24px;background:var(--accent);color:#fff;
  border:none;font-family:var(--font);font-size:0.8em;
  letter-spacing:2px;padding:12px 24px;cursor:pointer;
  width:100%;text-transform:uppercase;transition:filter 0.15s;
}
.instr-close:hover{filter:brightness(1.2);}

/* TOUCH OVERLAY — only visible on touch devices */
/* TOUCH CONTROLS ─────────────────────────────────────────────
   Portrait:  panel slides up from bottom
   Landscape: panel slides in from right side
   Toggle button always visible on touch devices
──────────────────────────────────────────────────────────── */

/* Toggle tab */
#touchToggle{
  display:none;
  position:fixed;z-index:100;
  background:var(--bg-dark);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--font);font-size:10px;letter-spacing:1px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  /* Portrait: bottom-right corner tab */
  bottom:0;right:16px;
  padding:6px 12px 4px;
  border-bottom:none;
  border-radius:6px 6px 0 0;
}
#touchToggle:active{background:var(--accent);}

/* Panel base */
#touchPanel{
  position:fixed;z-index:99;
  background:rgba(0,0,0,0.95);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;padding:12px 20px;
  transition:transform 0.25s ease;
  /* Portrait: slides up from bottom */
  left:0;right:0;bottom:0;
  transform:translateY(100%);
  flex-direction:row;
  border-top:2px solid var(--accent);
  border-left:none;border-right:none;border-bottom:none;
}
#touchPanel.open{ transform:translateY(0); }

/* Landscape overrides */
@media (orientation:landscape){
  #touchToggle{
    bottom:50%;transform:translateY(50%);
    right:0;
    writing-mode:vertical-rl;
    border-radius:6px 0 0 6px;
    border-right:none;border-bottom:1px solid var(--border);
    padding:10px 5px;
  }
  #touchPanel{
    top:0;bottom:0;right:0;left:auto;
    width:160px;
    transform:translateX(100%);
    flex-direction:column;
    border-left:2px solid var(--accent);
    border-top:none;border-right:none;
  }
  #touchPanel.open{ transform:translateX(0); }
}

/* D-pad */
#dpad{ display:flex;flex-direction:column;align-items:center;gap:2px; }
.dpad-row{display:flex;align-items:center;gap:2px;}
.dpad-center{width:42px;height:42px;}
.dpad-btn{
  width:46px;height:46px;
  background:rgba(30,30,30,0.9);
  border:1px solid var(--border);
  color:var(--text);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:8px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
}
.dpad-btn:active{background:var(--accent);color:#000;}

/* Space bar button — center of panel */
#spaceBtn{
  background:rgba(30,30,30,0.9);
  border:2px solid #ff0;color:#ff0;
  font-family:var(--font);font-size:11px;letter-spacing:2px;
  padding:10px 20px;border-radius:8px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  flex-shrink:0;
}
#spaceBtn:active{background:#ff0;color:#000;}

/* Action buttons */
#actionBtns{display:flex;flex-direction:column;gap:10px;align-items:center;}
.action-btn{
  width:58px;height:58px;border-radius:50%;
  background:rgba(30,30,30,0.9);
  border:2px solid var(--border);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  font-family:var(--font);font-size:12px;letter-spacing:1px;
}
.action-btn.fire{font-size:22px;}
.action-btn.start-btn-touch{
  width:58px;height:36px;border-radius:8px;
  font-size:9px;letter-spacing:1px;
  border-color:#0f0;color:#0f0;
}

/* Only show on touch devices */
@media (pointer:coarse){
  #touchToggle{display:flex;align-items:center;justify-content:center;}
}

/* Keyboard shortcut hints on buttons */
/* Keyboard shortcut hints on buttons */
.button .shortcut{
  display:block;font-size:0.7em;opacity:0.45;
  letter-spacing:0;margin-top:1px;
}
   Stack: header / right-pane / game-tabs / controls
═══════════════════════════════════════════════ */
@media (max-width:767px) and (orientation:portrait){

  body{
    height:100dvh;
    overflow:hidden;
  }

  /* Wrap everything in a scroll container so controls always show */
  .header{
    padding:8px 12px;
    font-size:0.75em;letter-spacing:2px;
  }
  .back-arrow{font-size:0.65em;padding:3px 8px;right:10px;}

  /* Main content stacks vertically */
  .main-content{
    flex-direction:column;
    margin:6px 6px 0;
    border-bottom:none;
  }

  /* Left pane → horizontal scrollable tab strip */
  .left-pane{
    width:100%;min-width:unset;
    height:auto;flex-shrink:0;
    border-right:none;
    border-bottom:2px solid var(--border);
    overflow-x:auto;overflow-y:hidden;
    padding:6px 6px;
    display:flex;flex-direction:row;align-items:center;gap:4px;
    scrollbar-width:none;
  }
  .left-pane::-webkit-scrollbar{display:none;}

  .game-item{
    flex-shrink:0;
    border-bottom:none;
    border:1px solid rgba(255,255,255,0.15);
    padding:7px 12px;
    font-size:0.65em;
    white-space:nowrap;
  }
  .game-item.selected{
    padding-left:12px;
    border-color:var(--accent);
  }
  .game-item.selected::before{content:'▶ ';}

  /* Right pane fills remaining space */
  .right-pane{
    flex:1;
    padding:8px;
    justify-content:flex-start;
    overflow:hidden;
  }

  .game-meta{padding:6px 8px 4px;}
  .game-meta .title{font-size:1.1em;letter-spacing:2px;margin-bottom:3px;}
  .game-meta .subtitle{font-size:0.65em;margin-bottom:4px;}
  .meta-desc{font-size:0.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .game-preview{
    width:100%;max-width:unset;
  }

  /* Controls — two compact rows, always visible */
  .controls{
    margin:0 6px;
    margin-bottom:max(6px, env(safe-area-inset-bottom, 6px));
    padding:6px 8px;
    flex-direction:column;
    gap:5px;
    align-items:stretch;
    flex-shrink:0;
  }
  .btn-group{
    display:flex;flex-wrap:nowrap;gap:4px;justify-content:center;
  }
  .button{
    flex:1;padding:8px 4px;
    font-size:0.55em;letter-spacing:0.5px;
  }
}

/* ═══════════════════════════════════════════════
   MOBILE — LANDSCAPE
   Side-by-side (slim list + right pane),
   controls in single scrollable row
═══════════════════════════════════════════════ */
@media (max-width:900px) and (orientation:landscape){

  body{height:100dvh;}

  .header{
    padding:5px 12px;
    font-size:0.65em;letter-spacing:2px;
  }
  .back-arrow{font-size:0.6em;padding:2px 7px;right:8px;}

  .main-content{
    flex-direction:row;
    margin:5px 5px 0;
  }

  /* Slim vertical list */
  .left-pane{
    width:22%;min-width:90px;max-width:130px;
  }
  .game-item{
    font-size:0.55em;padding:7px 6px;
  }

  .right-pane{padding:6px 8px;gap:5px;}

  .game-meta{padding:4px 8px 2px;}
  .game-meta .title{font-size:0.95em;letter-spacing:2px;margin-bottom:2px;}
  .game-meta .subtitle{font-size:0.6em;margin-bottom:2px;}
  .meta-desc{display:none;}

  /* Controls — single scrollable row */
  .controls{
    margin:0 5px 5px;
    padding:5px 8px;
    flex-direction:row;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:6px;
    justify-content:flex-start;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .controls::-webkit-scrollbar{display:none;}
  .btn-group{
    flex-wrap:nowrap;gap:4px;flex-shrink:0;
  }
  .button{
    padding:6px 10px;
    font-size:0.55em;
    white-space:nowrap;
  }
}
</style>
</head>
<body>

<div class="header">
  ⚡ ICTLabs Retro Console ⚡
  <a href="/apps/" class="back-arrow" title="Back to ICTLabs">←</a>
</div>

<div class="main-content">
  <div class="left-pane" id="gameListPane">
    <div class="empty-state"><div class="big">📂</div><div>No games found</div></div>
  </div>
  <div class="right-pane" id="rightPane">
    <div class="game-meta" id="gameMeta" style="display:none">
      <div class="meta-inner">
        <div class="title" id="metaTitle"></div>
        <div class="subtitle" id="metaSubtitle"></div>
        <div class="meta-desc" id="metaDesc"></div>
      </div>
    </div>
    <div class="game-preview" id="gamePreview" style="display:none">
      <iframe id="previewFrame" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <div class="loading-indicator" id="loadingIndicator">LOADING...</div>
      <div class="no-game-msg" id="noVideoMsg" style="display:none">NO PREVIEW AVAILABLE</div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="big">🕹️</div>
      <div>Select a game<br>to get started</div>
    </div>
    <!-- INLINE GAME PANE -->
    <div id="gamePane">
      <div id="gameBar">
        <span id="gameBarTitle"></span>
        <button id="exitButton">✕ Exit</button>
      </div>
      <iframe id="gameFrame" src="about:blank" allow="autoplay" allowfullscreen></iframe>
    </div>
  </div>
</div>

<div class="controls">
  <div class="btn-group">
    <button class="button" id="upButton">▲ Up</button>
    <button class="button" id="downButton">▼ Down</button>
    <button class="button" id="selectButton">⏎ Select</button>
  </div>
  <div class="btn-group">
    <button class="button" id="btn1p">1 Player<span class="shortcut">press 1</span></button>

  </div>
  <div class="btn-group">
    <button class="button" id="skinButton">🎨 Skin</button>
    <button class="button" id="saveSkinButton">💾 Save</button>
    <button class="button" id="instrButton">❓ How To Play<span class="shortcut">press H</span></button>
  </div>
</div>

<!-- TOUCH TOGGLE TAB -->
<button id="touchToggle">🕹 CTRL</button>

<!-- TOUCH PANEL
     Portrait:  slides up from bottom — d-pad LEFT, actions RIGHT
     Landscape: slides in from right — d-pad TOP, actions BOTTOM -->
<div id="touchPanel">
  <div id="dpad">
    <button class="dpad-btn" id="dUp">▲</button>
    <div class="dpad-row">
      <button class="dpad-btn" id="dLeft">◀</button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="dRight">▶</button>
    </div>
    <button class="dpad-btn" id="dDown">▼</button>
  </div>
  <button id="spaceBtn">SPACE</button>
  <div id="actionBtns">
    <button class="action-btn fire" id="aFire">🔥</button>
    <button class="action-btn" id="aSelect">ESC</button>
  </div>
</div>

<!-- INSTRUCTIONS MODAL -->
<div id="instrModal">
  <div class="instr-box">
    <div class="instr-title" id="instrTitle">How To Play</div>
    <div class="instr-body" id="instrBody"></div>
    <button class="instr-close" id="instrClose">Close</button>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────
let GAMES = [];
let selectedIndex = 0;
const SKINS = ['', 'skin-green', 'skin-gold', 'skin-red'];
let skinIndex = 0;
let loadTimer = null;

// ── DOM ───────────────────────────────────────────────────
const listPane    = document.getElementById('gameListPane');
const metaBox     = document.getElementById('gameMeta');
const metaTitle   = document.getElementById('metaTitle');
const metaSubtitle= document.getElementById('metaSubtitle');
const metaDesc    = document.getElementById('metaDesc');
const previewWrap = document.getElementById('gamePreview');
const previewFrame= document.getElementById('previewFrame');
const loadingInd  = document.getElementById('loadingIndicator');
const noVideoMsg  = document.getElementById('noVideoMsg');
const emptyState  = document.getElementById('emptyState');
const gamePane    = document.getElementById('gamePane');
const gameFrame   = document.getElementById('gameFrame');
const gameBarTitle= document.getElementById('gameBarTitle');

// ── Audio (Web Audio) ─────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,vol=0.15,type='square'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
function sfxNav()   { beep(330,0.06,0.12); }
function sfxSelect(){ beep(520,0.08,0.18); }
function sfxSkin()  { beep(440,0.05,0.12); beep(660,0.05,0.12); }
function sfxSave()  { [440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,0.07,0.15),i*60)); }
document.addEventListener('keydown',()=>{ if(AC.state==='suspended') AC.resume(); },{once:false});

// ── Load games ────────────────────────────────────────────
async function loadGames(){
  try{
    const m = await fetch('games/manifest.json');
    if(!m.ok) throw new Error();
    const manifest = await m.json();
    const promises = (manifest.games||[]).map(async folder=>{
      try{
        const r = await fetch(`games/${folder}/game_info.json`);
        if(!r.ok) return null;
        const d = await r.json();
        d._folder = folder; return d;
      }catch{ return null; }
    });
    GAMES = (await Promise.all(promises)).filter(Boolean);
  }catch{ GAMES=[]; }
  renderList();
  if(GAMES.length>0){ selectGame(0); }
}

function renderList(){
  listPane.innerHTML='';
  if(!GAMES.length){
    listPane.innerHTML='<div class="empty-state"><div class="big">📂</div><div>No games found</div></div>';
    return;
  }
  GAMES.forEach((g,i)=>{
    const el=document.createElement('div');
    el.className='game-item';
    el.textContent=g.name||`Game ${i+1}`;
    el.addEventListener('click',()=>{ sfxSelect(); selectGame(i); });
    listPane.appendChild(el);
  });
}

function selectGame(index){
  if(!GAMES.length) return;
  if(index<0) index=GAMES.length-1;
  if(index>=GAMES.length) index=0;
  selectedIndex=index;
  document.querySelectorAll('.game-item').forEach((el,i)=>{
    el.classList.toggle('selected',i===selectedIndex);
    if(i===selectedIndex) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  showDetails(GAMES[selectedIndex]);
  update2pButton();
}

function showDetails(game){
  emptyState.style.display='none';
  metaBox.style.display='block';
  previewWrap.style.display='block';
  metaTitle.textContent   = game.name||'—';
  metaSubtitle.textContent= [game.genre,game.release_year].filter(Boolean).join(' · ');
  metaDesc.textContent    = game.image_desc||'';
  if(loadTimer) clearTimeout(loadTimer);
  previewFrame.src='about:blank';
  previewFrame.style.opacity='0';
  loadingInd.style.display='block';
  noVideoMsg.style.display='none';
  if(game.video_src){
    loadTimer=setTimeout(()=>{ previewFrame.src=game.video_src; },1500);
  }else{
    loadingInd.style.display='none';
    noVideoMsg.style.display='flex';
    previewFrame.style.opacity='1';
  }
}

previewFrame.addEventListener('load',()=>{
  if(previewFrame.src!=='about:blank'){
    loadingInd.style.display='none';
    previewFrame.style.opacity='1';
  }
});

// ── Launch ────────────────────────────────────────────────
function launchGame(mode){
  if(!GAMES.length) return;
  const game=GAMES[selectedIndex];
  if(!game.play_url) return;
  metaBox.style.display='none';
  previewWrap.style.display='none';
  emptyState.style.display='none';
  const url=game.play_url+(mode?'?mode='+mode:'');
  gameFrame.src=url;
  gameBarTitle.textContent=game.name+(mode==='2p'?' · 2P':'');
  gamePane.style.display='flex';
  // Focus the iframe so keyboard events go straight to the game
  setTimeout(()=>gameFrame.focus(),200);
}

function exitGame(){
  gamePane.style.display='none';
  gameFrame.src='about:blank';
  showDetails(GAMES[selectedIndex]);
}

document.getElementById('exitButton').addEventListener('click',exitGame);
document.addEventListener('keydown',e=>{
  // Only handle console keys when game is NOT running
  if(gamePane.style.display!=='none'){
    if(e.key==='Escape') exitGame();
    return;
  }
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')  { sfxNav();    selectGame(selectedIndex-1); e.preventDefault(); }
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') { sfxNav();    selectGame(selectedIndex+1); e.preventDefault(); }
  if(e.key==='Enter')    { sfxSelect(); launchGame('1p'); e.preventDefault(); }
  if(e.key==='1')        { sfxSelect(); launchGame('1p'); e.preventDefault(); }
  if(e.key==='2')        { sfxSelect(); launchGame('2p'); e.preventDefault(); }
  if(e.key==='h'||e.key==='H'){
    document.getElementById('instrButton').click();
    e.preventDefault();
  }
});

// ── Nav buttons ───────────────────────────────────────────
document.getElementById('upButton').addEventListener('click',()=>{ sfxNav(); selectGame(selectedIndex-1); });
document.getElementById('downButton').addEventListener('click',()=>{ sfxNav(); selectGame(selectedIndex+1); });
document.getElementById('selectButton').addEventListener('click',()=>{ sfxSelect(); launchGame('1p'); });

// ── Touch panel ───────────────────────────────────────────
function setupTouchOverlay(){
  const panel=document.getElementById('touchPanel');
  const toggle=document.getElementById('touchToggle');
  if(!panel||!toggle)return;

  let open=false;
  function openPanel(){ open=true;  panel.classList.add('open');    toggle.textContent='✕'; }
  function closePanel(){ open=false; panel.classList.remove('open'); toggle.textContent='🕹 CTRL'; }

  toggle.addEventListener('touchstart',e=>{ e.preventDefault(); open?closePanel():openPanel(); },{passive:false});
  toggle.addEventListener('click',()=>{ open?closePanel():openPanel(); });

  // Send key to game iframe via postMessage (works across origin boundaries)
  function fire(key){
    if(gamePane.style.display!=='none'){
      // postMessage approach — games listen for this
      try{ gameFrame.contentWindow.postMessage({type:'key',key},'*'); }catch(ex){}
      // Also try direct dispatch as fallback
      try{
        const code=key==='ArrowUp'?'ArrowUp':key==='ArrowDown'?'ArrowDown':
                   key==='ArrowLeft'?'ArrowLeft':key==='ArrowRight'?'ArrowRight':'Space';
        const ev=new KeyboardEvent('keydown',{key,code,bubbles:true,cancelable:true,view:gameFrame.contentWindow});
        gameFrame.contentDocument&&gameFrame.contentDocument.dispatchEvent(ev);
      }catch(ex){}
    } else {
      if(key==='ArrowUp')   { sfxNav(); selectGame(selectedIndex-1); }
      if(key==='ArrowDown') { sfxNav(); selectGame(selectedIndex+1); }
      if(key===' ')         { sfxSelect(); launchGame('1p'); }
    }
  }

  // D-pad with hold repeat
  let held=null;
  function startHold(key){ fire(key); held=setInterval(()=>fire(key),130); }
  function stopHold(){ clearInterval(held); held=null; }

  ['dUp','dDown','dLeft','dRight'].forEach((id,i)=>{
    const key=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'][i];
    const btn=document.getElementById(id);
    if(!btn)return;
    btn.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); startHold(key); },{passive:false});
    btn.addEventListener('touchend',  e=>{ e.stopPropagation(); e.preventDefault(); stopHold(); },{passive:false});
    btn.addEventListener('touchcancel',()=>stopHold());
  });

  // Space button — sends Space to game or console
  const spaceBtn=document.getElementById('spaceBtn');
  if(spaceBtn){
    spaceBtn.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); fire(' '); },{passive:false});
    spaceBtn.addEventListener('click',()=>fire(' '));
  }

  // Fire
  const fireBtn=document.getElementById('aFire');
  if(fireBtn){
    fireBtn.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); fire(' '); },{passive:false});
  }

  // CONTINUE button — always visible, sends Space
  const contBtn=document.getElementById('aContinue');
  if(contBtn){
    contBtn.addEventListener('touchstart',e=>{ e.stopPropagation(); e.preventDefault(); fire(' '); },{passive:false});
    contBtn.addEventListener('click',()=>fire(' '));
  }

  // ESC / OK
  const escBtn=document.getElementById('aSelect');
  if(escBtn){
    escBtn.addEventListener('touchstart',e=>{
      e.stopPropagation(); e.preventDefault();
      if(gamePane.style.display!=='none') exitGame();
      else { sfxSelect(); launchGame('1p'); }
    },{passive:false});
  }

  // Hide panel when hardware keyboard used
  document.addEventListener('keydown',()=>closePanel(),{once:true});
}
setupTouchOverlay();

// ── 1P / 2P ───────────────────────────────────────────────
document.getElementById('btn1p').addEventListener('click',()=>{ sfxSelect(); launchGame('1p'); });
document.getElementById('btn2p').addEventListener('click',()=>{
  if(!GAMES.length) return;
  if(!GAMES[selectedIndex].multiplayer) return;
  sfxSelect(); launchGame('2p');
});

function update2pButton(){
  const btn=document.getElementById('btn2p');
  const has2p=GAMES.length&&GAMES[selectedIndex].multiplayer;
  btn.style.opacity=has2p?'1':'0.3';
  btn.style.cursor=has2p?'pointer':'not-allowed';
}

// ── Skin cycling ──────────────────────────────────────────
document.getElementById('skinButton').addEventListener('click',()=>{
  sfxSkin();
  if(SKINS[skinIndex]) document.body.classList.remove(SKINS[skinIndex]);
  skinIndex=(skinIndex+1)%SKINS.length;
  if(SKINS[skinIndex]) document.body.classList.add(SKINS[skinIndex]);
});

// ── Save Skin ─────────────────────────────────────────────
document.getElementById('saveSkinButton').addEventListener('click',()=>{
  localStorage.setItem('ictlabs-arcade-skin',skinIndex);
  sfxSave();
  const btn=document.getElementById('saveSkinButton');
  btn.textContent='✓ Saved';
  btn.classList.add('active-btn');
  setTimeout(()=>{ btn.textContent='💾 Save'; btn.classList.remove('active-btn'); },1400);
});

// Restore saved skin
const savedSkin=localStorage.getItem('ictlabs-arcade-skin');
if(savedSkin!==null){
  skinIndex=parseInt(savedSkin)||0;
  if(SKINS[skinIndex]) document.body.classList.add(SKINS[skinIndex]);
}
