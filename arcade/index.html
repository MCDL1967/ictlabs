<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>ICTLabs Retro Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #000;
  --bg-dark: #000;
  --bg-pane: #05080f;
  --accent:  #2563eb;
  --accent2: #1a4fd6;
  --text:    #ffffff;
  --text-inv:#ffffff;
  --border:  #2563eb;
  --glow:    rgba(37,99,235,0.45);
  --grid:    rgba(26,79,214,0.06);
  --font:    'Audiowide', sans-serif;
}
body.skin-green  { --accent:#00cc44; --accent2:#009933; --text:#00ff64; --border:#00cc44; --glow:rgba(0,204,68,0.45); --grid:rgba(0,180,60,0.05); }
body.skin-gold   { --accent:#c9a84c; --accent2:#8a6e2f; --text:#e2c47a; --border:#c9a84c; --glow:rgba(201,168,76,0.4); --grid:rgba(201,168,76,0.04); }
body.skin-red    { --accent:#e02020; --accent2:#aa1010; --text:#ff4444; --border:#e02020; --glow:rgba(224,32,32,0.45); --grid:rgba(220,30,30,0.05); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  height:100vh;overflow:hidden;
  display:flex;flex-direction:column;
  transition:background 0.4s,color 0.4s;
}
/* Grid texture */
body::before{
  content:'';pointer-events:none;
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:36px 36px;
  transition:background-image 0.4s;
}
/* Scanlines */
body::after{
  content:'';pointer-events:none;
  position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
}

/* HEADER */
.header{
  position:relative;z-index:1;
  background:var(--bg-dark);
  padding:12px 20px;text-align:center;
  font-size:clamp(0.85em,2vw,1.4em);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 20px var(--glow);
  letter-spacing:4px;flex-shrink:0;
  transition:all 0.4s;
  color:var(--text);
}
.back-arrow{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-family:var(--font);font-size:0.78em;letter-spacing:2px;
  color:#dcecff;text-decoration:none;opacity:0.95;
  transition:all 0.2s;padding:7px 13px;
  border:1.5px solid var(--border);text-transform:uppercase;
  min-width:42px;min-height:34px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px var(--glow), inset 0 0 8px rgba(37,99,235,0.12);
}
.back-arrow:hover{opacity:1;background:var(--accent);color:#fff;}

/* GAME META — prominent, centered above preview */
.game-meta{
  width:100%;text-align:center;
  padding:12px 16px 8px;flex-shrink:0;
}
.game-meta .title{
  font-size:clamp(1em,2.5vw,1.8em);
  letter-spacing:4px;color:var(--text);
  text-shadow:0 0 12px var(--accent);
  margin-bottom:6px;
}
.game-meta .subtitle{
  font-size:clamp(0.6em,1.2vw,0.85em);
  letter-spacing:3px;opacity:0.5;margin-bottom:8px;
}
.meta-desc{
  font-size:clamp(0.55em,1vw,0.72em);
  color:var(--text);opacity:0.45;
  line-height:1.7;max-width:500px;
  margin:0 auto;letter-spacing:1px;
}

/* MAIN */
.main-content{
  position:relative;z-index:1;
  display:flex;flex:1;margin:10px;
  border:2px solid var(--border);
  box-shadow:0 0 24px var(--glow);
  background:var(--bg);
  overflow:hidden;
  transition:border-color 0.4s,box-shadow 0.4s;
}

/* LEFT PANE */
.left-pane{
  width:28%;min-width:150px;
  border-right:2px solid var(--border);
  overflow-y:auto;padding:8px;
  background:var(--bg-pane);
  transition:all 0.4s;
}
.left-pane::-webkit-scrollbar{width:4px;}
.left-pane::-webkit-scrollbar-track{background:var(--bg-dark);}
.left-pane::-webkit-scrollbar-thumb{background:var(--accent2);}

.game-item{
  padding:10px 8px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:clamp(0.6em,1vw,0.8em);
  line-height:1.6;letter-spacing:1px;
  color:rgba(255,255,255,0.7);
  transition:all 0.15s;
  text-transform:uppercase;
}
.game-item:hover,.game-item.selected{
  background:var(--accent);
  color:#fff;padding-left:14px;
}
.game-item.selected::before{content:'▶ ';}

/* RIGHT PANE */
.right-pane{
  flex:1;padding:10px 14px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  background:var(--bg-pane);
  position:relative;gap:8px;
  transition:background 0.4s;overflow:hidden;
}

.game-preview{
  width:90%;max-width:640px;aspect-ratio:16/9;
  position:relative;background:#000;
  border:2px solid var(--border);
  box-shadow:0 0 16px var(--glow);
  transition:border-color 0.4s;overflow:hidden;
}
.game-preview iframe{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;transition:opacity 0.4s;
}
.no-game-msg{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,0.3);
  font-size:clamp(0.5em,1.2vw,0.7em);
  text-align:center;padding:20px;
}
.loading-indicator{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:var(--accent);
  font-size:clamp(0.6em,1.5vw,1em);
  display:none;z-index:2;letter-spacing:3px;
  animation:blink 0.8s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* GAME MODE PANE */
#gamePane{
  display:none;position:absolute;inset:0;
  flex-direction:column;background:#000;
}
#gameBar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;background:#000;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#gameBarTitle{
  font-family:var(--font);font-size:0.6em;
  color:var(--accent);letter-spacing:3px;text-transform:uppercase;
}
#exitButton{
  background:var(--accent);color:#fff;border:none;
  font-family:var(--font);font-size:0.5em;letter-spacing:2px;
  padding:5px 14px;cursor:pointer;text-transform:uppercase;
  transition:filter 0.15s;
}
#exitButton:hover{filter:brightness(1.2);}
#gameFrame{flex:1;border:none;width:100%;display:block;}

/* EMPTY STATE */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:12px;
  opacity:0.4;font-size:clamp(0.5em,0.9vw,0.7em);
  text-align:center;padding:20px;letter-spacing:2px;
}
.empty-state .big{font-size:2.5em;}

/* CONTROLS */
.controls{
  position:relative;z-index:1;
  background:var(--bg-dark);
  padding:8px 16px;
  border-top:2px solid var(--border);
  box-shadow:0 -2px 20px var(--glow);
  display:grid;
  grid-template-columns:minmax(150px,28%) 1fr;
  grid-template-areas:'nav play' 'nav aux';
  align-items:center;gap:6px 14px;
  flex-shrink:0;transition:all 0.4s;
}
.btn-group{display:flex;flex-wrap:wrap;gap:4px;}
.nav-controls{grid-area:nav;justify-content:center;align-self:center;}
.play-controls{grid-area:play;justify-content:center;align-self:center;}
.aux-controls{grid-area:aux;justify-content:flex-end;align-self:center;}
.button.dimmed{opacity:0.35;cursor:not-allowed;filter:saturate(0.45);}
.button.dimmed:hover{background:transparent;color:var(--text);box-shadow:none;}

.button{
  background:transparent;
  color:var(--text);
  border:1px solid var(--border);
  padding:7px 14px;
  font-family:var(--font);
  font-size:clamp(0.42em,0.85vw,0.68em);
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
}
.button:hover{background:var(--accent);color:#fff;box-shadow:0 0 10px var(--glow);}
.button:active{transform:translateY(1px);}
.button.active-btn{background:var(--accent);color:#fff;}

/* INSTRUCTIONS MODAL */
#instrModal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);z-index:200;
  align-items:center;justify-content:center;
}
.instr-box{
  background:var(--bg-pane);
  border:2px solid var(--border);
  box-shadow:0 0 40px var(--glow);
  padding:32px;max-width:460px;width:90%;
  position:relative;
}
.instr-title{
  font-family:var(--font);font-size:1.1em;
  color:var(--text);letter-spacing:3px;
  text-transform:uppercase;margin-bottom:24px;
}
.instr-body{
  font-family:var(--font);font-size:0.9em;
  color:rgba(255,255,255,0.75);line-height:2.4;
  letter-spacing:1px;
}
.instr-close{
  margin-top:24px;background:var(--accent);color:#fff;
  border:none;font-family:var(--font);font-size:0.8em;
  letter-spacing:2px;padding:12px 24px;cursor:pointer;
  width:100%;text-transform:uppercase;transition:filter 0.15s;
}
.instr-close:hover{filter:brightness(1.2);}

/* TOUCH OVERLAY — summoned only on touch devices
   V4: bottom-docked, right-to-left slide, never affects game real estate.
──────────────────────────────────────────────────────────── */
#touchToggle{
  display:none;
  position:fixed;z-index:120;
  background:rgba(5,8,15,0.94);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--font);font-size:10px;letter-spacing:1.5px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  bottom:max(12px, env(safe-area-inset-bottom, 12px));right:14px;
  padding:10px 14px;
  border-radius:999px;
  box-shadow:0 0 18px var(--glow);
  backdrop-filter:blur(8px);
}
#touchToggle:active{background:var(--accent);color:#fff;transform:scale(0.97);}
#touchToggle.dimmed{opacity:.35;cursor:not-allowed;}

#touchPanel{
  position:fixed;z-index:110;
  left:10px;right:10px;bottom:max(10px, env(safe-area-inset-bottom, 10px));
  min-height:clamp(150px,22vh,210px);
  background:linear-gradient(180deg,rgba(5,8,15,0.94),rgba(0,0,0,0.98));
  border:1px solid var(--border);
  border-top:2px solid var(--accent);
  border-radius:18px;
  box-shadow:0 0 28px rgba(0,0,0,0.8),0 0 26px var(--glow);
  backdrop-filter:blur(10px);
  display:grid;
  grid-template-columns:minmax(142px,1fr) minmax(118px,.7fr) minmax(82px,.48fr);
  grid-template-areas:'dpad continue actions';
  align-items:center;
  gap:14px;
  padding:14px 16px max(16px, env(safe-area-inset-bottom, 16px));
  transform:translateX(calc(100% + 28px));
  transition:transform 0.24s ease, box-shadow 0.22s ease;
  touch-action:none;
}
#touchPanel.open{transform:translateX(0);}

#dpad{
  grid-area:dpad;
  width:clamp(136px,30vw,178px);
  height:clamp(136px,30vw,178px);
  justify-self:center;
  align-self:center;
  position:relative;
  display:block;
  border:3px solid var(--accent);
  border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.18),rgba(5,8,15,.9) 44%,rgba(0,0,0,.96));
  box-shadow:0 0 16px var(--glow), inset 0 0 20px rgba(37,99,235,.18);
}
#dpad::before{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:42%;height:42%;border:3px solid var(--accent);border-radius:50%;
  box-shadow:0 0 12px var(--glow), inset 0 0 12px rgba(37,99,235,.18);
}
#dpad::after{
  content:'●';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  color:#dcecff;font-size:18px;text-shadow:0 0 10px var(--accent);opacity:.9;
}
.dpad-row{display:contents;}
.dpad-center{display:none;}
.dpad-btn{
  position:absolute;
  width:38px;height:38px;
  background:transparent;
  border:none;
  color:#dcecff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;user-select:none;
  text-shadow:0 0 8px var(--accent);
  z-index:2;
}
#dUp{left:50%;top:8px;transform:translateX(-50%);}
#dDown{left:50%;bottom:8px;transform:translateX(-50%);}
#dLeft{left:10px;top:50%;transform:translateY(-50%);}
#dRight{right:10px;top:50%;transform:translateY(-50%);}
.dpad-btn:active{background:rgba(37,99,235,.18);color:#fff;}

#spaceBtn{
  grid-area:continue;
  justify-self:center;
  align-self:center;
  width:min(100%,190px);
  min-height:70px;
  background:rgba(30,30,30,0.9);
  border:2px solid #ff0;color:#ff0;
  font-family:var(--font);font-size:11px;letter-spacing:2px;
  padding:10px 16px;border-radius:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  box-shadow:0 0 14px rgba(255,255,0,.38), inset 0 0 12px rgba(255,255,0,.08);
}
#spaceBtn:active{background:#ff0;color:#000;}

#actionBtns{
  grid-area:actions;
  display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;
  justify-self:center;align-self:center;
}
.action-btn{
  width:62px;height:62px;border-radius:50%;
  background:rgba(18,22,32,0.92);
  border:2px solid var(--border);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;
  font-family:var(--font);font-size:12px;letter-spacing:1px;
  box-shadow:0 0 12px var(--glow);
}
.action-btn.fire{font-size:26px;}
.action-btn:active{background:var(--accent);color:#fff;}

@media (pointer:coarse){#touchToggle{display:flex;align-items:center;justify-content:center;}}
@media (pointer:fine){#touchToggle{display:none!important;}#touchPanel{display:none!important;}}

@media (max-width:767px) and (orientation:portrait){
  #touchPanel{
    min-height:clamp(128px,18vh,166px);
    grid-template-columns:minmax(112px,.9fr) minmax(84px,.62fr) minmax(68px,.42fr);
    gap:8px;
    padding:12px 12px max(12px, env(safe-area-inset-bottom,12px));
  }
  #dpad{width:clamp(112px,32vw,138px);height:clamp(112px,32vw,138px);}
  #spaceBtn{width:min(100%,152px);min-height:56px;font-size:9px;padding:8px 10px;}
  .action-btn{width:54px;height:54px;}
  .action-btn.fire{font-size:23px;}
  #actionBtns{gap:9px;transform:translateX(-6px);}
}

@media (min-width:768px) and (pointer:coarse){
  #touchPanel{min-height:190px;grid-template-columns:minmax(170px,1fr) minmax(150px,.72fr) minmax(90px,.45fr);}
  #spaceBtn{align-self:center;transform:translateY(2px);}
}
/* Keyboard shortcut hints on buttons */
/* Keyboard shortcut hints on buttons */
.button .shortcut{
  display:block;font-size:0.7em;opacity:0.45;
  letter-spacing:0;margin-top:1px;
}

/* ═══════════════════════════════════════════════
   MOBILE — PORTRAIT
   Stack: header / game tabs / right-pane / controls
═══════════════════════════════════════════════ */
@media (max-width:767px) and (orientation:portrait){

  body{
    height:100dvh;
    overflow:hidden;
  }

  /* Wrap everything in a scroll container so controls always show */
  .header{
    padding:8px 12px;
    font-size:0.75em;letter-spacing:2px;
  }
  .back-arrow{font-size:0.65em;padding:3px 8px;right:10px;}

  /* Main content stacks vertically */
  .main-content{
    flex-direction:column;
    margin:6px 6px 0;
    border-bottom:none;
  }

  /* Left pane → horizontal scrollable tab strip */
  .left-pane{
    width:100%;min-width:unset;
    height:auto;flex-shrink:0;
    border-right:none;
    border-bottom:2px solid var(--border);
    overflow-x:auto;overflow-y:hidden;
    padding:6px 6px;
    display:flex;flex-direction:row;align-items:center;gap:4px;
    scrollbar-width:none;
  }
  .left-pane::-webkit-scrollbar{display:none;}

  .game-item{
    flex-shrink:0;
    border-bottom:none;
    border:1px solid rgba(255,255,255,0.15);
    padding:7px 12px;
    font-size:0.65em;
    white-space:nowrap;
  }
  .game-item.selected{
    padding-left:12px;
    border-color:var(--accent);
  }
  .game-item.selected::before{content:'▶ ';}

  /* Right pane fills remaining space */
  .right-pane{
    flex:1;
    padding:8px;
    justify-content:flex-start;
    overflow:hidden;
  }

  .game-meta{padding:6px 8px 4px;}
  .game-meta .title{font-size:1.1em;letter-spacing:2px;margin-bottom:3px;}
  .game-meta .subtitle{font-size:0.65em;margin-bottom:4px;}
  .meta-desc{font-size:0.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .game-preview{
    width:100%;max-width:unset;
  }

  /* Controls — two compact rows, always visible */
  .controls{
    margin:0 6px;
    margin-bottom:max(18px, env(safe-area-inset-bottom, 18px));
    padding:6px 8px;
    flex-direction:column;
    gap:5px;
    align-items:stretch;
    flex-shrink:0;
  }
  .btn-group{
    display:flex;flex-wrap:nowrap;gap:4px;justify-content:center;
  }
  .button{
    flex:1;padding:8px 4px;
    font-size:0.55em;letter-spacing:0.5px;
  }
}

/* ═══════════════════════════════════════════════
   MOBILE — LANDSCAPE
   Side-by-side (slim list + right pane),
   controls in single scrollable row
═══════════════════════════════════════════════ */
@media (max-width:900px) and (orientation:landscape){

  body{height:100dvh;}

  .header{
    padding:5px 12px;
    font-size:0.65em;letter-spacing:2px;
  }
  .back-arrow{font-size:0.6em;padding:2px 7px;right:8px;}

  .main-content{
    flex-direction:row;
    margin:5px 5px 0;
  }

  /* Slim vertical list */
  .left-pane{
    width:22%;min-width:90px;max-width:130px;
  }
  .game-item{
    font-size:0.55em;padding:7px 6px;
  }

  .right-pane{padding:6px 8px;gap:5px;}

  .game-meta{padding:4px 8px 2px;}
  .game-meta .title{font-size:0.95em;letter-spacing:2px;margin-bottom:2px;}
  .game-meta .subtitle{font-size:0.6em;margin-bottom:2px;}
  .meta-desc{display:none;}

  /* Controls — single scrollable row */
  .controls{
    margin:0 5px max(12px, env(safe-area-inset-bottom, 12px));
    padding:5px 8px;
    flex-direction:row;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:6px;
    justify-content:flex-start;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .controls::-webkit-scrollbar{display:none;}
  .btn-group{
    flex-wrap:nowrap;gap:4px;flex-shrink:0;
  }
  .button{
    padding:6px 10px;
    font-size:0.55em;
    white-space:nowrap;
  }
}

/* V4 responsive console deck zoning */
@media (max-width:767px) and (orientation:portrait){
  .controls{grid-template-columns:1fr;grid-template-areas:'nav' 'play' 'aux';align-items:stretch;}
  .nav-controls,.play-controls,.aux-controls{justify-content:center;}
  .aux-controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;}
}
@media (max-width:900px) and (orientation:landscape){
  .controls{grid-template-columns:minmax(90px,22%) 1fr;grid-template-areas:'nav play' 'nav aux';overflow:visible;}
  .nav-controls{justify-content:center;}
  .play-controls{justify-content:center;}
  .aux-controls{justify-content:flex-end;}
}

</style>
<style>

/* ICTLabs Retro Console — V4.1 Stabilization Patch */
#backBtn,.back-btn,.back-button,.home-back,a[aria-label*="back" i],button[aria-label*="back" i]{
  min-width:52px!important;min-height:38px!important;display:flex!important;align-items:center!important;justify-content:center!important;
  color:#e8f4ff!important;border:1.5px solid #2f6bff!important;box-shadow:0 0 12px rgba(47,107,255,.55),inset 0 0 10px rgba(47,107,255,.12)!important;
  opacity:1!important;font-size:19px!important;text-shadow:0 0 8px rgba(232,244,255,.75)!important;
}
@media (max-width:1024px),(pointer:coarse){

<script>
// ── State ─────────────────────────────────────────────────
let GAMES = [];
let selectedIndex = 0;
const SKINS = ['', 'skin-green', 'skin-gold', 'skin-red'];
let skinIndex = 0;
let loadTimer = null;

// ── DOM ───────────────────────────────────────────────────
const listPane    = document.getElementById('gameListPane');
const metaBox     = document.getElementById('gameMeta');
const metaTitle   = document.getElementById('metaTitle');
const metaSubtitle= document.getElementById('metaSubtitle');
const metaDesc    = document.getElementById('metaDesc');
const previewWrap = document.getElementById('gamePreview');
const previewFrame= document.getElementById('previewFrame');
const loadingInd  = document.getElementById('loadingIndicator');
const noVideoMsg  = document.getElementById('noVideoMsg');
const emptyState  = document.getElementById('emptyState');
const gamePane    = document.getElementById('gamePane');
const gameFrame   = document.getElementById('gameFrame');
const gameBarTitle= document.getElementById('gameBarTitle');

// ── Audio (Web Audio) ─────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,vol=0.15,type='square'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
function sfxNav()   { beep(330,0.06,0.12); }
function sfxSelect(){ beep(520,0.08,0.18); }
function sfxSkin()  { beep(440,0.05,0.12); beep(660,0.05,0.12); }
function sfxSave()  { [440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,0.07,0.15),i*60)); }
document.addEventListener('keydown',()=>{ if(AC.state==='suspended') AC.resume(); },{once:false});

// ── Load games ────────────────────────────────────────────
async function loadGames(){
  try{
    const m = await fetch('games/manifest.json');
    if(!m.ok) throw new Error();
    const manifest = await m.json();
    const promises = (manifest.games||[]).map(async folder=>{
      try{
        const r = await fetch(`games/${folder}/game_info.json`);
        if(!r.ok) return null;
        const d = await r.json();
        d._folder = folder; return d;
      }catch{ return null; }
    });
    GAMES = (await Promise.all(promises)).filter(Boolean);
  }catch{ GAMES=[]; }
  renderList();
  if(GAMES.length>0){ selectGame(0); }
}

function renderList(){
  listPane.innerHTML='';
  if(!GAMES.length){
    listPane.innerHTML='<div class="empty-state"><div class="big">📂</div><div>No games found</div></div>';
    return;
  }
  GAMES.forEach((g,i)=>{
    const el=document.createElement('div');
    el.className='game-item';
    el.textContent=g.name||`Game ${i+1}`;
    el.addEventListener('click',()=>{
      sfxSelect();
      if(i===selectedIndex){ launchGame('1p'); }
      else { selectGame(i); }
    });
    listPane.appendChild(el);
  });
}

function selectGame(index){
  if(!GAMES.length) return;
  if(index<0) index=GAMES.length-1;
  if(index>=GAMES.length) index=0;
  selectedIndex=index;
  document.querySelectorAll('.game-item').forEach((el,i)=>{
    el.classList.toggle('selected',i===selectedIndex);
    if(i===selectedIndex) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  showDetails(GAMES[selectedIndex]);
  update2pButton();
}

function showDetails(game){
  emptyState.style.display='none';
  metaBox.style.display='block';
  previewWrap.style.display='block';
  metaTitle.textContent   = game.name||'—';
  metaSubtitle.textContent= [game.genre,game.release_year].filter(Boolean).join(' · ');
  metaDesc.textContent    = game.image_desc||'';
  if(loadTimer) clearTimeout(loadTimer);
  previewFrame.src='about:blank';
  previewFrame.style.opacity='0';
  loadingInd.style.display='block';
  noVideoMsg.style.display='none';
  if(game.video_src){
    loadTimer=setTimeout(()=>{ previewFrame.src=game.video_src; },1500);
  }else{
    loadingInd.style.display='none';
    noVideoMsg.style.display='flex';
    previewFrame.style.opacity='1';
  }
}

previewFrame.addEventListener('load',()=>{
  if(previewFrame.src!=='about:blank'){
    loadingInd.style.display='none';
    previewFrame.style.opacity='1';
  }
});

// ── Launch ────────────────────────────────────────────────
function launchGame(mode){
  if(!GAMES.length) return;
  const game=GAMES[selectedIndex];
  if(!game.play_url) return;
  metaBox.style.display='none';
  previewWrap.style.display='none';
  emptyState.style.display='none';
  const url=game.play_url+(mode?'?mode='+mode:'');
  gameFrame.src=url;
  gameBarTitle.textContent=game.name+(mode==='2p'?' · 2P':'');
  gamePane.style.display='flex';
  document.body.classList.add('is-playing');
  window.closeTouchPanel && window.closeTouchPanel();
  // Focus the iframe so keyboard events go straight to the game
  setTimeout(()=>gameFrame.focus(),200);
}

function exitGame(){
  gamePane.style.display='none';
  document.body.classList.remove('is-playing');
  gameFrame.src='about:blank';
  showDetails(GAMES[selectedIndex]);
}

document.getElementById('exitButton').addEventListener('click',exitGame);
document.addEventListener('keydown',e=>{
  // Only handle console keys when game is NOT running
  if(gamePane.style.display!=='none'){
    if(e.key==='Escape') exitGame();
    return;
  }
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W')  { sfxNav();    selectGame(selectedIndex-1); e.preventDefault(); }
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') { sfxNav();    selectGame(selectedIndex+1); e.preventDefault(); }
  if(e.key==='Enter')    { sfxSelect(); launchGame('1p'); e.preventDefault(); }
  if(e.key==='1')        { sfxSelect(); launchGame('1p'); e.preventDefault(); }
  if(e.key==='2')        { sfxSelect(); launchGame('2p'); e.preventDefault(); }
  if(e.key==='h'||e.key==='H'){
    document.getElementById('instrButton').click();
    e.preventDefault();
  }
});

// ── Nav buttons ───────────────────────────────────────────
document.getElementById('upButton').addEventListener('click',()=>{ sfxNav(); selectGame(selectedIndex-1); });
document.getElementById('downButton').addEventListener('click',()=>{ sfxNav(); selectGame(selectedIndex+1); });
document.getElementById('selectButton').addEventListener('click',()=>{ sfxSelect(); launchGame('1p'); });

// ── Touch panel ───────────────────────────────────────────
function setupTouchOverlay(){
  const panel=document.getElementById('touchPanel');
  const toggle=document.getElementById('touchToggle');
  if(!panel||!toggle)return;

  const isTouch = matchMedia('(pointer: coarse)').matches;
  let open=false;

  function openPanel(){
    if(!isTouch) return;
    open=true;
    panel.classList.add('open');
    toggle.textContent='CLOSE';
  }
  function closePanel(){
    open=false;
    panel.classList.remove('open');
    toggle.textContent='CONTROLS';
    releaseDirections();
  }
  window.closeTouchPanel=closePanel;

  toggle.addEventListener('touchstart',e=>{ e.preventDefault(); open?closePanel():openPanel(); },{passive:false});
  toggle.addEventListener('click',()=>{ open?closePanel():openPanel(); });

  function sendKey(type,key){
    const code = key===' ' ? 'Space' : key;
    if(gamePane.style.display!=='none'){
      try{ gameFrame.contentWindow.postMessage({type:'key',event:type,key,code},'*'); }catch(ex){}
      try{
        const ev=new KeyboardEvent(type,{key,code,bubbles:true,cancelable:true,view:gameFrame.contentWindow});
        gameFrame.contentDocument&&gameFrame.contentDocument.dispatchEvent(ev);
      }catch(ex){}
    }else{
      if(type==='keydown'){
        if(key==='ArrowUp')   { sfxNav(); selectGame(selectedIndex-1); }
        if(key==='ArrowDown') { sfxNav(); selectGame(selectedIndex+1); }
        if(key===' ')         { sfxSelect(); launchGame('1p'); }
      }
    }
  }
  function tap(key,ms=80){ sendKey('keydown',key); setTimeout(()=>sendKey('keyup',key),ms); }

  const active={ArrowUp:false,ArrowDown:false,ArrowLeft:false,ArrowRight:false};
  let joyPointer=null;
  function setDir(key,on){
    if(active[key]===on)return;
    active[key]=on;
    sendKey(on?'keydown':'keyup',key);
  }
  function releaseDirections(){

    const r=dpad.getBoundingClientRect();
    const cx=r.left+r.width/2;

    const dx=clientX-cx;

    const threshold=r.width*0.13;
    setDir('ArrowLeft', dx < -threshold);
    setDir('ArrowRight',dx > threshold);

  }

  const dpad=document.getElementById('dpad');

<script>
/* ICTLabs Retro Console — V4.2 Stabilization JS */
(function(){
  const ready = fn => document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', fn) : fn();

  ready(function(){
    const isTouch = () => window.matchMedia('(max-width:1024px), (pointer:coarse)').matches;

    const panel = document.getElementById('touchPanel');
    const hardControls = document.getElementById('desktopControlsButton');
    const rogueToggle = document.getElementById('touchToggle');
    const v41 = document.getElementById('ictV41Overlay');

    // Fully remove the rogue overlay trigger and V4.1 experimental overlay from behavior.
    if(rogueToggle) rogueToggle.remove();
    if(v41) v41.remove();

    // Restore original panel if V4.1 hid it.
    if(panel){
      panel.style.display = '';
      panel.classList.remove('show');
    }

    let open = panel && panel.classList.contains('open');

    function sendKey(type,key){
      const gameFrame = document.getElementById('gameFrame');
      const gamePane  = document.getElementById('gamePane');
      const code = key === ' ' ? 'Space' : key;

      if(gamePane && gamePane.style.display !== 'none'){
        try{ gameFrame.contentWindow.postMessage({type:'key',event:type,key,code},'*'); }catch(ex){}
        try{
          const ev = new KeyboardEvent(type,{key,code,bubbles:true,cancelable:true});
          gameFrame.contentWindow && gameFrame.contentWindow.dispatchEvent(ev);
          gameFrame.contentDocument && gameFrame.contentDocument.dispatchEvent(ev);
        }catch(ex){}
      }else{
        if(type === 'keydown'){
          const up = document.getElementById('upButton');
          const down = document.getElementById('downButton');
          const select = document.getElementById('selectButton');
          if(key === 'ArrowUp') up && up.click();
          if(key === 'ArrowDown') down && down.click();
          if(key === ' ') select && select.click();
        }
      }
    }

    function tap(key,ms=70){
      sendKey('keydown',key);
      window.setTimeout(()=>sendKey('keyup',key),ms);
    }

    function openPanel(){
      if(!panel || !isTouch()) return;
      open = true;
      panel.classList.add('open');
    }

    function closePanel(){
      if(!panel) return;
      open = false;
      panel.classList.remove('open');
      releaseDirections();
      stopFire();
      // Cabinet rule: close/esc hides overlay and pauses/back-outs active game.
      tap('Escape',80);
    }

    // Hard main-panel CONTROLS button is the only open trigger.
    if(hardControls){
      hardControls.removeAttribute('aria-disabled');
      hardControls.addEventListener('click', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopPropagation();
        open ? closePanel() : openPanel();
      }, true);
      hardControls.addEventListener('touchstart', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopPropagation();
        open ? closePanel() : openPanel();
      }, {passive:false, capture:true});
    }

    // Replace existing dpad behavior in capture phase.
    const dpad = document.getElementById('dpad');
    const active = {ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false};
    let joyPointer = null;

    function setDir(key,on){
      if(active[key] === on) return;
      active[key] = on;
      sendKey(on ? 'keydown' : 'keyup', key);
    }

    function releaseDirections(){
      Object.keys(active).forEach(k => setDir(k,false));
      joyPointer = null;
    }

    function updateJoystick(clientX, clientY){
      if(!dpad) return;

      const r = dpad.getBoundingClientRect();

      // TRUE ORIGIN: visual center of the pressure pad.
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;

      // TRUE SCALE: center to outer circle perimeter.
      const radius = Math.min(r.width, r.height) / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;

      const nx = dx / radius;
      const ny = dy / radius;

      const mag = Math.hypot(nx, ny);
      const dead = 0.18;

      if(mag < dead){
        setDir('ArrowLeft',false);
        setDir('ArrowRight',false);
        setDir('ArrowUp',false);
        setDir('ArrowDown',false);
        return;
      }

      // Independent axes allow diagonals and continuous pressure-pad steering.
      const axis = 0.22;
      setDir('ArrowLeft',  nx < -axis);
      setDir('ArrowRight', nx >  axis);
      setDir('ArrowUp',    ny < -axis);
      setDir('ArrowDown',  ny >  axis);
    }

    if(dpad){
      ['touchstart','pointerdown'].forEach(ev=>{
        dpad.addEventListener(ev, function(e){
          if(!isTouch()) return;
          e.preventDefault();
          e.stopImmediatePropagation();
          const p = e.touches ? e.touches[0] : e;
          joyPointer = p.pointerId || 'touch';
          if(e.pointerId && dpad.setPointerCapture) dpad.setPointerCapture(e.pointerId);
          updateJoystick(p.clientX,p.clientY);
        }, {passive:false, capture:true});
      });

      dpad.addEventListener('pointermove', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        updateJoystick(e.clientX,e.clientY);
      }, {passive:false, capture:true});

      dpad.addEventListener('touchmove', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        const p = e.touches && e.touches[0];
        if(p) updateJoystick(p.clientX,p.clientY);
      }, {passive:false, capture:true});

      ['pointerup','pointercancel','pointerleave','touchend','touchcancel'].forEach(ev=>{
        dpad.addEventListener(ev, function(e){
          if(!isTouch()) return;
          e.preventDefault();
          e.stopImmediatePropagation();
          releaseDirections();
        }, {passive:false, capture:true});
      });
    }

    // CONTINUE remains Space.
    const spaceBtn = document.getElementById('spaceBtn');
    if(spaceBtn){
      spaceBtn.addEventListener('click', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        tap(' ');
      }, true);
      spaceBtn.addEventListener('touchstart', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        tap(' ');
      }, {passive:false, capture:true});
    }

    // Blast: hold-to-fire, capture phase blocks older tap-only listeners.
    const fireBtn = document.getElementById('aFire');
    let fireTimer = null;
    function fireOnce(){ tap(' '); }
    function startFire(e){
      if(!isTouch()) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      stopFire();
      fireOnce();
      fireTimer = window.setInterval(fireOnce, 125);
    }
    function stopFire(e){
      if(e && isTouch()){
        e.preventDefault();
        e.stopImmediatePropagation();
      }
      if(fireTimer){
        window.clearInterval(fireTimer);
        fireTimer = null;
      }
      sendKey('keyup',' ');
    }
    if(fireBtn){
      fireBtn.textContent = '✸';
      fireBtn.addEventListener('pointerdown', startFire, {passive:false, capture:true});
      fireBtn.addEventListener('touchstart', startFire, {passive:false, capture:true});
      ['pointerup','pointercancel','pointerleave','touchend','touchcancel'].forEach(ev=>{
        fireBtn.addEventListener(ev, stopFire, {passive:false, capture:true});
      });
    }

    // ESC on overlay closes overlay and pauses/backs out.
    const escBtn = document.getElementById('aSelect');
    if(escBtn){
      escBtn.addEventListener('click', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        closePanel();
      }, true);
      escBtn.addEventListener('touchstart', function(e){
        if(!isTouch()) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        closePanel();
      }, {passive:false, capture:true});
    }

    window.addEventListener('resize', function(){
      if(!isTouch()){
        closePanel();
      }
    });
  });
})();
</script>


<script>
(function(){
 if(window.__ICT_V45__) return;
 window.__ICT_V45__ = true;

 const ready=fn=>document.readyState==='loading'
   ? document.addEventListener('DOMContentLoaded',fn)
   : fn();

 ready(function(){

  // Dedicated transport channels
  const movementState = {
    up:false,
    down:false,
    left:false,
    right:false
  };

  let fireInterval = null;

  // Add PAUSE button if missing
  const actions = document.querySelector('#ictV41Overlay .ict-v41-actions');

  if(actions && !document.getElementById('ictV45Pause')){
    const pause = document.createElement('button');
    pause.id = 'ictV45Pause';
    pause.textContent = 'PAUSE';

    actions.insertBefore(
      pause,
      document.getElementById('ictV41Close')
    );

    pause.addEventListener('click', ()=>{
      emitDiscrete('KeyP','p');
    });
  }

  function emitToTargets(ev){
    document.dispatchEvent(ev);

    const frame = document.querySelector('iframe');

    try{
      if(frame && frame.contentWindow){
        frame.contentWindow.dispatchEvent(ev);
        frame.contentWindow.document.dispatchEvent(ev);
      }
    }catch(e){}
  }

  // DISCRETE transport channel
  function emitDiscrete(code,key,duration=55){
    const down = new KeyboardEvent('keydown',{
      key:key,
      code:code,
      bubbles:true
    });

    const up = new KeyboardEvent('keyup',{
      key:key,
      code:code,
      bubbles:true
    });

    emitToTargets(down);

    setTimeout(()=>{
      emitToTargets(up);
    },duration);
  }

  // PERSISTENT movement transport channel
  function setMovement(code,on){

    const map = {
      ArrowUp:'up',
      ArrowDown:'down',
      ArrowLeft:'left',
      ArrowRight:'right'
    };

    const slot = map[code];

    if(!slot) return;

    if(movementState[slot] === on) return;

    movementState[slot] = on;

    const ev = new KeyboardEvent(
      on ? 'keydown':'keyup',
      {
        key:code,
        code:code,
        bubbles:true
      }
    );

    emitToTargets(ev);
  }

  // FIRE ISOLATED from movement channel
  const fireBtn = document.getElementById('ictV41Fire');

  if(fireBtn){

    function firePulse(){
      emitDiscrete('Space',' ');
      emitDiscrete('KeyX','x');
    }

    fireBtn.addEventListener('pointerdown', e=>{
      e.preventDefault();

      firePulse();

      if(fireInterval){
        clearInterval(fireInterval);
      }

      fireInterval = setInterval(()=>{
        firePulse();
      },120);
    });

    ['pointerup','pointercancel','pointerleave']
      .forEach(ev=>{
        fireBtn.addEventListener(ev, ()=>{
          if(fireInterval){
            clearInterval(fireInterval);
            fireInterval = null;
          }
        });
      });
  }

  // TRACKPAD TRANSPORT ONLY
  const joy = document.getElementById('ictV41Joy');
  const knob = document.querySelector('#ictV41Joy .ict-joy-knob');

  if(!joy || !knob) return;

  let pid = null;

  function clearMovement(){
    setMovement('ArrowUp',false);
    setMovement('ArrowDown',false);
    setMovement('ArrowLeft',false);
    setMovement('ArrowRight',false);

    knob.style.transform = 'translate(0px,0px)';
  }

  function updateTrackpad(x,y){

    const r = joy.getBoundingClientRect();

    const cx = r.left + r.width/2;
    const cy = r.top + r.height/2;

    let dx = x - cx;
    let dy = y - cy;

    const radius = r.width/2;

    const limit = radius * 0.62;

    const raw = Math.hypot(dx,dy);

    // visual knob only
    if(raw > limit && raw > 0){
      const s = limit/raw;
      dx *= s;
      dy *= s;
    }

    knob.style.transform =
      `translate(${dx}px,${dy}px)`;

    // REAL vector values
    const nx = (x-cx)/radius;
    const ny = (y-cy)/radius;

    const mag = Math.hypot(nx,ny);

    // dead zone
    if(mag < 0.18){
      clearMovement();
      return;
    }

    const th = 0.22;

    // NO FIRE INTERACTION HERE
    setMovement('ArrowLeft', nx < -th);
    setMovement('ArrowRight', nx > th);
    setMovement('ArrowUp', ny < -th);
    setMovement('ArrowDown', ny > th);

    // future analog payload
    window.ICTLabsTrackpad = {
      x:Math.max(-1,Math.min(1,nx)),
      y:Math.max(-1,Math.min(1,ny)),
      magnitude:mag,
      angle:Math.atan2(ny,nx)
    };
  }

  joy.addEventListener('pointerdown', e=>{
    e.preventDefault();

    pid = e.pointerId;

    joy.setPointerCapture?.(pid);

    updateTrackpad(
      e.clientX,
      e.clientY
    );
  });

  joy.addEventListener('pointermove', e=>{
    if(pid !== e.pointerId) return;

    e.preventDefault();

    updateTrackpad(
      e.clientX,
      e.clientY
    );
  });

  ['pointerup','pointercancel','pointerleave']
    .forEach(ev=>{
      joy.addEventListener(ev, e=>{
        if(pid !== null && e.pointerId !== pid) return;

        clearMovement();

        pid = null;
      });
    });

 });
})();
</script>

<script>
/* ICTLabs Retro Console — V4.6 Mobile Input API */
(function(){
  if(window.__ICT_V46_INPUT_API__) return;
  window.__ICT_V46_INPUT_API__ = true;

  const ready = fn => document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', fn)
    : fn();

  ready(function(){

    const input = window.ICTLabsInput = window.ICTLabsInput || {
      moveX:0,
      moveY:0,
      magnitude:0,
      angle:0,
      fire:false,
      select:false,
      cancel:false,
      pause:false,
      close:false,
      source:'console-v4.6'
    };

    function pushInput(){
      input.ts = performance.now();
      const frame = document.querySelector('iframe');
      try{
        if(frame && frame.contentWindow){
          frame.contentWindow.ICTLabsInput = input;
        }
      }catch(e){}
    }

    // Keep iframe synchronized even after game iframe reloads.
    setInterval(pushInput, 250);

    const pad = document.getElementById('ictV41Joy');
    const knob = document.querySelector('#ictV41Joy .ict-joy-knob');

    if(pad){
      let pid = null;

      function releasePad(){
        input.moveX = 0;
        input.moveY = 0;
        input.magnitude = 0;
        input.angle = 0;
        if(knob) knob.style.transform = 'translate(0px,0px)';
        pushInput();
        pid = null;
      }

      function updatePad(clientX, clientY){
        const r = pad.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const radius = r.width / 2;

        let dx = clientX - cx;
        let dy = clientY - cy;

        const raw = Math.hypot(dx, dy);
        const visualLimit = radius * 0.62;

        if(raw > visualLimit && raw > 0){
          const s = visualLimit / raw;
          dx *= s;
          dy *= s;
        }

        if(knob) knob.style.transform = `translate(${dx}px,${dy}px)`;

        const nx = Math.max(-1, Math.min(1, (clientX - cx) / radius));
        const ny = Math.max(-1, Math.min(1, (clientY - cy) / radius));
        const mag = Math.min(1, Math.hypot(nx, ny));
        const dead = 0.18;

        if(mag < dead){
          input.moveX = 0;
          input.moveY = 0;
          input.magnitude = 0;
          input.angle = 0;
        }else{
          // normalize dead-zone out so motion begins cleanly after center
          const scaled = (mag - dead) / (1 - dead);
          input.moveX = nx * scaled / mag;
          input.moveY = ny * scaled / mag;
          input.magnitude = scaled;
          input.angle = Math.atan2(ny, nx);
        }

        pushInput();
      }

      pad.addEventListener('pointerdown', e=>{
        e.preventDefault();
        e.stopPropagation();
        pid = e.pointerId;
        pad.setPointerCapture?.(pid);
        updatePad(e.clientX, e.clientY);
      }, true);

      pad.addEventListener('pointermove', e=>{
        if(pid !== e.pointerId) return;
        e.preventDefault();
        e.stopPropagation();
        updatePad(e.clientX, e.clientY);
      }, true);

      ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
        pad.addEventListener(ev, e=>{
          if(pid !== null && e.pointerId !== pid) return;
          e.preventDefault();
          e.stopPropagation();
          releasePad();
        }, true);
      });
    }

    const fire = document.getElementById('ictV41Fire');
    if(fire){
      fire.addEventListener('pointerdown', e=>{
        e.preventDefault();
        e.stopPropagation();
        input.fire = true;
        pushInput();
      }, true);

      ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
        fire.addEventListener(ev, e=>{
          e.preventDefault();
          e.stopPropagation();
          input.fire = false;
          pushInput();
        }, true);
      });
    }

    // Optional V4.5 pause/select/cancel/close bridge
    function bindStateButton(id, prop, pulse=false){
      const el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('pointerdown', e=>{
        e.preventDefault();
        e.stopPropagation();
        input[prop] = true;
        pushInput();
        if(pulse){
          setTimeout(()=>{
            input[prop] = false;
            pushInput();
          }, 140);
        }
      }, true);
      ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
        el.addEventListener(ev, e=>{
          e.preventDefault();
          e.stopPropagation();
          if(!pulse) input[prop] = false;
          pushInput();
        }, true);
      });
    }

    bindStateButton('ictV45Pause','pause',true);
    bindStateButton('ictV41Close','close',true);

    pushInput();
  });
})();
</script>

<script>
/* ICTLabs Retro Console — V4.7 Controller Diamond Actions */
(function(){
  if(window.__ICT_V47_DIAMOND__) return;
  window.__ICT_V47_DIAMOND__ = true;

  const ready = fn => document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', fn)
    : fn();

  ready(function(){

    const input = window.ICTLabsInput = window.ICTLabsInput || {
      moveX:0, moveY:0, magnitude:0, angle:0,
      fire:false, select:false, cancel:false, pause:false, close:false,
      source:'console-v4.7'
    };

    input.source = 'console-v4.7';

    function pushInput(){
      input.ts = performance.now();
      const frame = document.querySelector('iframe');
      try{
        if(frame && frame.contentWindow){
          frame.contentWindow.ICTLabsInput = input;
        }
      }catch(e){}
    }

    function emitDiscrete(code,key,duration=60){
      const down = new KeyboardEvent('keydown',{key,code,bubbles:true,cancelable:true});
      const up = new KeyboardEvent('keyup',{key,code,bubbles:true,cancelable:true});
      document.dispatchEvent(down);
      const frame = document.querySelector('iframe');
      try{
        if(frame && frame.contentWindow){
          frame.contentWindow.dispatchEvent(down);
          frame.contentWindow.document.dispatchEvent(down);
        }
      }catch(e){}
      setTimeout(()=>{
        document.dispatchEvent(up);
        try{
          if(frame && frame.contentWindow){
            frame.contentWindow.dispatchEvent(up);
            frame.contentWindow.document.dispatchEvent(up);
          }
        }catch(e){}
      }, duration);
    }

    const actions = document.querySelector('#ictV41Overlay .ict-v41-actions');

    if(actions){
      if(!document.getElementById('ictV47Select')){
        const select = document.createElement('button');
        select.id = 'ictV47Select';
        select.className = 'ict-v47-action-btn';
        select.type = 'button';
        select.textContent = 'SELECT';
        actions.appendChild(select);
      }

      if(!document.getElementById('ictV47Cancel')){
        const cancel = document.createElement('button');
        cancel.id = 'ictV47Cancel';
        cancel.className = 'ict-v47-action-btn';
        cancel.type = 'button';
        cancel.textContent = 'CANCEL';
        actions.appendChild(cancel);
      }
    }

    function bindPulse(id, prop, keyCode, key){
      const el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('pointerdown', e=>{
        e.preventDefault();
        e.stopPropagation();
        input[prop] = true;
        pushInput();
        if(keyCode) emitDiscrete(keyCode, key);
      }, true);
      ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
        el.addEventListener(ev, e=>{
          e.preventDefault();
          e.stopPropagation();
          input[prop] = false;
          pushInput();
        }, true);
      });
    }

    bindPulse('ictV47Select','select','Enter','Enter');
    bindPulse('ictV47Cancel','cancel','Escape','Escape');

    // Ensure CLOSE is cabinet-only close state, not game pause.
    const close = document.getElementById('ictV41Close');
    if(close){
      close.addEventListener('pointerdown', e=>{
        input.close = true;
        pushInput();
      }, true);
      ['pointerup','pointercancel','pointerleave'].forEach(ev=>{
        close.addEventListener(ev, ()=>{
          input.close = false;
          pushInput();
        }, true);
      });
    }

    pushInput();
  });
})();
</script>
